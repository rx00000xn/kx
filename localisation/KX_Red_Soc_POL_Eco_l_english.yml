### Tooltips ###

### Focuses ###

KX_PL_SOC_Red_Eco_School:0 "Red Warsaw School of Economics"
KX_PL_SOC_Red_Eco_School_desc:0 "When in an unexpected turn of events Polish Socialists seized power they found themselves with one big issue, lack of unified economic programme, which made situation especialy dire considered German Economic Collapse, and certain isolation from reactionary neighbours. Thankfully Kalecki and Lange approched new Polish Government and presented them an offer to conduct an economic experiment and save Poland from certain stagnation, the only thing they had to do is give them absolute authority on the metters of Economy, for a time being... or so they thought..."

KX_PL_SOC_pzbs_Creation:0 "Creation of PZBS"
KX_PL_SOC_pzbs_Creation_desc:0 "'Who controls economy controls the nation' - that is the lesson Polish communists have not deducted from dialectical materialism. With new found power our economists have decided to cemment their power so that noone will interfere in their socialist experiment, and they are going to do so by creation of 'Polish Association of Socialism Builders', nominaly Polish Communist Party will still rule the country, however real power shall reside at the hands of economic and industrial specialists - PZBS."

KX_PL_SOC_Warsaw_Question:0 "The Question of Warsaw"
KX_PL_SOC_Warsaw_Question_desc:0 "Many think that Warsaw is an ugly, inefficent, backwater. And so the question stands, what shall we de with it?"

KX_PL_SOC_Renovate_Warsaw:0 "Renovate Warsaw"
KX_PL_SOC_Renovate_Warsaw_desc:0 "Simple Renovation of Warsaw will be sufficient."

KX_PL_SOC_Move_Capital_to_Lodz:0 "Move Capital to Łódź"
KX_PL_SOC_Move_Capital_to_Lodz_desc:0 "Perhaps we should consider moving capital to Łódź, labour capital of Poland, when Socialist powerbase is strong."

KX_PL_SOC_Tear_Down_Warsaw:0 "Tear Down Warsaw"
KX_PL_SOC_Tear_Down_Warsaw_desc:0 "Warsaw is clearly irredeemable, we should consider tearing it down and building anew!"

KX_PL_SOC_Rebuild_Warsaw:0 "Rebuild Warsaw"
KX_PL_SOC_Rebuild_Warsaw_desc:0 "Now that we made place for an urban expansion of Warsaw our plans to build a new capital for a new Poland shall begin!"

KX_PL_SOC_Kalecki_Triumphant:0 "Socialist Keynes"
KX_PL_SOC_Kalecki_Triumphant_desc:0 "Michał Kalecki has been appointed as the 'Chief Architect of Socialism', his theory will surely bring Polish prosperity to new heights!"

KX_PL_SOC_Land_Owner_Taxation:0 "Tax the Land Owners"
KX_PL_SOC_Land_Owner_Taxation_desc:0 "It has been decided that the most efficient way to extract agricultural surplus is to simply tax the land owners, heavy taxation will hopefully drive them eventualy out of bussiness and indirectly result in redistribution of land."

KX_PL_SOC_Division_of_Land:0 "Land Redistribution"
KX_PL_SOC_Division_of_Land_desc:0 "It has been decided that the best course of action will be to directly redistribute the land and rely on government mandeted grain quotas from small farmers."

KX_PL_SOC_Middle_Class_Taxation:0 "Increase Middle Class Taxes"
KX_PL_SOC_Middle_Class_Taxation_desc:0 "If we want to quickly expand our industrial cappacities we need more founding, our next course of action will be to increase middle class taxation for common prosperity!"

KX_PL_SOC_Middle_Class_Taxation:0 "Increase Middle Class Taxes"
KX_PL_SOC_Middle_Class_Taxation_desc:0 "If we want to quickly expand our industrial cappacities we need more founding, our next course of action will be to increase middle class taxation for common prosperity!"

KX_PL_SOC_Wide_Spread_Investments:0 "Larg Scale Investments"
KX_PL_SOC_Wide_Spread_Investments_desc:0 "At the time of crisis the only course of action is to expand government founding, austerity meassures will only bring more harm than good."

KX_PL_SOC_Wide_Spread_Investments:0 "Larg Scale Investments"
KX_PL_SOC_Wide_Spread_Investments_desc:0 "At the time of crisis the only course of action is to expand government founding, austerity meassures will only bring more harm than good."
 
KX_PL_SOC_Practical_Aproach_to_Economics:0 "Theory of the Business Cycle"
KX_PL_SOC_Practical_Aproach_to_Economics_desc:0 "Although we are now implementing our policies in practice it is still important to reaserch the macroeconomic models in search of new heights and long term benefits." 

KX_PL_SOC_Outgrow_Private_Sector:0 "Socialist Dirigisme"
KX_PL_SOC_Outgrow_Private_Sector_desc:0 "We could outright nationalize all of the industry, however it may be smarter to retain nominal market economy while blurring the line between private and public property." 

KX_PL_SOC_Increase_Wages:0 "Increase Wages"
KX_PL_SOC_Increase_Wages_desc:0 "To stimulate economic growth we have to also stimulate consumer demand, by increasing the wages workers will have more money to spend to fuell our development." 

KX_PL_SOC_Mass_Public_Works:0 "Mass Public Works"
KX_PL_SOC_Mass_Public_Works_desc:0 "Unemployment is a sign of great inefficiency of economy, we should try to utilise the 'idile' by series of grand infrastructural works, that will benefit both their pockets and country as a whole." 

KX_PL_SOC_Eliminate_Unemployment:0 "Aim at Economic Equilibrium"
KX_PL_SOC_Eliminate_Unemployment_desc:0 "We have to strive to attein the perfect balance between economic forces, only this way can we achive the optimal route to prosperity!"

KX_PL_SOC_Eliminate_Unemployment:0 "Aim at Economic Equilibrium"
KX_PL_SOC_Eliminate_Unemployment_desc:0 "We have to strive to attein the perfect balance between economic forces, only this way can we achive the optimal route to prosperity!"
 
KX_PL_SOC_Lange_Triumphant:0 "Not-So-Market Socialist"
KX_PL_SOC_Lange_Triumphant_desc:0 "Oskar Lange has been chosen for the post of 'Chief Architect of Socialism', he will sure oversee the rapid expansion of our economy!" 

KX_PL_SOC_Nationalize_Industry:0 "Nationalization of Industry"
KX_PL_SOC_Nationalize_Industry_desc:0 "It is time for the government to take the direct control of the economy, we will begin with nationalization of all industry!" 

KX_PL_SOC_Create_Managerial_Class:0 "Create Managerial Class"
KX_PL_SOC_Create_Managerial_Class_desc:0 "For our economy to function properly we need someone to manage state enterprises, creation of this new 'Red Middle Class' will guarantee that." 

KX_PL_SOC_Nationalize_Agriculture:0 "Nationalization of Agriculture"
KX_PL_SOC_Nationalize_Agriculture_desc:0 "Only by putting the agricultural production directly under state supervision can we guarantee the undisrupted supply of agricultural products to support growing population of industrial workers, and we will not be shy to nationalize it, however unpopular it may be!"
 
KX_PL_SOC_Create_Quasi_Market_Alocation:0 "Quasi-Market Economic Alocation"
KX_PL_SOC_Create_Quasi_Market_Alocation_desc:0 "Many reactionary economists criticised ecconomic planning for it's inflexibility, we will prove them wrong by implementation of dynamic pricing system based on trial and error."  
 
#KX_PL_SOC_All_Power_to_Planning_Board:0 "All Power to the Planning Board"
#KX_PL_SOC_All_Power_to_Planning_Board_desc:0 "For our Economic Model to work it is necessary to give enought authority to Central Planning Board so that prices are set accordingly and all inefficencies are eliminated."  
KX_PL_SOC_All_Power_to_Planning_Board:0 "Managerial Separation of Powers"
KX_PL_SOC_All_Power_to_Planning_Board_desc:0 "For our Economic Model to work it is necessary to give enought authority to Central Planning Board so that prices are set accordingly and all inefficencies are eliminated, however it is also necessary to allow local managers autonomy in delivering governmental orders, which will stimulate their initiative and general productivity, but we can't forget that workers need an ability to exercisie their economic self-management to hold their managers in check, preventing them from gathering too much power that could be used to bypass governmental regulations."  

KX_PL_SOC_Flirty_With_Cybernetics:0 "Flirt with Cybernetics"
KX_PL_SOC_Flirty_With_Cybernetics_desc:0 "Cybernetics is a fascinating concept that has to be explored, even if this field is still in it's infancy." 

KX_PL_SOC_Social_Dividents:0 "Implement Social Dividends"
KX_PL_SOC_Social_Dividents_desc:0 "Economic Expansion provides us with evergrowing economic surplus, some of it have to be distributed among population because it is both moraly right and economicaly beneficial, we will do so in form of social dividends distributing said surplus from publicaly owned means of production." 
 
KX_PL_SOC_Nationalize_Financial_System:0 "Nationalization of Financial System"
KX_PL_SOC_Nationalize_Financial_System_desc:0 "Financial System simply has to be state owned to ensure stability of our economic system."  

KX_PL_SOC_Nation_In_Building_Spree:0 "Nation in Building Spree"
KX_PL_SOC_Nation_In_Building_Spree_desc:0 "When we build our economy grows, it's as simple as that, and we have to rapidly expand our building sector in order to catch up with the level of development of Western Countries."  

KX_PL_SOC_Socialist_Curiculum:0 "Socialist Economic Curiculum"
KX_PL_SOC_Socialist_Curiculum_desc:0 "We control the economy but we don't entirely control the hearts of our people, that is why they have to be thought how our economy works, they have to UNDERSTAND how it works and how it benefits them, because only this way can we guarantee immortality of our system." 

KX_PL_SOC_Every_Man_an_Engineer:0 "Every Man an Engineer"
KX_PL_SOC_Every_Man_an_Engineer_desc:0 "Our industrial base is rapidly expanding, and to maintain this rapid pace we need constant supply of industrial specialists, we shall begin foundation of special engineering schools across the country to ensure that."

KX_PL_SOC_Destroy_Church_Influence:0 "Combat Church Influence"
KX_PL_SOC_Destroy_Church_Influence_desc:0 "Catholic church economic doctrine is simply incompatible with vision of economic and social progress we represent, and ever since our land reform hit the wealth they have ruthlessly accumulated thorugh centouries, it have been very vocal opponents of our government, thus we have to ennact policies limiting the church influence in all aspects of our society, not too harshy however, the wealth and prosperity we created will laicise our society in itself either way, with time..."

KX_PL_SOC_Women_In_Workforce:0 "Women at Work"
KX_PL_SOC_Women_In_Workforce_desc:0 "In our current society women is besicaly bound to home, for them it is a form of enslavement and what's worse they are basicaly economicaly dead from industrial productivity stand point, we have to countermeasure this so that the societal development can catch up with economic one."  

KX_PL_SOC_Extensive_Child_Care:0 "Childcare Founding"
KX_PL_SOC_Extensive_Child_Care_desc:0 "Our workers are more and more preoccupied with their labour, which surely have a positive impact on common prosperity, unfortunately their children need proper care at the time their parents are at work, and we can ensure that by creation of proper child care services that will guarantee continuous development of our society."

KX_PL_SOC_Four_Children_Policy:0 "Four Children Policy"
KX_PL_SOC_Four_Children_Policy_desc:0 "Manpower means economic power, and we desperately need that in order to compete with our neighbours, by ennacting four children policy (including usual social security ones, like universal healthcare) we can ensure steady population growth that is neither too big to handle nor too small to hurt us." 

KX_PL_SOC_Labour_Hotels:0 "Found Labour Hotels"
KX_PL_SOC_Labour_Hotels_desc:0 "Urban population is getting bigger and bigger by the day, which resulted in overcrowded cities and lack of housing, we are still trying to solve the problem but as a temporary countermeasure we will support Labour Hotels initiative where workers newly arrived from countryside can live, it won't be sufficient for their potential families but will give us some more time to solve the problem."  

KX_PL_SOC_Durable_Housing:0 "Durrable Housing"
KX_PL_SOC_Durable_Housing_desc:0 "The ansewer to housing shortage is simple - build more housing, however we have to decide on the design of this new housing, our decision is that more expensive but durable houses will be better solution than cheap ones, so that we don't end up with another shortage in a distant future." 

KX_PL_SOC_Cheap_Housing:0 "Cheap Housing"
KX_PL_SOC_Cheap_Housing_desc:0 "The ansewer to housing shortage is simple - build more housing, however we have to decide on the design of this new housing, our decision is that we have to act quickly and build as many houses as possible in the shortes ammount of time possible so our growth won't slow down." 

KX_PL_SOC_Milk_Bar_at_Every_Corner:0 "Milk Bar at Every Corner"
KX_PL_SOC_Milk_Bar_at_Every_Corner_desc:0 "Our workers waste a lot of time and effort on cooking at home which is tremendously inefficent, but we can solve this issue by sponsoring so called 'Milk Bars' - Canteens that serve dishes well balanced with nutrients for average worker's physical labour." 

KX_PL_SOC_Patriotism_is_Now:0 "Patriotism is Now"
KX_PL_SOC_Patriotism_is_Now_desc:0 "Patriotism is not living in yesterday, perhaps it is living in tommorow, but most surely it is living in today. We have to make sure that the proper national ethos is applied in our society so that we can work for common good, honest work is the highest expression of patriotism indeed!"  

KX_PL_SOC_Homes_of_Glass:0 "Homes of Glass"
KX_PL_SOC_Homes_of_Glass_desc:0 "Everyone at PZBS is certain, the way to prosperity, to Socialism, has been paved! Life of the common is becoming better and better and our economic output is doing the same. Prosperity is truly ahead of us!!!"
 
#Expansion Tree

KX_PL_SOC_Beast_of_Growth_Needs_to_be_Fed:0 "Beast of Growth Needs to be Fed"
KX_PL_SOC_Beast_of_Growth_Needs_to_be_Fed_desc:0 "Our economic development is going very well, however it is apparent that the small amount of land we have is insufficient for long term economic growth, not to mention constant threat from neighbours we are facing, thus the only logical action is to expand, so that all Poles and beyond can experience true prosperity!"
 
KX_PL_SOC_Aim_East:0 "Aim to the East"
KX_PL_SOC_Aim_East_desc:0 "The Eastern lands, called by Polish People 'Kresy', present to us an abundance of space that can be exploited for agricultural produce, even if it needs a bit of taming we should point our gaze toward these lands." 

KX_PL_SOC_Integrate_East:0 "Integration of 'Kresy'"
KX_PL_SOC_Integrate_East_desc:0 "Now that the eastern lands are firmly under our control it's time to begin proces of integration." 

KX_PL_SOC_Aim_West:0 "Aim to the West"
KX_PL_SOC_Aim_West_desc:0 "To the West of Poland in its current form lie highly industrialised lands of German Empire, it would be foolish to challenge them lightly so we have to be prepared for high risk investment, the potential fruits of this investments are however abundunt, and they present themselve in form of much needed industrial resources, firm access to the sea, and last but not least developed industrial base that can be used to invest in other regions of Poland. Once opportunity to attack presents itself we can't let it slide." 

KX_PL_SOC_Integrate_West:0 "Integration of German 'Zabór'"
KX_PL_SOC_Integrate_West_desc:0 "The German Empire lies defeated and so we can begin the integration of German land, in a lot Imperial regions we occupy there is strong German majority, however it may be possible in the future to integrate them if enough autonomy is given..." 
 
KX_PL_SOC_Aim_South:0 "Aim to the South"
KX_PL_SOC_Aim_South_desc:0 "To the South lies Galicia, maybe the land is not the most economicaly developed or exceptionaly abundant in resources, however it has quite sizable population that can be used to expand our general volume of production, not to mention that there are several important Polish cities within the region, something we can't ignore for political reasons." 

KX_PL_SOC_Integrate_South:0 "Integration of Galicia"
KX_PL_SOC_Integrate_South_desc:0 "With liberation of Galicia we can finally utilise it to further development of our country, and although there is sizable population of Ukrainians living in thsoe lands we can hope to convince them that in reality working class knows no borders, and we fight for the prosperity of every citizen of our country!"
 
KX_PL_SOC_Eastern_Land_Reform:0 "Land Reform Extension"
KX_PL_SOC_Eastern_Land_Reform_desc:0 "There is a lot to be done in our newly acquired lands, it's agricultural structure is not only severly inefficient and unfair for peasants, it is also unspokenly backwards technologicaly, we indeed have a lot to be done here, however when done this region presents an opportunity to be our breadbasket." 

KX_PL_SOC_Fight_Illiteracy:0 "Fight Illiteracy"
KX_PL_SOC_Fight_Illiteracy_desc:0 "Another issue aside from economic backwardness, is social one (that of course reinforces the former, and vice versa), and the gravest of sins others have commited in those lands is neglecting common education, now we have to compensate for those centuries of neglect by beggining radical education campaign aimed at elimination of illiteracy within our borders." 

KX_PL_SOC_Extension_of_Industrial_Policies:0 "Industrial Policies Extension"
KX_PL_SOC_Extension_of_Industrial_Policies_desc:0 "Acquisition of new industrial assets is surely welcomed, however we can't forget that wrongly weilded tool is usless, that's why we should immidietly begin integration of this newly acquired industry so that it can be utilised at its fullest as soon as possible." 

KX_PL_SOC_Mining_Expansion:0 "Mining Expansion"
KX_PL_SOC_Mining_Expansion_desc:0 "Our Economy craves for resources, thankfully some of our newly acquired lands consist of still unutilised deposits, we should quickly begin their excavation so that our ever-expanding industry don't starve." 

KX_PL_SOC_Federal_or_Unitary_Poland:0 "Federal Poland?"
KX_PL_SOC_Federal_or_Unitary_Poland_desc:0 "The integration of new lands have made Poland a multi-ethnic country, it rises the question - should the shape of our administration be reformed to accomodate to those changes?"

KX_PL_SOC_Unitary_Poland:0 "Singular Polish State!"
KX_PL_SOC_Unitary_Poland_desc:0 "There are other nationalities in our country and they are welcomed with open hands, however we need to retain unitary nature of our state, any other solution would threaten PZBS' ability to excercise its power, leading to unexpected turbulences." 

KX_PL_SOC_Federal_Poland:0 "Peoples Federal Republic!"
KX_PL_SOC_Federal_Poland_desc:0 "Our land expansion left a visible mark on ethnic structure of our country, we can not just deny it. Although decentralisation of economic authority is out of question, we won't say the same about other forms of political power, seceding some of them may prove beneficial to our country, making our state inclusive toward minorities will surely allow us to create truly new 'Polish' nationality of international proletariat, so that we can aim togeather towards Socialist Utopia!"

### Events ###
polsoc.1.t:0 "Gentlemen from America"
polsoc.1.d:0 "A plane from America has landed this morning in newly declared Socialist Poland, and aboard it were two peculiar gentlmen: Michał Kalecki - claiming to predate Keynes in his theories, as well as Oskar Lange - Mises' mortal enemy. Both of them being renowned socialist economists hope to help build the New Poland, free from reactionary opression, however only time will tell what their role in it will be..."
polsoc.1.a:0 "They surely will find their place here"

polsoc.2.t:0 "Socialist Experiment?"
polsoc.2.d:0 "Kalecki and Lange have not simply sat around since they came to Poland, that have to be admitted. They quickly gathered following from among the more educated echelons of the party and laid a proposal to the Communist Party Leadership, they made a great promise to deliver unprecedented economic growth in exchange for total control over the planning board, supporting their claim with theories and calculation that highest party officials were barely able to understand. But one is certain, they and their supporters are ready to go to great lengths to prove that socialist economy rightly implemented can be unparalleled!"
polsoc.2.a:0 "Reasonable. Let the Great Experiment Commence!"
polsoc.2.b:0 "They know nothing about situation here. Denied!"

polsoc.3.t:0 "Rise of the Economists"
polsoc.3.d:0 "The same day Kalecki and Lange assumed their newly found position, their crusade to prove the world how efficient Socialism can be has already begun! They quickly started outlying plans for long term economic development, as well as for quick resolution of the current economic crisis caused by the collapse of German market, and the only visible possiblilty for the moment is aiming toward self sufficency as much as possible, thankfully the most important resources of coal and iron are still available within our borders. However there is one bigger concern, the instability from within the party, and in such conditions economy can not grow properly, fortunately since the economic affairs are already controlled by us there still is one hope: since the succesfull revolution the party cadre expanded significantly, fueled by various opportunists, perhaps we could promise them cosy bureaucratic positions (away of course from the real decision making process) in exchange for simply excercising their democratic rights within the party, ousting the current Leadership in the process..."
polsoc.3.a:0 "That is quite clever I have to admit..."

polsoc.4.t:0 "Chairmanship of 'PZBS'"
polsoc.4.d:0 "With our power secured the only thing left is to ensure that nothing similar happens to us, and we are going to acomplish it by creation of 'PZBS' ('Polski Związek Budowniczych Socjalizmu'). It will mainly consist of the high ranking state officials (ministries members), and members of specilly designated economic commissions, serving in effect as the highest chamber of the party, and the highest (although semi-unofficial) authority in the Polish State. The only thing left is choosing who will be appointed on the post of the 'Chief Architect of Socialism'..."
polsoc.4.a:0 "Kalecki's Socialist 'Keynesianism' shall bring us forward!"
polsoc.4.b:0 "Lange's 'Market' Socialism shall launch us to future!"

polsoc.5.t:0 "Gorwing Housing Demand"
polsoc.5.d:0 "With rapid expansion of our Industry we witness equaly rapid migration from countryside to cities which creates massive demand for new homes for workers wanting to settle in urban areas, unless we do something this issue can threaten our economic growth, and even fabric of the society itself..."
polsoc.5.a:0 "Don't worry, our experts are already working on it!"

polsoc.6.t:0 "Question of Federalisation"
polsoc.6.d:0 "Integration of new lands is going swiftly, however the question of administrative divisions has created a... divide within PZBS, the most obvious solution is to simply create new divisions with the same level of authority as our core territory, that is not very high... Another proposal is to change the fundamentals of our state and transform it into 'Polish Federal Peoples Republic', giving limited political autonomy to designated regions. Although economic autnomy is out of question."
polsoc.6.a:0 "Poland is One and Indivisable!"
polsoc.6.b:0 "Poland will be reorganized into Peoples Federal Republic, for a just and prosperous society!"

polsoc.7.t:0 "Success of Galician Campaign"
polsoc.7.d:0 "Our forces were able to secure Galicia but military conclusion of this conflict may be hard to achieve considering Carpatian mountains dividing us and the enemy, however there is a possiblity that Austria may not want to continue this conflict as well, maybe we should consider a ceasfire if they are willing sacrifice Galicia..."
polsoc.7.a:0 "Send delegation to sign peace over Galicia"
polsoc.7.b:0 "We can only feel secure when Austria is fully defeated!"

polsoc.8.t:0 "Galicia is Lost"
polsoc.8.d:0 "Circumstances made it so that our troops were unable to hold onto Galicia, now Polish government is vowing for peace if we are willing to secede Galicia to them."
polsoc.8.a:0 "This war is too costly..."
polsoc.8.b:0 "Galicia is ours, no matter what!"

polsoc.9.t:0 "Victory of Negotiations"
polsoc.9.d:0 "The peace talks appear to be successfull this is a great day for both Polish Diplomacy and for Polish Military."
polsoc.9.a:0 "But most importantly for the Polish People!"

polsoc.10.t:0 "Peace Talks Unsuccessful"
polsoc.10.d:0 "Unfortunately we were unable to speak to Austrians reason, the conflict will only be solved by more bloodshed..."
polsoc.10.a:0 "Let's hope for swift military resolution..."

