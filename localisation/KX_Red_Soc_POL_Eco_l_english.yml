SOC_POL_KR_GATHERING_STORM_DESC:0 "Ever since the end of the War, situation in Poland have been severely unstable, those circumstances may be hard for common people but it also presents an opportunity for socialist struggle and betterment of their lives, and who knows, perhaps some visionaries may be able to shed a crimson light on this god forsaken land..."