national_democracy_subtype:0 "National Democracy"
national_democracy_subtype_desc:0 "§Y(National Democracy)§!\n\nTracing its early origins to Polish Positivism and Organic Work movements, National Democracy is the brainchild of Roman Dmowski, the Father of the Polish National Thought. Putting the good of the Polish nation as the highest good, National Democrats strive to create a united society above class distinctions. While initially not stressing any particular emphasis on religion, over time the movement started gravitating towards Catholic Church, seeing it as the stronghold of Polish Nation. While arguing for a stronger form of government, Endecja still upholds democracy as the preferred political system when tied together with the uplifting of the Polish population and assimilation of most minorities within the bounds of a primarily Polish majority state. The matter of economy is less well defined inside the National camp, although the most popular position is a free market with enough government intervention to protect the nation's interests. When it comes to foreign affairs, National Democracy is fiercly anti-german and sees Russia as the best partner to contain German Empire's ambitions."

national_radicalism_subtype:0 "National Radicalism"
national_radicalism_subtype_desc:0 "§Y(National Radicalism)§!\n\nA byproduct of the younger generation of Endecja members becoming politically active, National Radicalism is the more fervent form of National Democracy, taking the Polish National Thought to its extremes. To the young radicals, a unified Polish nation is a Catholic nation and any notion of atheism or agnosticism professed by old Endecja is scoffed at. When it comes to a vision for a government system they are also more radical, advocating for highly hierarchical or even outright totalitarian forms. National Radicals also don't try to hide their disdain for most ethnic minorities inside Poland's borders. Radicals ultimately became divided between Bolesław Piasecki's wing fascinated with more left wing modes of revolution, and Antoni Szacki's camp remaining in the mainline National-Democratic movement."


