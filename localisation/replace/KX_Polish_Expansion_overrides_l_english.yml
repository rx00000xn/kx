###PLC military tree Overwrites
PLC_integrating_two_armies:0 "Reconsider our Military Doctrine"
PLC_integrating_two_armies_desc:0 "Up to this point Polish military has been dominated by German and Austrian military doctrine, perhaps it is time to forge our own path."

PLC_impenetrable_defense:0 "An Impenetrable Defence"
PLC_impenetrable_defense_desc:0 "Poland's strength is not in its offensive capability, but in its ability to withstand any blow. Victory is not obtained by some fantastical "killing blow" but rather by destroying the enemy's will to advance."

PLC_reforming_high_command:0 "Reforming the High Command"
PLC_reforming_high_command_desc:0 "The Polish High Command had been a patchwork combination of officers from both the forces Loyal to the Royal Council, and those supporting Legionists. It is time we finally create a unified command structure."

PLC_tank_innovations:0 "Homebrewed Designs"
PLC_tank_innovations_desc:0 "The first 'Panzers' in Polish military, were old dilapidated models from the Weltkrieg. Even now the models we use are heavily based on German Panzer designs. It is time to take the first steps to creating the first truly unique Polish Tanks."

