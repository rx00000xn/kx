#Ideologies
red_national_radicalism_subtype:0 "Red National Radicalism"
red_national_radicalism_subtype_desc:0 "§Y(Red National Radicalism)§!\n\nTaking nationalist and religious convictions of the Radical faction of the National-Democratic camp, followers of Bolesław Piasecki advocate for more revolutionary approach, both socially and economically. Red National Radicals support planned economic system inspired by Bolshevik 'War Communism', while utilising elements of western Totalism to reconcile seemingly incompatible views of National-Democracy and State Socialism. Dubbed by its opponents as 'Endokomuna' (a pejorative way of saying 'National-Democratic Communism'), its supporters aim for elimination of old, and establishment of new elites, essentially resulting in creation of a totalitarian system, entrenched by extreme nationalism, and commitment to Polish Catholicism."

christian_bolshevism_subtype:0 "Serene Socialism"
christian_bolshevism_subtype_desc:0 "§Y(Serene Socialism)§!\n\n'Serene Socialism' - which name comes from 'Jasna Góra' (literally 'Serene Mountain') the most important site of Marian devotion in Poland - grew out of Polish National-Revolutionary movement after Jan Dobraczyński's rejection of anti-semitism. Serene Socialists stress the importance of Christian values and strong commitment to National identity, while adapting Bolshevik revolutionary action and economics; thus its adherents are often also called 'Christian Bolsheviks'. What differentiates this current of thought from mainline Red National Radicalism is rejection of any 'ethnic theories', focusing instead more on the importance of Religion and Collectivism, rather than overly radical xenophobia and exceptionalism of individual."

radsoc_social_futurism_subtype:0 "Social-Futurism"
radsoc_social_futurism_subtype_desc:0 "§Y(Social-Futurism)§!\n\nPioneered by the major figures of the earlier Cubo-Futurist and Ego-Futurist movements of Russia, and influenced by the Italian Futurists like Marinetti that rose before them, Social Futurism represents the new wave of Leftist-inspired Futurist thought that fuses Socialist ideology with this rising cultural phenomena. Stepping away from the frequently-Right Wing thoughtform, Social Futurists such as Vladimir Mayakovsky, Natalia Goncharova, and Velimir Khlebnikov instead infuse both Utopian and Scientific Socialist ideas in order to blaze a pathway towards a new, Red-tinted vision for the future. In a Social Futurist system, the masses - frequently under the direction of a central government, technocratic council, or artistic vanguard - will work to erect a utopian society that endlessly marches forward to progress towards a modernized, urbanized Socialist future atop a speeding Red wave of ever-evolving theory, policy, art, and more."

hempelianism_subtype:0 "Hempelian Thought"
hempelianism_subtype_desc:0 "§Y(Hempelian Thought)§!\n\nBorn from the spiritual journey of Jan Hempel, Hempelianism, or Hempelian Thought, is a system of beliefs as complex as its progenitor. Taking inspirations from Polish romantic literature, Nietzschean philosophy, Slavic Paganism, and even Hindu beliefs, Hempelianism seeks liberation of humanity, in ways both spiritual and material. This school of thought remains strongly against any forms of organised religion, while endorsing personal spiritual experiences, often manifesting in forms of veneration inspired by pre-christian spirituality, albeit usually in non-theistic manner. In its practical form, Hempelians advocate for society based on cooperatives, associations, communalism, and syndicalism, being indeed inspired by the Anarcho-Syndicalism of the west. However to Jan Hempel the economic programme is of secondary concern, seeing Socialism as a motor for personal liberation. Aside from Jan Hempel himself, Bolesław Bierut has been exerting great influence on Polish Syndicalist movement, while being Hempel's desciple, his efforts have been focused more on the practical implementation of Syndicalist ideas, trying to 'tame' Hempel's idealism, while taking some inspirations from national-syndicalists in the west; although nationalism in Hempelian Thought is treated rather instrumentally, acknowledging its unifying factor, while also exposing its role in the systems of oppression. Ultimately the Hempelians' goal is simple - personal liberation through socialism!"

tot_hempelianism_subtype:0 "Hempelian Thought"
tot_hempelianism_subtype_desc:0 "§Y(Hempelian Thought)§!\n\nBorn from the spiritual journey of Jan Hempel, Hempelianism, or Hempelian Thought, is a system of beliefs as complex as its progenitor. Taking inspirations from Polish romantic literature, Nietzschean philosophy, Slavic Paganism, and even Hindu beliefs, Hempelianism seeks liberation of humanity, in ways both spiritual and material. This school of thought remains strongly against any forms of organised religion, while endorsing personal spiritual experiences, often manifesting in forms of veneration inspired by pre-christian spirituality, albeit usually in non-theistic manner. In its practical form, Hempelians advocate for society based on cooperatives, associations, communalism, and syndicalism, being indeed inspired by the anarcho-syndicalism of the west. However to Jan Hempel the economic programme is of secondary concern, seeing socialism as a motor for personal liberation. Aside from Jan Hempel himself, Bolesław Bierut has been exerting great influence on Polish Syndicalist movement, while being Hempel's desciple, his efforts have been focused more on the practical implementation of syndicalist ideas, trying to 'tame' Hempel's idealism, while taking some inspirations from national-syndicalists in the west; although nationalism in Hempelian Thought is treated rather instrumentally, acknowledging its unifying factor, while also exposing its role in the systems of oppression. Ultimately the Hempelians' goal is simple - personal liberation through socialism!"

tot_zadrugism_subtype:0 "Zadrugism"
tot_zadrugism_subtype_desc:0 "§Y(Zadrugism)§!\n\nLargely inspired by Nietzsche and Sorel, Zadrugism (coming from the word 'Zadruga' - meaning 'The Community') formulated by Jan Stachniuk is a Panslavist and nationalistic ideology, striving for revival of the perceived ancient Slavic culture. Rejecting both Christianity and ideals of the Enlightenment, Zadruga could be described as sort of distorted reflection of National-Democracy, being similar to one another on historiosophic level, Zadruga however staunchly rejects Christianity 'Endecja' gravitated towards; with another major difference being desire for more revolutionary, classless, and National-Syndicalist, organisation of society."

socdem_technocracy_subtype:0 "Technocracy"
socdem_technocracy_subtype_desc:0 "§Y(Technocracy)§!\n\nTechnocracy is a form of government in which the decision-makers are selected on their basis in a given area of responsibility, particularly with regard to scientific or technical knowledge. Advocating for ideas such as ‘energy-accounting’ and the total acceleration of society and culture towards a new, efficient, and rationally-developed mindset supported by political systems free of bipartisan politics and factionalism, Technocracy is a vaguely Left-wing ideology, though technocratic ideas are common in different ideologies across the spectrum. Seeing Capitalism as wasteful and traditional Socialism as inefficient, Technocracy seeks to break the mold as it leads humanity towards an enlightened utopia."

radsoc_technocratic_socialism_subtype:0 "Technocratic Socialism"
radsoc_technocratic_socialism_subtype_desc:0 "§Y(Technocratic Socialism)§!\n\nWhile the basic understanding of Technocratic Socialism, often confused with the Technocratic movement despite being two distinct entities with differing origins, could lead some to think it's a mere combination of technological advancement with socialist policies such a view would be particularly limited. For the technocratic tendency within Socialism is often born out of the very material understanding of the world through the use of the political ideology, although some say pure science of Marx, developed by the Father of Communism and further expanded upon by a diverse group of thinkers. The most important of the groups fitting such a descriptor is the Bolshevik 'Proletkult', the 'Proletarian Culture' movement having its origins in the ideological Vpered, or 'Forward', faction of their party. Led by the coalition of Anatoly Lunacharsky, a close friend of V.I. Lenin and the People's Commissar of Education during the Revolution, Alexander Bogdanov, one of Lenin's greatest rivals for a time and the man around whom the original Vpered coalesced, and Valerian Polyansky, editor-in-chief of proletarian literature and progenitor of Soviet censorship. The main principle of the Proletkult is their devotion to progress and ardent 'religious' belief in the collective society and Scientific Socialism, a construct which gave birth to the Proletarian Religion and the 'God-Building' principle. Based on the Auguste Comte's 'Religion of Humanity' the Proletkultists deify the Socialist Enlightenment given form as a new faith, one capable of replacing the corrupt old lore of the dying bourgeoisie world, a plane in which even immorality may be achieved according to A. Bogdanov and his experiments with blood transfusion. Another important thinker of the Proletkult, although distinct from the Lunacharsky group, is Aleksei Gastev. Proponent of a Syndicalist-Technocratic Soviet system breaking with the orthodox Leninist tradition, Gastev is the creator of the 'Ustanovka' concept, aiming to install a revolutionary mental attitude within Russia through the use of social engineering and scientific management drawing upon the works of Frederick Taylor. With the great mission of labour overseen by a technically minded avant-garde the proletariat shall move time itself forward."

syn_sorelianism_subtype:0 "Sorelianism"
syn_sorelianism_subtype_desc:0 "§Y(Sorelianism)§!\n\nModern Sorelianism, while obviously having its core in the ideas proposed by the highly influential French political philosopher Georges Sorel, has been carried forwards into the Communard reality by the intellectual duo of Georges Valois and Édouard Berth. Sorelianism at first was born out of the revision and rejection of orthodox Marxism, for 'Socialism has died' due to the 'Decomposition of Marx'. Thus Sorel expanded on the theories of the French Anarchist Pierre-Joseph Proudhon, another monumental influence on Valois and Berth who founded the 'Cercle Proudhon', advocating that through direct action against the bourgeois enemy and the 'myth' of the general strike as expressed in Revolutionary Syndicalism shall the working class attain better living conditions. Yet the 'productive energy' of the bourgeois class, put into slumber due to the degenerating influence of the greatest evil which ever manifested in France, that being liberal democracy, will once again wake after the class war rejuvenates both the autonomous proletariat and the newly productive bourgeoisie. The disdain towards parliamentary democracy and secularist spirit can even be seen in Sorelians' support for Classicism in art. While the rejection of democracy led some Sorelians to support a revolutionary monarchy, especially those that originated from AF like Valois himself, such views were mostly dropped after the establishment of the Commune. Another important concept in Sorelianism is the exaltation of the warrior-individual, manifestation of true freedom when combined with devotion to the family, the weak and labour ethic. In a fully realized Sorelian society as expanded on by Valois such a group would serve as the ruling class, somewhere above the ordinary proletariat. The modern Sorelian duo continue to follow the core tenets of Sorel while introducing many elements unique to their thinking, such as Maurrassian Integral Nationalist influences carried from their days in Action Française, rabid Anti-Semitism, Berthian synthesis between Marxian materialism and Bergsonian metaphysics, creation of the Estates General of French Production and introduction of stable gold-backed currency as outlined by Valois' long-time collaborator Jacques Arthuys, slightly increased centralization compared to Sorel's original vision and the mixing of revolutionary syndicalism and corporatism. Sorelianism, despite being a distinct movement, laid the foundations for the eventual development of National Syndicalism into the wider Totalist Charter."

natpop_national_democracy_subtype:0 "National Democracy"
natpop_national_democracy_subtype_desc:0 "§Y(National Democracy)§!\n\nTracing its early origins to Polish Positivism and Organic Work movements, National Democracy is the brainchild of Roman Dmowski, the Father of the Polish National Thought. Putting the good of the Polish nation as the highest good, National Democrats strive to create a united society above class distinctions. While initially not stressing any particular emphasis on religion, over time the movement started gravitating towards Catholic Church, seeing it as the stronghold of Polish Nation. While arguing for a stronger form of government, Endecja still upholds democracy as the preferred political system when tied together with the uplifting of the Polish population and assimilation of most minorities within the bounds of a primarily Polish majority state. The matter of economy is less well defined inside the National camp, although the most popular position is a free market with enough government intervention to protect the nation's interests. When it comes to foreign affairs, National Democracy is fiercly anti-german and sees Russia as the best partner to contain German Empire's ambitions."

#radsoc_paternal_socialism_subtype:0 "Paternal Socialism"
#radsoc_paternal_socialism_subtype_desc:0 "§Y(Paternal Socialism)§!\n\nPaternal Socialism, also called Conservative Social Populism, Paternalistic Conservatism, or more rarely Christian Conservative Socialism in the Western World, is a unique thoughtform that attempts to fuse the seemingly contradictory ideas of traditional Conservatism and non-Marxist Socialism or Progressive Populism. Born during the Industrial Revolution in England and Germany but now increasingly common outside the Western World such as in Latin America or Africa where the rules and expectations of European-biased Socialisms do not apply, these strange systems seek to build moral, Conservative societies usually, but not always, rooted in theist ethics, Conservative welfare economics, class collaboration and cooperation, and/or ideas of Civic Nationalism and non-extremist Nationalist Patriotism. Often linked to ideas of Market Socialism, Christian Distributism, charity economics, Bismarck's State Socialism and economic interventionism, Red Toryism, and other wealth-sharing programs, Paternal Socialists seek to build egalitarian, non-predatory economic systems geared against ideas of class struggle that fuse Capitalist and Socialist ideas in a Consevative and Paternalistic package for the good of their usually traditionalist and nationalist peoples while undermining and weakening normal Socialist and Leftist movements to preserve tradition and societal stability, even if that puts them at odds with other Socialists or Conservatives around the globe."

