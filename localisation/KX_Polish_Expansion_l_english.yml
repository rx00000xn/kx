### Focuses ###

###Legionist Update
KX_PL_ZL_DIVIDE_IN_THE_MOVEMENT:0 "Divide in the Legionist Camp"
KX_PL_ZL_DIVIDE_IN_THE_MOVEMENT_desc:0 "The Legionist Movement Remains divided. We must take steps towards establishing clear leadership."

KX_PL_ZL_MILITARY_CONSTITUTION:0 "Legacy of Autocracy"
KX_PL_ZL_MILITARY_CONSTITUTION_desc:0 "We must decide on shape of the government, and whether we will focus on closed circle of old Legionists, or open it to military as a whole."

KX_PL_ZL_MATTER_OF_TRADE_UNIONS:0 "Matter of Trade Unions"
KX_PL_ZL_MATTER_OF_TRADE_UNIONS_desc:0 "Trade unions has helped us in the times of need, now we must decide their fate."

KX_PL_ZL_QUESTION_OF_THE_ELITES:0 "Question of the Elites"
KX_PL_ZL_QUESTION_OF_THE_ELITES_desc:0 "Elites of the past has cooperated with Germans, now we must decide if we will work with them, or establish new ones."

KX_PL_ZL_FUTURE_OF_ECONOMY:0 "Shape of Economy"
KX_PL_ZL_FUTURE_OF_ECONOMY_desc:0 "Economy has been under German domination for too long! It isn't however simple matter how to reform it. Should we centralise the economy, or favour more corporatist-adjacent one."

KX_PL_ZL_STATE_COUNCIL:0 "Making of the State Council"
KX_PL_ZL_STATE_COUNCIL_desc:0 "State Council will Govern our nation, but we must decide the shape of it, and whether will it be closed to military personnel, or opened for civilians too."

KX_PL_ZL_LEFT:0 "Piłsudski the Socialist"
KX_PL_ZL_LEFT_desc:0 "Left Wing of the Legionist movement has come on top, now it is time for the young 'Piłsudskists'!"

KX_PL_ZL_RIGHT:0 "Piłsudski the Statesman"
KX_PL_ZL_RIGHT_desc:0 "Legionist Right Wing will bring era of national cooperation, not strife!"

KX_PL_ZL_CENTER:0 "Piłsudski the Patriot"
KX_PL_ZL_CENTER_desc:0 "The Castle Holds!"

##
KX_PL_ZL_CORPORATISM:0 "Organization Along the Corporate Lines"
KX_PL_ZL_CORPORATISM_desc:0 "Patriotism can not be confined to class, we are all Polish and we will cooperate for the benefit of all."

KX_PL_ZL_APPROACH_CAPITALISTS:0 "Reconcile with the Owning Class"
KX_PL_ZL_APPROACH_CAPITALISTS_desc:0 "While the Capitalists worked with German backed government, they can not be blamed for that! Such collaboration helped economy to develop and now we will finally utilise for the benefit of our Nation."

KX_PL_ZL_LEFT_ECONOMY:0 "Legions' Social Radicalism"
KX_PL_ZL_LEFT_ECONOMY_desc:0 "Piłsudski came from the PPS, and although we aren't deeply associate with it any longer, its social radicalism has been carried over, and even enhanced! We will heal this Nation!"

KX_PL_ZL_STATE_ECONOMY:0 "Supremacy of the State"
KX_PL_ZL_STATE_ECONOMY_desc:0 "Nation is weak without the State; it is the State that gives direction to the masses, both culturally and economically."

KX_PL_ZL_NATIONALIZE_INDUSTRY:0 "Obliterate the Capitalist Collaborators"
KX_PL_ZL_NATIONALIZE_INDUSTRY_desc:0 "The biggest profiteers of what could basically be called German occupation, were - other than Germany itself - Polish capitalists. In retaliation all of their wealth will be nationalised, for the benefit of all Polish people!"

KX_PL_ZL_THREE_WAY_ECONOMY:0 "Three-Way Ownership"
KX_PL_ZL_THREE_WAY_ECONOMY_desc:0 "Economy will be organize on Three angles - small production will remain private, medium sized industries will be organized under worker-owned associations, and big enterprises will remain in State hands."

KX_PL_ZL_NATIONAL_SYNDICALISM:0 "Syndicalism in Service of Nation"
KX_PL_ZL_NATIONAL_SYNDICALISM_desc:0 "Direct control over the economy will be inefficient, and cooperation with the owning class will be unjust towards the People; thus our state will be organized along the syndicalist lines!"

KX_PL_ZL_WORKER_EMPLOYER_COOPERATION:0 "Replace Corporations"
KX_PL_ZL_WORKER_EMPLOYER_COOPERATION_desc:0 "Whatever our view on private ownership might be, Corporations had proven to only bring disorder into society. We will replace them with state wide organizations working in a pyramidal manner."

KX_PL_ZL_ORGANIZE_TRADE_UNIONS:0 "Mandatory Trade Union Membership"
KX_PL_ZL_ORGANIZE_TRADE_UNIONS_desc:0 "So-called 'lumpen proletariat' has to be shaken! Trade Union membership will be made mandatory, helping us organise production, and society in general; all this under state's guiding hand, of course."

KX_PL_ZL_LIMIT_STRIKE_RIGHTS:0 "Unison of Employers and Employees"
KX_PL_ZL_LIMIT_STRIKE_RIGHTS_desc:0 "While it is true that trade unions helped us get into power, we can't be confined by their whims, and whines; their activity will have to be limited and competencies transferred to organisations combining both employees and employers"

KX_PL_ZL_FAVOUR_WORKERS:0 "Society of Producers"
KX_PL_ZL_FAVOUR_WORKERS_desc:0 "The bourgeoisie shall be no more! Trade unions have proven to be efficient form of organisation, we will integrate them into state governmental structure, with a mix of bureaucrats and workers, being tasked with decision making. This form of organisation will give the power to the working class, under the guidance of the elite, unlike in capitalism however - elite born of merit!"

KX_PL_ZL_FAVOUR_EMPLOYERS:0 "An Organic State"
KX_PL_ZL_FAVOUR_EMPLOYERS_desc:0 "Nature needs to maintain balance, and so needs every state; we will strike this balance by maintaining appropriate share of influence for every class."

KX_PL_ZL_NATIONALIZATION_AGRICULTURE:0 "Control the Village"
KX_PL_ZL_NATIONALIZATION_AGRICULTURE_desc:0 "Cities have to be provided with steady grain flow, or otherwise we won't be able to re-industrialise after recent collapse. That means that we also can't rely on old aristocracy, and so agriculture has to be managed by the state."

KX_PL_ZL_ASSOCIATE_AGRICULTURE:0 "Associate Agriculture"
KX_PL_ZL_ASSOCIATE_AGRICULTURE_desc:0 "Old landowning elite will have to be abolished, and their land organised into free associations of producers."

KX_PL_ZL_HEIR_OF_NOBILITY:0 "Ally the Gentry"
KX_PL_ZL_HEIR_OF_NOBILITY_desc:0 "Polish landowners, the remnants of nobility, may prove to a worthy ally in the countryside. We will seek cooperation with them."

##Left Tree

#Left-PPS

KX_PL_AS_COMMON_COUP:0 "March, March, Warsaw!"
KX_PL_AS_COMMON_COUP_desc:0 "Royal Council is no more, and the spirit of 1905 is in the air again!"

KX_PL_AS_TALKS_WITH_OFFICER_CORPS:0 "Secure the Officer Corps"
KX_PL_AS_TALKS_WITH_OFFICER_CORPS_desc:0 "Even though Majority of Military Supports our actions it is still necessary to convince a few wild oats."

KX_PL_AS_RESTRUCTURISATION_OF_POLISH_SOCIETY:0 "Restructuring of Polish Society"
KX_PL_AS_RESTRUCTURISATION_OF_POLISH_SOCIETY_desc:0 "It was not a simple coup, but a revolution! We have a lot of work to do and healing our nation from foreign capital is our most important concern."

KX_PL_AS_UTILISE_REVOLUTIONARY_UPHEAVEL:0 "Utilise Revolutionary Upheaval"
KX_PL_AS_UTILISE_REVOLUTIONARY_UPHEAVEL_desc:0 "Revolutions always come with some excesses, and it is necessary to utilise those excesses in our favour."

KX_PL_AS_CALM_DOWN_JINGOISTS:0 "Calm Down Jingoist Sentiments"
KX_PL_AS_CALM_DOWN_JINGOISTS_desc:0 "Although Revolutionary spirit is essential we still are not strong enough to challange Germany, let's not provoke them."

KX_PL_FATE_OF_COUP:0 "Song of Resurrection"
KX_PL_FATE_OF_COUP_desc:0 "With most pressing meter regarding transition of power settled, the time has come for the main show!"

KX_PL_AS_UNITED_FRONT:0 "PPS with Bold S"
KX_PL_AS_UNITED_FRONT_desc:0 "Polish Democratic Socialism triumphs. It is time to create more just society for the Polish people!"

KX_PL_AS_BUTCHERS_OF_DEMOCRACY:0 "Political Verification Bureau"
KX_PL_AS_BUTCHERS_OF_DEMOCRACY_desc:0 "We can't allow non-socialist parties ruin what we build. Thus we will create 'Biuro Politycznej Weryfikacji', tasked with (as the name may suggest) verifying whether one party might be a threat to the public. Of course we will try ensuring it being a legitimate process, and not something done at a whim, a mix of government appointed officials, judges, local leaders, and trade union members will all have their say in the process."

KX_PL_AS_INSTITUTIONALIZE_AS:0 "Codifying the 'Socialist Action'"
KX_PL_AS_INSTITUTIONALIZE_AS_desc:0 "'Akcja Socjalistyczna' has been a paramilitary arm of the Polish Socialist party, consisting mainly of younger, more radical members. We should codify their structures, for both better control over them, and to utilise them in being newly built socialist state."

KX_PL_AS_RED_PARLIAMENTARISM:0 "Threats of Democracy"
KX_PL_AS_RED_PARLIAMENTARISM_desc:0 "While we firmly support democracy a 'liberal democracy' can be seen as deeply flawed, allowing forces of reaction to regain their ground. We need to decide to what degree should we interfere in the democratic process..."

KX_PL_AS_CHAMPION_UNITED_FRONT:0 "Broadening Our Horizons"
KX_PL_AS_CHAMPION_UNITED_FRONT_desc:0 "Throughout years our party has torn between moderation and entering the new political reality, or radical action against the regime; but those days are over, now the time has come for reconciliation with all that were harmed in the process, and creating a broad and united Socialist Front!"

KX_PL_AS_PRACTICAL_IMPLEMENTATION:0 "Socialism in Practice"
KX_PL_AS_PRACTICAL_IMPLEMENTATION_desc:0 "Our government is finally in position where we can implement our economic programme, and no compromises will be made! Putting that aside, it still isn't clear how are we go about achieving socialism, but there are economists that might have an idea...."

KX_PL_AS_SHAPE_OF_REPUBLIC:0 "Literal Social Democracy"
KX_PL_AS_SHAPE_OF_REPUBLIC_desc:0 "We are a true SOCIAL democracy, contrary to more moderate wing of our party we reject soft course of actions and stay true to our words. Cooperative society is about to begin!"

KX_PL_AS_SINGULAR_ASSEMBLY:0 "Uniform Parliament"
KX_PL_AS_SINGULAR_ASSEMBLY_desc:0 "Having more than one chamber of parliament is detrimental to the efficiency and flexibility of legislation. We don't need such things as senate, a product of feudalism!"

KX_PL_AS_ADDITIONAL_LABOUR_ASSEMBLY:0 "Designate Labour Assembly"
KX_PL_AS_ADDITIONAL_LABOUR_ASSEMBLY_desc:0 "While supporters of Councils are right to a degree, the party mainline is still in favour on basing its governance on state-wide trade unions. That's why a 'Zgromadzenie Pracy' ('Labour Assembly'), consisting of senior trade unionists will be formed, ensuring that the parliamentarians won't be disconnected from society as a whole, thanks to their advisory role."

KX_PL_AS_PARLIAMENT_MAJORITY:0 "Will of Majority"
KX_PL_AS_PARLIAMENT_MAJORITY_desc:0 "We surely believe in equality of different ethnicities, however giving them more power than they would normally get in democratic process stays in contradiction to our principles of the will of majority, and will only divide the working class, we want to create a civic 'Polishness' after all!"

KX_PL_AS_PARLIAMENT_MINORITY_SEATS:0 "Guaranteed Minority Seats"
KX_PL_AS_PARLIAMENT_MINORITY_SEATS_desc:0 "Democracy may be an important value, but minority groups deserve representation as well, so that the majority don't exercise their tyranny against them. Permanent seats reserved for minorities will prevent that."

KX_PL_AS_TOWARDS_PROGRESSIVE_SOCIETY:0 "Toward Progressive Society"
KX_PL_AS_TOWARDS_PROGRESSIVE_SOCIETY_desc:0 "We remember about our history, but we cannot be stranded by traditions, social and cultural progress is imminent, so we should embrace it!"

KX_PL_AS_REFRAME_POLISH_HISTORY:0 "Ties to the World of Art"
KX_PL_AS_REFRAME_POLISH_HISTORY_desc:0 "A lot of Polish artists and intellectuals are sympathetic to our cause, especially ones from the younger generation, we can count on their support and endorsement!"

KX_PL_AS_WELFARE_STATE:0 "Caring State"
KX_PL_AS_WELFARE_STATE_desc:0 "What is the point of Democracy if it doesn't help it's people? The state is there to care for its citizens, otherwise it has no legitimacy to exist."

KX_PL_AS_RURAL_SECURITY:0 "Extend Social Security to Rural Areas"
KX_PL_AS_RURAL_SECURITY_desc:0 "Rural Areas have for a long time been abandoned by social programs, deeming them too vast and focusing on urban areas to essentially save government money; this however can not stand in a truly socialist country! We will begin process of extending uplifting programs to the village, so that it not only seem like we help, but we truly help our people!"

KX_PL_AS_SIX_HOUR_WORK:0 "Implement 6-Hour Workday"
KX_PL_AS_SIX_HOUR_WORK_desc:0 "If a one can not rest they cannot participate in their community, and if he can not participate it leads to the obstruction of democracy. We will implement six-hour week for what is the purpose of work if we can not see its ploughs."

KX_PL_AS_RELIGIOUS_TAX:0 "Church Fund"
KX_PL_AS_RELIGIOUS_TAX_desc:0 "The Catholic Church have always been a sore in the eyes of socialists, but there is a way to deal with them peacefully, throughout creation of 'Church Fund'. Every religious organisation will be banned from collecting charity and instead declared believers will pay an appropriate religious tax for their denomination, everything will go through the state budget ensuring our control over clergy, furthermore all church properties shall be confiscated, and the land churches stand on will be the state property, although still leased to the clergy. Despite those measures it is still necessary to stress that no religion can have influence on our government, but not necessarily the other way around..."

KX_PLX_PPS_Truly_Patriotic_Socialism:0 "Poland is Unbreakable"
KX_PLX_PPS_Truly_Patriotic_Socialism_desc:0 "PPS has always been a party of independence, and now we will enshrine the Polish culture as high value, and while other nationalities will be respected, they still should consider joining such glorious Nation, so we will encourage assimilation, the same way France did with its regional cultures!"

KX_PL_AS_LOCAL_SELF_GOVERNANCE:0 "Ceding Competencies to Local Councils"
KX_PL_AS_LOCAL_SELF_GOVERNANCE_desc:0 "System of Councils is a peculiar one, while less politicised than traditional local governmental structures through its independence from the usual political system, it nevertheless also politicises every aspect of life through its direct involvement with its electors, in wrong hands it might be prone to corruption by one party, but it also might give more voice to the people. Only time will tell what the outcome in our country will be."

KX_PL_AS_LOCALIZED_WEALFARE:0 "Council Directed Welfare"
KX_PL_AS_LOCALIZED_WEALFARE_desc:0 "With great power comes great responsibility; local National Councils will be tasked with carrying healthcare, education, and local works."

KX_PL_AS_PARLIAMENT_ADMINISTRATIVE_SUPREMACY:0 "Parliamentary Supremacy"
KX_PL_AS_PARLIAMENT_ADMINISTRATIVE_SUPREMACY_desc:0 "Parliament is the only body we should entrust the country to be run, it is as direct in fulfilling the people's will as it can get, and any diffusion of political bodies will only lead to corruption and inefficiencies."

KX_PL_AS_GRAND_PROJECTS:0 "Labour Based Welfare"
KX_PL_AS_GRAND_PROJECTS_desc:0 "Instead of using local governmental units we will instead use economic units, such as individual factories, or soon to be enforced cooperatives; through partnership of government and labour, welfare for all will truly be realised!"

KX_PL_AS_COOPERATIVE_ECONOMY:0 "State Planning and Workplace Democracy"
KX_PL_AS_COOPERATIVE_ECONOMY_desc:0 "While the Government will conduct economic planning on macro-level, workers should still actively participate in their workplace. They will be able to exercise initiative in organisation of production, ending capitalist alienation and preventing over-bureaucratisation at the same time."

KX_PL_AS_COOPERATIVES_ON_MARKET:0 "Horizontal Organization of Enterprises"
KX_PL_AS_COOPERATIVES_ON_MARKET_desc:0 "Production will be organized along the lines of goods produced by 'Koncerns', serving as associations of enterprises with autonomy given to individual members. Those measures will limit the amount of economic bodies the government has to interact with, leading to greater efficiency and streamlining bureacratic oversight."

KX_PL_AS_HEAVY_INDUSTRY_SUPERVISION:0 "Nationalize Major Producers"
KX_PL_AS_HEAVY_INDUSTRY_SUPERVISION_desc:0 "No matter what form does the people's ownership over the means of production takes, it is only rational for the state to direct and coordinate it further. In order to do that major industries need to be nationalized, and the same has to be done with the infrastructure serving the public."
#KX_PL_AS_HEAVY_INDUSTRY_SUPERVISION_desc:0 "Even if we are to base our economy on cooperatives, those cooperatives still need to cooperate with the government in key sectors, thus heavy industries, including construction and military ones, need special degree of coordination; and while still at the hands of cooperatives, this extraordinarily important sector needs certain amount of top-down directives."
#KX_PL_AS_HEAVY_INDUSTRY_SUPERVISION:0 "Supervise Heavy Industry"
#KX_PL_AS_HEAVY_INDUSTRY_SUPERVISION_desc:0 "Heavy Industry need spacial attention of our government due to its strategic nature. In this sector the grip of the government have to be tight."

KX_PL_AS_LAND_REDISTRIBUTION:0 "Unconditional Land Reform"
KX_PL_AS_LAND_REDISTRIBUTION_desc:0 "Royal Council's land consolidation has benefited only the rich land owners; instead we will enforce a mixed system of land partition and common land, bringing cooperation to the village!"

KX_PL_AS_AGRICULTURAL_COOPERATION_AGENCY:0 "Parcel Great Estates"
KX_PL_AS_AGRICULTURAL_COOPERATION_AGENCY_desc:0 "Land consolidation has benefited only the rich land owners, deepening wealth disparity in the village. No more, most the land will be parcelled to the peasants that actually work on the land, while the remaining will stay in state or municipal councils' hands."

KX_PL_AS_Organise_Small_Producers:0 "Organize Small Producers"
KX_PL_AS_Organise_Small_Producers_desc:0 "While the state needs guiding role in the economy, some small amount of private ownership will remain in place, especially concerning the small trades. However we still can coordinate their production, most importantly the production of small farms after the elimination of large estates. Peasants will be encouraged to join agricultural associations for better coordination such as shared equipment use, and more efficient utilisation of land; such associations will then also deal with the sale of agricultural produce, ensuring better cooperation with the government."

KX_PL_AS_Expand_State_Enterprises:0 "Expand State Ownership"
KX_PL_AS_Expand_State_Enterprises_desc:0 "Small scale production is simply inefficient. Nationalization and state planning will be expanded upon small workshops leading to their consolidation. Agricultural production will be put under thighter state planning as well, mirroring the industrial management, although the land will be slowly integrated through mix of production associations, and incentivising peasants to migrate to the city."

##New
KX_PL_AS_ELEMENTS_OF_COUNCIL_SYSTEM:0 "Introduce Council Elements"
KX_PL_AS_ELEMENTS_OF_COUNCIL_SYSTEM_desc:0 "While the mainline of the radical wing of PPS sees their support base in trade unions, the most radical of radicals are in favour of borrowing soviet elements championed by Left-SRs in Russia; of course not in the extreme manner, but for the soviets to work in tandem with the more centralised forms of governance."

KX_PL_AS_COUNCIL_ASSEMBLY:0 "Create the Supreme Council"
KX_PL_AS_COUNCIL_ASSEMBLY_desc:0 "'Rada Najwyższa' - that is the 'Supreme Council', or the 'Supreme Soviet', will be introduced to work together with the lower house of the Parliament, while the National Assembly ('Zgromadzenie Narodowe') will remain as chief legislative body, the Supreme Soviet will take the role of the former Senate. Delegates will be chosen from bottom up by local National Councils through the regional ones and finally to the Supreme Council proper. This system will guarantee more checks on the government through two different electoral methods, and also make contact between government and the people stronger, and decision making more swift."

KX_PL_AS_MAINTAIN_MULTI_PARTY:0 "Maintain Liberal-Democracy"
KX_PL_AS_MAINTAIN_MULTI_PARTY_desc:0 "Other parties might have other ideas of how our country should be run, and it is us we consider to be right, however we can't obstruct the democratic system, for we may one day become tyrants we are supposed to fight with."

#Legionists
KX_PL_ZL_TAKES_POWER:0 "We - the First Brigade"
KX_PL_ZL_TAKES_POWER_desc:0 "We are the first Brigade, We are the Legions of Piłsudski, and we finally achieved our independence."

KX_PL_ZL_HUNT_THE_TRAITORS:0 "Hunt the Traitors"
KX_PL_ZL_HUNT_THE_TRAITORS_desc:0 "Now that we are in power the time have come to deal with German collaborationists, their treason shall not be forgotten."

KX_PL_ZL_REPLACE_ADMIN_APARATUS:0 "Purify the Administration"
KX_PL_ZL_REPLACE_ADMIN_APARATUS_desc:0 "Administrative apparatus have to be replaced with loyal Legionists, they truly shall be rewarded for their unwithering patriotism."

KX_PL_ZL_CENTRAL_TRADE_UNION:0 "Centralise Trade Unions"
KX_PL_ZL_CENTRAL_TRADE_UNION_desc:0 "Trade Unions may prove to be a useful ally, but they also need to be kept in check. By centralising them we will ensure that their leadership consist of 'right' people."

KX_PL_ZL_WELFARE_AUSTERITY:0 "Redirect Welfare Funds"
KX_PL_ZL_WELFARE_AUSTERITY_desc:0 "For now there is no time for such frivolities as welfare we have to defeat our neighbours to secure Polish independence, we NEED these founds."

KX_PL_ZL_MAINTAIN_CHADECJA_WELFARE:0 "Care in a Sufficient Manner"
KX_PL_ZL_MAINTAIN_CHADECJA_WELFARE_desc:0 "We need all funds we can find to finance our rearment, however we also cannot afford to lose people's support. We can at least maintain social security on sufficient level."

KX_PL_ZL_EXPAND_WELFARE:0 "Provide for the People"
KX_PL_ZL_EXPAND_WELFARE_desc:0 "What is the point of fighting for Poland if it leaves Polish people in misery? Life in new Poland have to be prosperous or we have no right to rule."

KX_PL_ZL_WORK_WITH_THE_CHURCH:0 "Work with the Church"
KX_PL_ZL_WORK_WITH_THE_CHURCH_desc:0 "Through centuries Catholic Church has amassed an admirable influence in Poland, we will work with them to further our goals."

KX_PL_ZL_GRIP_OVER_HEARTS:0 "Grip Over Hearts"
KX_PL_ZL_GRIP_OVER_HEARTS_desc:0 "By appealing to traditional values we can strengthen the uniformity of Polish Spirit and ensure continuous stability."

KX_PL_ZL_STRIKE_THE_CHURCH:0 "Strike the Church"
KX_PL_ZL_STRIKE_THE_CHURCH_desc:0 "Position of Catholic Church is dangerously strong in our country, we can not allow for such strong independent institutions in our state."

KX_PL_ZL_PROGRESSIVE_NATIONALISM:0 "Patriotism and Progress"
KX_PL_ZL_PROGRESSIVE_NATIONALISM_desc:0 "To be a Legionist is to be a patriot, but it also is to be a socialist. And the highest manifestation of patriotism is to strive for better tomorrow for those close to us!"

KX_PL_ZL_MATTER_OF_ECONOMY:0 "Matters of Economy"
KX_PL_ZL_MATTER_OF_ECONOMY_desc:0 "German investments were tremendously successful in our country, but not for long... We were to dependent on outside factors, never again!"

KX_PL_ZL_NATIONALIZATION_OF_INDUSTRY:0 "Full Nationalization of Industry"
KX_PL_ZL_NATIONALIZATION_OF_INDUSTRY_desc:0 "According to the plan put forward by Eugeniusz Kwiatkowski all of industry is to be nationalised, he assures us that it will guarantee rapid economic development."

KX_PL_ZL_CAPITALISTS_ARE_GERMAN_SPIES:0 "Capitalist Traitors"
KX_PL_ZL_CAPITALISTS_ARE_GERMAN_SPIES_desc:0 "The bigest profiteers of what could basically be called German occupation, were (other than German ones) polish capitalists. In retaliation all of their wealth will be nationalised, for the benefit of all Polish people!"

KX_PL_ZL_NATIONALIZE_ONLY_KEY_INDUSTRIES:0 "Partial Nationalization of Industry"
KX_PL_ZL_NATIONALIZE_ONLY_KEY_INDUSTRIES_desc:0 "Not all industry need to be nationalised, let's focus only on key branches necessary for later military development."

KX_PL_ZL_ACCOMODATE_POLISH_CAPITAL:0 "Accommodate Polish Capital"
KX_PL_ZL_ACCOMODATE_POLISH_CAPITAL_desc:0 "The rest of capital will stay in Polish hands, we could outright confiscate it, but it will be more pragmatic not to alienate upper-class, they are Polish too, afterall."

KX_PL_ZL_ALLY_GENTRY:0 "Ally the Gentry"
KX_PL_ZL_ALLY_GENTRY_desc:0 "Polish landowners, the remnants of nobility, may prove to a worthy ally in the countryside. We will seek cooperation with them."

KX_PL_ZL_MORE_JUST_VILLAGE:0 "More Just Village"
KX_PL_ZL_MORE_JUST_VILLAGE_desc:0 "Even with previous land reforms, big part of polish peasantry lives in poverty, it simply is unacceptable. We will conduct a land reform redistributing land towards peasantry, creating a system of mixed ownership of land, shared between the state and peasants."

KX_PL_ZL_CONTROL_THE_VILLAGE:0 "Control the Village"
KX_PL_ZL_CONTROL_THE_VILLAGE_desc:0 "Cities have to be provided with steady grain flow, or otherwise we won't be able to re-industrialise after recent collapse. That means that we also can't rely on old aristocracy, and so agriculture has to be managed by the state."

KX_PL_ZL_COMISSION_FOR_ECONOMIC_COOPERATION:0 "Economic Cooperation Commission"
KX_PL_ZL_COMISSION_FOR_ECONOMIC_COOPERATION_desc:0 "'Economic Cooperation Commission' will serve as the main planning body for our economy, for nothing can work without a plan."

KX_PL_ZL_FOCUS_ON_CONSUMER_GOODS:0 "Fill the Budget"
KX_PL_ZL_FOCUS_ON_CONSUMER_GOODS_desc:0 "Our industry should focus on consumer goods, this will fill our coffins by extracting every single excess penny through state monopolies."

KX_PL_ZL_FOCUS_ON_HEAVY_INDUSTRY:0 "Develop Heavy Industry"
KX_PL_ZL_FOCUS_ON_HEAVY_INDUSTRY_desc:0 "Increasing heavy industry investments will also increase potential consumer industry by the end. The only negative trade-off here is time."

KX_PL_ZL_RAPID_ARMENT:0 "Rapid Arment"
KX_PL_ZL_RAPID_ARMENT_desc:0 "Ultimately all our efforts come down to protecting Polish independence, and we won't be able to do that without a strong army, and we won't have a stron army without strong domestic military industry!"

#Polish Syndicalists
KX_PL_ZSP_TAKES_POWER:0 "Syndicalism with Polish Characteristics"
KX_PL_ZSP_TAKES_POWER_desc:0 "Syndicalism in Poland developed in a peculiar way, being both nationalistic and democratic at the same time. It remains to be seen how this experiment concludes."

KX_PL_ZSP_FREE_GMINY_FED:0 "Federation of Free 'Gminy'"
KX_PL_ZSP_FREE_GMINY_FED_desc:0 "'Gmina' is a Polish unit of administrative division, traditionally guaranteeing local self governance. Now those 'Gminy' will form a basis of a federal state."

KX_PL_ZSP_POL_SYND_PRINCIPLES:0 "Principles of Polish Syndicalism"
KX_PL_ZSP_POL_SYND_PRINCIPLES_desc:0 "Views of individual Polish Syndicalists may differ on some subjects but there are fundamental pillars on which the new system has to be based."

KX_PL_ZSP_INDIVIDUAL_FREEDOM:0 "Freedom of Individual"
KX_PL_ZSP_INDIVIDUAL_FREEDOM_desc:0 "Individual freedom and realisation is what truly socialist society have to strive for."

KX_PL_ZSP_SOCIAL_JUSTICE:0 "Social Justice"
KX_PL_ZSP_SOCIAL_JUSTICE_desc:0 "Only limiting factor of freedom should be social justice, so that society can function properly, without material and spiritual pillaging of the people."

KX_PL_ZSP_BOUND_IN_NATION:0 "Nation as a Mental State"
KX_PL_ZSP_BOUND_IN_NATION_desc:0 "Nation is a high value that should be uphold, however contrary to the right wing of political spectrum, our view on its nature differs fundamentally. Nation, in essence, is not simply a reductionist ethnic term, but a psycho-cultural one."

KX_PL_ZSP_SYND_PANSLAVISM:0 "Syndicalist Panslavism"
KX_PL_ZSP_SYND_PANSLAVISM_desc:0 "We should strive for the unity of Slavic people, for they are very close to what we hold dear, and perhaps a brotherly federation will form."

KX_PL_ZSP_SYND_ECON:0 "Toward Syndicalisation!"
KX_PL_ZSP_SYND_ECON_desc:0 "The grand project will commence and society shall be rebuilt!"

KX_PL_ZSP_ELECTIVE_BUREAUCRACY:0 "Elective Bureaucracy"
KX_PL_ZSP_ELECTIVE_BUREAUCRACY_desc:0 "Contrary to other socialists we believe that the whole state apparatus should be not top down, but bottom up. That's why every administrative position will be elective one, to guarantee that there will be no tyranny of central government, or political elite."

KX_PL_ZSP_FED_LABOUR_GOV:0 "Federation of Labour"
KX_PL_ZSP_FED_LABOUR_GOV_desc:0 "Our country is not simply a collection of people, but one organism that breaths, thus we still need some central institution."

KX_PL_ZSP_LOCAL_INDUSTRIAL_SYND:0 "Local Industrial Syndicates"
KX_PL_ZSP_LOCAL_INDUSTRIAL_SYND_desc:0 "Industry will be reorganized into individual syndicates, where every single decision will be decided by workers."

KX_PL_ZSP_LOCAL_AGRI_SYND:0 "Local Agricultural Syndicates"
KX_PL_ZSP_LOCAL_AGRI_SYND_desc:0 "Similarly to industry, we believe that agriculture should by syndicalised as well. Rural syndicates will be a collection of individual small farms cooperating with shared equipment, as well as serving a basis for local social development."

KX_PL_ZSP_SATE_WIDE_SYNDICATES:0 "Syndicalise Syndicates"
KX_PL_ZSP_SATE_WIDE_SYNDICATES_desc:0 "Disconnection of syndicates will only bring chaos to our economy, thus we have to create a gradual system of 'Syndicalised Syndicates'."

KX_PL_ZSP_SATE_IS_SYNDICATE:0 "State is a Syndicate Too"
KX_PL_ZSP_SATE_IS_SYNDICATE_desc:0 "It is important to remember that the Polish state, in shape we are forming it to be, is a syndicate too, and the highest syndicate at that."

KX_PL_ZSP_NAT_DEM_SYND:0 "Nation! Democracy!! Syndicalism!!!"
KX_PL_ZSP_NAT_DEM_SYND_desc:0 "Through our action we define a new, unique ideological strain of thought, essentially creating a 'Bottom-Up National Syndicalism'."

##Starting Tree

KX_PL_Perpetual_Growth:0 "Eternal Growth?"
KX_PL_Perpetual_Growth_desc:0 "Poland has experienced an unprecedented economic growth through the last fifteen years, surely it will last forever!"

KX_PL_Economic_Collapse:0 "Economic Collapse"
KX_PL_Economic_Collapse_desc:0 "Economy has collapsed, it is the darkest of days for our government."

KX_PL_Assess_Situation:0 "Assess Situation"
KX_PL_Assess_Situation_desc:0 "We have to remain calm and try assessing situation, however overwhelming it may be."

KX_PL_Approach_Polish_Army:0 "Approach Rogue Military"
KX_PL_Approach_Polish_Army_desc:0 "Position of our government is uncertain at best, and we can no longer rely on Germany for help. The time has finally come for us to end army-government strife for good. We should approach Piłsudski's camp and try to gain their support."

KX_PL_Convince_Germany_to_Maintain_Garrison:0 "Hold onto German Troops"
KX_PL_Convince_Germany_to_Maintain_Garrison_desc:0 "Germany has been reliable ally for a long time now, we know that in the current situation we may not be able to hope for their full support forever, however Polish Military is not trustworthy enough. We should convince Germany to reinforce its Polish Garrison to ensure peaceful elections."

KX_PL_Seek_Royal_Support:0 "Seek Royal Support"
KX_PL_Seek_Royal_Support_desc:0 "Many in Poland share anti-monarchist sentiments, seeing the 'Kingdom of Poland' as a political entity forced upon us by the Germany and Austria, never the less our current monarch is still a quite popular and respected figure. Hopefully his support will help us calm down the situation, at least a bit."

KX_PL_Trade_Union_Negotiation:0 "Trade Unions Negotiations"
KX_PL_Trade_Union_Negotiation_desc:0 "Our Industrial sector have been hit really hard by the busted economic bubble, which naturally resulted in immediate impoverishment of many workers, the voice of which can be heard through trade unions. We should negotiate with more moderate (mainly christian-democratic) unions to calm down the unrest, one could say to break their cohesion..."

KX_PL_Limit_Trade_Unions:0 "Temporary Trade Union Restrictions"
KX_PL_Limit_Trade_Unions_desc:0 "Trade unions actions may prove to be dangerous if they decide to hit the streets, we unfortunately have to limit their activities... at least for now..."

KX_PL_Early_Elections:0 "Call for New Constitution"
KX_PL_Early_Elections_desc:0 "We did everything we could at the limited time we had, but the clock is ticking and social unrest may explode at any moment now. The fate of this country lies on the shoulders of the parliament and the King..."

#Centre-Democratic Tree
KX_PL_PPS_FR_WINS_ELECTIONS:0 "PPS Marches to Victory"
KX_PL_PPS_FR_WINS_ELECTIONS_desc:0 "Domination of 'Chadecja' have finally been broken, the time of democratic socialism have come."

KX_PL_PPS_WOMEN_LIBERATION:0 "Women Liberation"
KX_PL_PPS_WOMEN_LIBERATION_desc:0 "Royal Council has denied women's rights to vote for far too long, but it voting rights are simply not enough, we have to strive for real gender equality."

KX_PL_PPS_LAICISATION_OF_STATE:0 "State Laicism"
KX_PL_PPS_LAICISATION_OF_STATE_desc:0 "Religion should simply not interfere in the matters of state. Things like state sponsored masses have to become past memories."

KX_PL_PPS_EQUALITY_OF_NATIONALITIES:0 "Equality of Nationalities"
KX_PL_PPS_EQUALITY_OF_NATIONALITIES_desc:0 "Our country is named Poland, but that does not mean there is no place for other nationalities, we should respect their rights to self determination as well."

KX_PL_PPS_ALLIENCE_WITH_JEWISH_LABOUR:0 "Ally Jewish Labour"
KX_PL_PPS_ALLIENCE_WITH_JEWISH_LABOUR_desc:0 "Jewish people have for a long time been unjustly treated with suspicions or even outright hostility through ages, especially Jewish working people. But it simply can not stay like that, they've lived on Polish soil for centuries, so they can as well be considered Polish!"

KX_PL_PPS_CLASS_STRUGGLE_WITHIN_PATRIOTISM:0 "Patriotic Workers' Movement"
KX_PL_PPS_CLASS_STRUGGLE_WITHIN_PATRIOTISM_desc:0 "Polish independence is necessary for the liberation of the working class on our soil, that's why socialism and patriotism are inseparably connected here."

KX_PL_PPS_PROMOTE_WORKERS_COOPERATIVES:0 "Promote Cooperatives"
KX_PL_PPS_PROMOTE_WORKERS_COOPERATIVES_desc:0 "The only way for the means of production to be shared in a just way is through workers cooperatives, now we will begin a policy of supporting them so they gradualy encompass the whole economy."

KX_PL_PPS_SUPPORT_PARTY_TRADE_UNIONS:0 "Support Loyal Trade Unions"
KX_PL_PPS_SUPPORT_PARTY_TRADE_UNIONS_desc:0 "There are many kinds of trade unions in Poland, but it is only natural that we support the ones connected to us."

KX_PL_PPS_LAND_SOCIALISATION:0 "Socialise the Land"
KX_PL_PPS_LAND_SOCIALISATION_desc:0 "Although our party support base is centred in cities, it is important not to forget about the village, land lords for far too long pressed the peasantry, it is time for more radical redistribution of land."

KX_PL_PPS_FURTHER_PROGRAM:0 "Towards Just Future"
KX_PL_PPS_FURTHER_PROGRAM_desc:0 "There is still much work to be done."

KX_PL_PNPR_WINS_ELECTIONS:0 "Chadecja for Stability and Progress"
KX_PL_PNPR_WINS_ELECTIONS_desc:0 "Christian-Democracy Triumphs, vowing to implement steady but moderate change."

KX_PL_PPS_PNPR_EXPAND_PUBLIC_EDUCATION:0 "Expand Public Education"
KX_PL_PPS_PNPR_EXPAND_PUBLIC_EDUCATION_desc:0 "Primary public education have been widely implemented in Poland for quite a while, now the time have to extend it to higher levels."

KX_PL_PPS_PNPR_SOCIAL_SECURITY:0 "Further Social Security"
KX_PL_PPS_PNPR_SOCIAL_SECURITY_desc:0 "It is important of people not to worry about tomorrow, by extending social security programs, they will have one less thing to worry about."

KX_PL_PPS_PNPR_HEALTHY_PARLIAMENTARISM:0 "Healthy Parliamentarism"
KX_PL_PPS_PNPR_HEALTHY_PARLIAMENTARISM_desc:0 "Polish Parliamentary process has been one of strife between the government and 'total opposition'. Our country isn't shackled by german interests anymore, and so it is finally possible to formulate uniform plan for our country, even if we disagree on some details."

KX_PL_PPS_PNPR_LIGHT_OF_DEMOCRACY:0 "Light of Democracy"
KX_PL_PPS_PNPR_LIGHT_OF_DEMOCRACY_desc:0 "Threat of German intervention cast a big shadow on Polish democracy, but it is no more, and we can be an example of freedom and justice."

KX_PL_PPS_PNPR_LIMITED_ECONMIC_PLANNING:0 "Limited Economic Planning"
KX_PL_PPS_PNPR_LIMITED_ECONMIC_PLANNING_desc:0 "Some key elements of economy need government oversight, others would greatly benefit from coordination, we will provide both!"

KX_PL_PPS_PNPR_LABOUR_LAWS:0 "Favourable Labour Law"
KX_PL_PPS_PNPR_LABOUR_LAWS_desc:0 "Even though economic indicators were growing through the last 15 years (before the crisis), it did come at the cost of certain amount of exploitation by German companies. It is no more however workers of Poland have to be protected!"

KX_PL_PPS_PNPR_TRUE_SOCIAL_DEMOCRACY:0 "A Truly Social Democracy"
KX_PL_PPS_PNPR_TRUE_SOCIAL_DEMOCRACY_desc:0 "Our reforms shed a bright light on our future, democracy is for the people and we will uphold this ideal, now and forever."

KX_PL_PNPR_CLASS_COLABORATION:0 "Unison of Classes"
KX_PL_PNPR_CLASS_COLABORATION_desc:0 "Capitalist relations might be exploitative but it is our job to prevent that, it is our job to humanise both the workers and their emplyes (through controling their wealth), and everyone in between. This might come as a surprise to some, after so long time, but it always was program of the christian-democrats, and now without German whip over our heads we can finally implement it. We waited through the storm, and now the road to class-cooperative prosperity will be paved, we are the party of everyone."

KX_PL_PNPR_PROMOTE_ENTERPREUNERSHIP:0 "Support Small Entrepreneurs"
KX_PL_PNPR_PROMOTE_ENTERPREUNERSHIP_desc:0 "Small entrepreneurship keeps away monopolies and creates healthy local social relations, furthermore it is much less exploitative of common man. We should support small businesses across the country."

KX_PL_PNPR_NON_MARXIST_TRADEUNIONS:0 "Non-Marxist Unionism"
KX_PL_PNPR_NON_MARXIST_TRADEUNIONS_desc:0 "The presence of christian trade unions is quite big in Poland, they operate based on christian moral values of solidarity as opposed to Marxist ones that call for class struggle, the latter view is incompatible with democratic system that respects the righs of every citizen. Thus why we should strive to rid Polish unionism of violence-seeking elements."

KX_PL_PNPR_LAND_REDISTRIBUTION:0 "Land Adjustments"
KX_PL_PNPR_LAND_REDISTRIBUTION_desc:0 "The land consolidation might have been successful on statistical level, but it were definitely not successful at alleviating poverty. We have to call for reviewing the division of agricultural land, cautiously, but still."

KX_PL_PNPR_STABLE_PROGRESS:0 "Steady Progress"
KX_PL_PNPR_STABLE_PROGRESS_desc:0 "Progress have to be stead, or society will break its metaphorical neck, we are here to ensure this progress."

KX_PL_PNPR_RELIGIOUS_PLURALISM:0 "Christian Roots"
KX_PL_PNPR_RELIGIOUS_PLURALISM_desc:0 "Christianity is an important aspect of Polish identity, it does not mean however that we should bow our necks to the state structures at every ocasions, we have to respect views of private citizens, and remain moderate in terms of religious favourism."

KX_PL_PNPR_AUTONOMY_FOR_MINORITIES:0 "Autonomy for Minorities"
KX_PL_PNPR_AUTONOMY_FOR_MINORITIES_desc:0 "Our former German minority coalition partners have been growing warry of the situation since our plitical course changed considerable after german influence weakening, we have to ensure them that there is nothing to worry about and their autonomy is guaranteed."

KX_PL_PNPR_BUT_POLISH_PRIMACY:0 "But Polish Primacy"
KX_PL_PNPR_BUT_POLISH_PRIMACY_desc:0 "We may guarantee minorities autonomy, but we still have to stay alert and not let them have too much sway over Polish politics and economy, like they did before."

KX_PL_PNPR_FURTHER_PROGRAM:0 "Towards Prosperous Future"
KX_PL_PNPR_FURTHER_PROGRAM_desc:0 "There is still much work to be done."

KX_PL_PSL_WINS_ELECTIONS:0 "Let the Popular Voice Be Heard"
KX_PL_PSL_WINS_ELECTIONS_desc:0 "We are the voice of the people, we are the voice of the village!"

KX_PL_PSL_LAND_FOR_PEASANTRY:0 "Land for Peasantry"
KX_PL_PSL_LAND_FOR_PEASANTRY_desc:0 "Land reform implemented by the Royal Council clearly favoured the land owners, but it is about to change, every peasant will receive their share!"

KX_PL_PSL_SUPPORT_FARMERS:0 "Generous Farm Support"
KX_PL_PSL_SUPPORT_FARMERS_desc:0 "Without our support richer land owners will inevitable consolidate their land again, and so the smaller farms need our support to prevent that."

KX_PL_PSL_FARM_ABOVE_FACTORY:0 "Farm Above Factory"
KX_PL_PSL_FARM_ABOVE_FACTORY_desc:0 "Development of Polish countryside was largely neglected since the creation of Polish Kingdom, German capital focus on the cities where they saw profits, and every last penny collected from rural areas have been invested into urban infrastructure. No more we say! The village needs not only financial support, but also autonomy so that never happens again!"

KX_PL_PSL_BUT_FACTORIES_CAN_SUPPROT_FARMS:0 "Industry for the Village"
KX_PL_PSL_BUT_FACTORIES_CAN_SUPPROT_FARMS_desc:0 "Industry may not be the focus of our interest, but it still can be used to modernise the countryside. Tractors will start rolling on Polish ground soon enough!"

KX_PL_PSL_BACKBONE_OF_SOCIETY:0 "Backbone of Society"
KX_PL_PSL_BACKBONE_OF_SOCIETY_desc:0 "Agriculture is a backbone of economy, and rural folk is a backbone of society, we won't forget where our voter base comes from."

KX_PL_PSL_APPEAL_TO_PEASANT_CHRISTIANITY:0 "Religious Pluralism"
KX_PL_PSL_APPEAL_TO_PEASANT_CHRISTIANITY_desc:0 "Religion is bound to be private matter, religions might teach good morals, but it is not for us to decide which one to endorse."

KX_PL_PSL_MINORITIES_ARE_PEASANTS_TOO:0 "Peasantry Across Nationalities"
KX_PL_PSL_MINORITIES_ARE_PEASANTS_TOO_desc:0 "Poland in its post-war shape have been predominantly ethnically polish in the countryside, but we strive for independence of every polish person, even so other nationalities (in the east in particular) also consist of peasants to, and so they deserve our support too."

KX_PL_PSL_INDEPENDANCE_OVER_ALL:0 "Independence Over All"
KX_PL_PSL_INDEPENDANCE_OVER_ALL_desc:0 "Independence of Poland is very important issue to our party, but large part of polish peasantry still remains disconnected from our national cause. We have to change that through education and positive propaganda."

KX_PL_PSL_FURTHER_PROGRAM:0 "Towards Idyllic Future"
KX_PL_PSL_FURTHER_PROGRAM_desc:0 "There is still much work to be done."

#Endecja Tree
KX_PL_NATDEM_WINS_ELECTIONS:0 "National-Democracy Raises Its Head"
KX_PL_NATDEM_WINS_ELECTIONS_desc:0 "After almost two decades of German slavery national-democracy is here to bring a renewal of Polish spirit."

KX_PL_NATDEM_MONARCHY_REFERENDUM:0 "Fulfilling Nations Will"
KX_PL_NATDEM_MONARCHY_REFERENDUM_desc:0 "Monarchy is the symbol of Polish humiliation, it has been forced upon us and now we have to get rid of it, and enact a new better system."

KX_PL_NATDEM_REPUBLIC_OF_ELITE:0 "Exalted State"
KX_PL_NATDEM_REPUBLIC_OF_ELITE_desc:0 "We are for democracy that's sure but democracy needs guidance, and who would guide our nation better than venerable thinkers of polish national thought!"

KX_PL_NATDEM_YOUNG:0 "Youth Carries the Torch"
KX_PL_NATDEM_YOUNG_desc:0 "The power struggle for the National-Democratic leadership have been decided, and now is the time to give the chance to the 'young' wing of the party!"

KX_PL_NATDEM_OLD:0 "Fathers Have to Guide Their Sons"
KX_PL_NATDEM_OLD_desc:0 "Despite efforts of the parties youth, the 'Old Castle' prevailed!"

KX_PL_NATDEM_POLISH_CAPITAL_ONLY:0 "Eliminate Non-Polish Capitalism"
KX_PL_NATDEM_POLISH_CAPITAL_ONLY_desc:0 "Leaving any capital in the hands of minorities is endangerment to our national interests, only POLISH capital will remain loyal in the time of need."

KX_PL_NATDEM_OLD_INDUSTRIALISTS:0 "Gamble on Industrialists"
KX_PL_NATDEM_OLD_INDUSTRIALISTS_desc:0 "National-Democrats always had close ties with Polish Big Capital, and have protected its interest even under German dominance; now it is only natural that they become the cornerstone of our renewed economy."

KX_PL_NATDEM_REWARD_LAND_OWNERS:0 "Reward Land Owners"
KX_PL_NATDEM_REWARD_LAND_OWNERS_desc:0 "Although many landowners ultimately became supportive of the German-backed regime, many of them still aligned with National Democrats. We should express our support for land-owning class, that will be an important component of our elitist society."

KX_PL_NATDEM_BOLSTER_MIDDLE_CLASS:0 "Bolster Middle Class"
KX_PL_NATDEM_BOLSTER_MIDDLE_CLASS_desc:0 "Middle class have always been one of our most vocal supporters, their support grew even stronger in the face of advancing German monopolisation of Polish economy, now they will be rewarded with lower taxes."

KX_PL_NATDEM_NEWLY_FOUND_FUNDS:0 "Support Large Industries"
KX_PL_NATDEM_NEWLY_FOUND_FUNDS_desc:0 "We will focus on supporting Polish private capital, be it in a way of tax cuts, or even direct founding at times, for only they can effectively fueal our growth!"

KX_PL_NATDEM_PRIVATE_WORKS:0 "Private Works"
KX_PL_NATDEM_PRIVATE_WORKS_desc:0 "To alivate rising unemployment it is necessary to embark on grand infrastructural projects, but making those projects state owned would only lead to severe inefficiencies. Instead we will outsource them to private - POLISH - contractors, which will bolster our domestic businesses."

KX_PL_NATDEM_WORKERS_LIPSERVICE:0 "Pay Workers a Lip Service"
KX_PL_NATDEM_WORKERS_LIPSERVICE_desc:0 "Workers still need a certain degree of protection, or the unrest will grow. Even though we consider Germany as a threa, Bismarck was right about that."

KX_PL_NATDEM_VOTING_RESTRICTIONS:0 "Voting Restrictions"
KX_PL_NATDEM_VOTING_RESTRICTIONS_desc:0 "Not everyone should be allowed to vote, there are certain elements in society that should not be allowed to do that, because they simply aren't competent enough."

KX_PL_NATDEM_ROOT_OUT_SOCIALISTS:0 "Root Out Socialism"
KX_PL_NATDEM_ROOT_OUT_SOCIALISTS_desc:0 "We are a National-DEMOCRACY, but barbarian socialism (and crypt-socialism) is not democracy, but a threat to it. Their dengerous ideas have to be rooted out."

KX_PL_NATDEM_POLONIZATION:0 "Polonization Effort"
KX_PL_NATDEM_POLONIZATION_desc:0 "Poland is for Polish people, its as simple as that, every other nationality should either adopt polish culture or leave our country."

KX_PL_NATDEM_EVERYTHING_FOR_NATION:0 "Devotion to the Nation"
KX_PL_NATDEM_EVERYTHING_FOR_NATION_desc:0 "Nation is a highest value, individual pales in comparison. We'll be sure to emphasise this in our education"

KX_PL_NATDEM_CHURCH_SUPPORT:0 "Support from the Church"
KX_PL_NATDEM_CHURCH_SUPPORT_desc:0 "Even if not everyone in higher leadership is happy to work with church, the church is more than happy to work with us, and if they reach out to us we may as well accept their offer."

KX_PL_NATDEM_STATE_CATHOLICISM:0 "State Catholicism"
KX_PL_NATDEM_STATE_CATHOLICISM_desc:0 "Even if our political camp started as relatively secular in 19th century, we have been growing more and more connected to the church, it is only natural to honor the centuries of building polish identity by giving Catholicism a special place in our country."

KX_PL_NATDEM_FREE_MARKET_ECONOMY:0 "Growing Bellies of the Owning Class"
KX_PL_NATDEM_FREE_MARKET_ECONOMY_desc:0 "Free Market is the only just market, and its forces will guide our economy!"

KX_PL_NATDEM_ENSHRINE_PRIVATE_PROPERTY:0 "Enshrine Private Property"
KX_PL_NATDEM_ENSHRINE_PRIVATE_PROPERTY_desc:0 "Private property is a natural right; those possessing means of productions are destined to take profits from them."

KX_PL_NATDEM_INTERVENTIONISM:0 "System in Accordance with Morality"
KX_PL_NATDEM_INTERVENTIONISM_desc:0 "While private property remains just, it still is necessary for state to redistribute some wealth, as the Catholic teachings support."

KX_PL_NATDEM_BREAK_MONOPOLIES:0 "Break Monopolies"
KX_PL_NATDEM_BREAK_MONOPOLIES_desc:0 "Free Market forces are the most efficient form of economy, it doesn't change the fact however, that state needs to keep monopolies in check, so that we can perpetually benefit from the 'invisible hand of the market'."

KX_PL_NATDEM_STATE_CONTRACTS:0 "State Contracting"
KX_PL_NATDEM_STATE_CONTRACTS_desc:0 "Now that the private companies position has been affirmed, the state can take full benefit from contracting its needs, namely in the case of military production."

KX_PL_NATDEM_SUPPORT_SMALL_TRADES:0 "Support Small Trades"
KX_PL_NATDEM_SUPPORT_SMALL_TRADES_desc:0 "Small and medium entrepreneurs are backbone of every healthy economy, and they need our support from being swallowed by big business."

KX_PL_NATDEM_CORPORATE_ORGANISATIONS:0 "Corporate Organisations"
KX_PL_NATDEM_CORPORATE_ORGANISATIONS_desc:0 "To ensure cooperation between classes, it will be helpful codify various organisations, based on trades and ownership."

#Anti-Endecja (FJR/'PZPR')
KX_PL_PZPR_UNITED_FRONT:0 "Victory of the United Front"
KX_PL_PZPR_UNITED_FRONT_desc:0 "Threat to the working class have been averted for now, but now we have to truly fight for what we vowed to protect."

KX_PL_PZPR_FORMING_COALITION:0 "Solidifying the Coalition"
KX_PL_PZPR_FORMING_COALITION_desc:0 "We might have scored an initial victory but everything is far from done, now we must become a constructive political movement, and form a government."

KX_PL_PZPR_REACH_TO_YOUNG_NATDEM:0 "Reach Out to Rogue National-Democrats"
KX_PL_PZPR_REACH_TO_YOUNG_NATDEM_desc:0 "In accordance with the decision of the core our movement we decided to form a coalition with the Rogue faction of 'Endecja' they may seem crude and radical to some but we will tame and civilise them."

KX_PL_PZPR_TOWARDS_CORPORATISM:0 "Economy in Accordance with Morality"
KX_PL_PZPR_TOWARDS_CORPORATISM_desc:0 "With the Church exerting its influence over the Royal Council, it is only natural that it will implement economic ideals in accordance to official doctrine of the Catholic Church."

#KX_PL_PZPR_CLASS_BLIND_SYNDICATES:0 "Class Blind Unions"
#KX_PL_PZPR_CLASS_BLIND_SYNDICATES_desc:0 "Industry will be reorganized into a unions where workers and owners have their share of both benefits and responsibilities, in accordance to their 'abilities' of course..."
KX_PL_PZPR_CLASS_BLIND_SYNDICATES:0 "Planning in Tandem"
KX_PL_PZPR_CLASS_BLIND_SYNDICATES_desc:0 "The State will keep close relations to big bussiness in order to coordinate economic investments."

KX_PL_PZPR_COORDINATE_SMALL_BUSINESS:0 "Coordinate Small Business"
KX_PL_PZPR_COORDINATE_SMALL_BUSINESS_desc:0 "Small business is nothing in the grand scheme of things, but it can become something, if it consolidates and cooperates, instead just fighting with each other."

KX_PL_PZPR_CLASS_COLABORATIONIST_AGRICULTURE:0 "Collaborationist Agriculture"
KX_PL_PZPR_CLASS_COLABORATIONIST_AGRICULTURE_desc:0 "Agriculture will also be based on a system where land owners and peasantry collect appropriate share of profits from the collectively controlled estates."

KX_PL_PZPR_COUNCIL_OF_WORKERS_AND_CAPITALISTS:0 "Councils of Workers and Capitalists"
KX_PL_PZPR_COUNCIL_OF_WORKERS_AND_CAPITALISTS_desc:0 "Workers and Owners alliance can not be simply limited to economic sphere. By creating joint councils where every class have 'apropriate' amount of sway, our government will be able to react on time to the needs of our citizens."

KX_PL_PZPR_POLISH_SOLIDARISM:0 "Society of the Solidary"
KX_PL_PZPR_POLISH_SOLIDARISM_desc:0 "The course to prosperity of everyone isn't in unrestrained capitalism, and people need to care for each other, no matter the class, and that's the guiding principle our state will take."

KX_PL_PZPR_AVOID_CHURCH_QUESTION:0 "Clerical Status Quo"
KX_PL_PZPR_AVOID_CHURCH_QUESTION_desc:0 "Even if Solidarist elements in our coalition would like to ally themselves with the Catholic Church, the core of the coalition's leadership remains largely against that or even hostile to the clergy, as a compromise we will try to avoid those questions in public debate."

KX_PL_PZPR_LIKE_STONE_AMONG_STORMS:0 "Stone Among the Storms"
KX_PL_PZPR_LIKE_STONE_AMONG_STORMS_desc:0 "Polish Nation survived many storms thrown at it by the winds of history, and each time we became more hardened by them, isn't our will unbreakable!?"

KX_PL_PZPR_ENSURING_PARTY_DOMINATION:0 "One Party Democracy"
KX_PL_PZPR_ENSURING_PARTY_DOMINATION_desc:0 "Our coalition is about to dominate the whole Polish political sphere for a foreseeable future, but we must not remain idle, we have to consolidate and create a united party, standing in defence of the rights of workers and principles of social justice. To help with this, a new constitution will be drafted that will guarantee party's dominance, through an electoral process where the list of parliament members candidates is to be drafted be the central government from the recommendation of local governmental structures, and than be accepted in parliament's vote. And with essentially non existing separation of powers, this process creates endless electoral loop..."

KX_PL_PZPR_SUBJUGATE_JUDICIAL_SYSTEM:0 "Subjugate Judicial System"
KX_PL_PZPR_SUBJUGATE_JUDICIAL_SYSTEM_desc:0 "Properly functioning judicial system is a backbone of properly functioning state, taking that into consideration it is unthinkable that unelected officials may undermine democratic process by declaring our laws 'unconstitutional', this system have to be broken so that the popular voice can always be heard."

KX_PL_PZPR_WELFARE_ENSURES_SUPPORT:0 "Loyalty Through Welfare"
KX_PL_PZPR_WELFARE_ENSURES_SUPPORT_desc:0 "The role of the state is to provide for the people, and to provide as much as it can, anything but that fundamentally undermines any right one may have to rule. The system works as long as the government is concerned with its citizens."

KX_PL_PZPR_FATE_OF_MONARCHY:0 "Fate of Monarchy"
KX_PL_PZPR_FATE_OF_MONARCHY_desc:0 "Monarchy may be useful but it is fundamentally unjust and undemocratic, we may have defended it in the past, but circumstances change, and so may our allegiances..."

KX_PL_PZPR_SOCIAL_CONTRACT_CONTINUES:0 "The Contract Continues"
KX_PL_PZPR_SOCIAL_CONTRACT_CONTINUES_desc:0 "Ultimately Monarchy is a guarant of stability if it were to be toppled down, we could be as well."

KX_PL_PZPR_WE_ALWAYS_WERE_REPUBLICANS:0 "'The Likeable Party'"
KX_PL_PZPR_WE_ALWAYS_WERE_REPUBLICANS_desc:0 "Some has called our actions authoritarian, perhaps it is the moment to warm the image our our party a bit..."

KX_PL_PZPR_INFORMAL_GOVENRMENT:0 "Not Bound by Institutions"
KX_PL_PZPR_INFORMAL_GOVENRMENT_desc:0 "Overreliance on so-called 'separation of powers' leads only to inflexibility of the system, paradoxically in many cases leading to corruption, 'legal corruption'. The only limiting factor should be the will of the People. We will encourgage for as many things to be resolved within the party structure instead of official state apparatus."

KX_PL_PZPR_STICK_TO_LEFT:0 "Stick to the Left"
KX_PL_PZPR_STICK_TO_LEFT_desc:0 "We've decided to reaffirm our coalition as left-wing, colaborating with national-democrats would be betrayal of our ideals!"

KX_PL_PZPR_SUPREMACY_OF_PUBLIC_COMPANIES:0 "Molding the Capital"
KX_PL_PZPR_SUPREMACY_OF_PUBLIC_COMPANIES_desc:0 "The economic program formulated by our political camp have been based on ensuring the dominance of state-majority-owned public companies (through either buying out or nationalising private enterprises), while still leaving some place for capitalist endevours. The details aren't yet ironed out but will with time and debate."

#KX_PL_PZPR_WORKERS_ON_BOARDS:0 "Workers' Self-Management"
#KX_PL_PZPR_WORKERS_ON_BOARDS_desc:0 "It has been decided that workers will not only be beneficiaries but also directors of our new economic system. We will increase the competencies of workers' representatives to have strong say over the companies' inner workings."

KX_PL_PZPR_WORKERS_ON_BOARDS:0 "Involve the Workers"
KX_PL_PZPR_WORKERS_ON_BOARDS_desc:0 "It has been decided that workers will not only be beneficiaries but also participants in our new economic system. We will increase the competencies of workers' representatives to have strong say over the companies' inner workings."

KX_PL_PZPR_FERVENT_ANTICLERICALISM:0 "The State and the Church"
KX_PL_PZPR_FERVENT_ANTICLERICALISM_desc:0 "Big part of our coalition agrees that the church remains a threat to the general public, stability, and progress; however there still are a lot of 'classical' Christian-Democrats that are religiously attached, and would not like the coalition to go overboard with its religious policies..."

KX_PL_PZPR_ON_CROSSROADS_OF_CULTURES:0 "On the Crossroads of Cultures"
KX_PL_PZPR_ON_CROSSROADS_OF_CULTURES_desc:0 "Polish Nation was formed on the crossroads of cultures. We have to remember that no matter how devoted we are to our nation, our identity is ever evolving."

KX_PL_PZPR_ABSOLUTE_UNION_SUPPORT:0 "Absolute Union Support"
KX_PL_PZPR_ABSOLUTE_UNION_SUPPORT_desc:0 "By uniting christian-democratic and socialist movements we have gained almost unanimous trade union support. We would be fools not to utilise them in our new economic system. Trade unioninists need place on company boards to defend workers intersts, and help organise labour."

KX_PL_PZPR_NOD_TO_SMALL_BUSINESS:0 "Nod to Small Business"
KX_PL_PZPR_NOD_TO_SMALL_BUSINESS_desc:0 "We may want to create a publicaly owned economy, but some counterbalance is needed to offset the companies influence, workers influence may be useful at that, but they still are within the companies and it is in their interest that they succeed. That's why we should focus on supporting middle class instead, in this particular thing."

#KX_PL_PZPR_OWNERS_INTO_MANAGERS:0 "From Owners to Managers"
#KX_PL_PZPR_OWNERS_INTO_MANAGERS_desc:0 "We could potentially replace former capitalistic management with new one, but this may prove chaotic and be detrimental to our economic plan. Instead it have been decided to simply offer managerial positions to those who essentially had them before."

KX_PL_PZPR_OWNERS_INTO_MANAGERS:0 "Maintain Authoritarian Workplace"
KX_PL_PZPR_OWNERS_INTO_MANAGERS_desc:0 "While workers participation might be important, we can't just kick out the management, those managers need to maintain their authority, so that economy don't turn into chaos."

#KX_PL_PZPR_PRIVATE_COMAPNIES_AS_FUEL:0 "Private Initiative as 'Fuel'"
#KX_PL_PZPR_PRIVATE_COMAPNIES_AS_FUEL_desc:0 "We decided to adapt the more moderate version of the plan, where large amount of economy will remaining in private hands, and serve as 'fuel' for public companies, which profits will than be used to finance social programs."

KX_PL_PZPR_PRIVATE_COMAPNIES_AS_FUEL:0 "Support Private Initiative"
KX_PL_PZPR_PRIVATE_COMAPNIES_AS_FUEL_desc:0 "Private initiative is important component of healthy economy, we will support medium-size business so that it can fuel the big one in the future."

#KX_PL_PZPR_MARKET_SIMULATION:0 "Market Simulation"
#KX_PL_PZPR_MARKET_SIMULATION_desc:0 "It has been decided on implementing more centralised version of our economic plan. From now on all big companies will be owned by the state, but will function semi-independently on the market, essentially simulating 'normal' market economy; the government's role will be to actively overview their activity and intervene when necessary to guarantee public interest (by breaking them, preventing competition when necessary). This solution will ensure that the government (and by extansion, the people) control the economy and not the other way, it will also provide a flexible way to extract value from the enterprises and direct funds where needed."

KX_PL_PZPR_MARKET_SIMULATION:0 "Party Business"
KX_PL_PZPR_MARKET_SIMULATION_desc:0 "Big Corporations are the future of economy, we will direct our growth through them, involving our party members in business, creating intricate system of state, party, and private ownership."

KX_PL_PZPR_MID_FARMING:0 "Guide the Village"
KX_PL_PZPR_MID_FARMING_desc:0 "Up to this point we largely focused on industrial sector, but agrarians are part of our coalition too, and it is time to listen to their concerns. Naturally, realising former PSL program, we will start the by introducing mechanisms of land redistribution, while will implementing the system where smaller farms may consolidate and peasants whose holdings becomes united will receive the share of profits. This will prevent fragmentation of agricultural structure in our country, that would lead to big amount of small but poor farms."

KX_PL_PZPR_SOCIALISED_MARKET_ECONOMY:0 "Social Corporatocracy"
KX_PL_PZPR_SOCIALISED_MARKET_ECONOMY_desc:0 "Our economy utilises market forces but it works in the public interest. Large industries are closely tied to the government, but it is not that businessmen are politicians, rather the politicians are businessmen; economy doesn't serve them - they serve the economy."

##Economic Recovery Tree

KX_PLX_CRISIS_DEALING_WITH_DEPRESSION:0 "Dealing with Depression"
KX_PLX_CRISIS_DEALING_WITH_DEPRESSION_desc:0 "Since our political situation stabilised, it is time to tackle our economic issues"

KX_PLX_CRISIS_FISCAL_REVISION:0 "Review Fiscal Policies"
KX_PLX_CRISIS_FISCAL_REVISION_desc:0 "We will have to revise our fiscal policies at the face of the crisis."

KX_PLX_CRISIS_UNEMPLOYMENT_BENEFITS:0 "Provide for the Unemployed"
KX_PLX_CRISIS_UNEMPLOYMENT_BENEFITS_desc:0 "Not providing people with founds to live will only put our economy into a downward spiral. We have to help those that lost their jobs."

KX_PLX_CRISIS_FISCAL_AUSTERITY:0 "Preserve the Funds"
KX_PLX_CRISIS_FISCAL_AUSTERITY_desc:0 "It is necessary to maintain balance budget, even at the face of crisis. Otherwise our debt will become unsalvageable."

KX_PLX_CRISIS_PRINT_MONEY:0 "Print Money"
KX_PLX_CRISIS_PRINT_MONEY_desc:0 "We'll have to be careful about it but printing money can provide us with necessary founds, even if inflation will make value of people's savings deteriorate."

KX_PLX_CRISIS_INCREASE_TAXES:0 "Taxes Increase"
KX_PLX_CRISIS_INCREASE_TAXES_desc:0 "Instead of printing money we will simply increase taxes. It's more predictable way of collecting founds, even if it won't be very popular among our people."

KX_PLX_CRISIS_AGRI_REVISION:0 "Issues of the Village"
KX_PLX_CRISIS_AGRI_REVISION_desc:0 "Our agricultural sector suffered greatly due to economic crash. Grain became extremely hard to sell both domestically and abroad. We have to do something about that."

KX_PLX_CRISIS_GRAIN_REQUISITION:0 "Grain Requisition"
KX_PLX_CRISIS_GRAIN_REQUISITION_desc:0 "Perhaps it is a drastic measure, but we have to do everything we can to provide cities with food."

KX_PLX_CRISIS_BUY_GRAIN:0 "Buy Excess Agricultural Produce"
KX_PLX_CRISIS_BUY_GRAIN_desc:0 "Even if our budget is already strained, we have to acquire grain for the urban areas, and by buying it we'll help people of the village as well!"

KX_PLX_CRISIS_PREVENT_CITY_MIGRATION:0 "Prevent Migration to Cities"
KX_PLX_CRISIS_PREVENT_CITY_MIGRATION_desc:0 "With situation deteriorating in the countryside, many peasants are seeking better opportunities in the city, but there are none, thus we have to temporarily prevent their migration or otherwise the concentration of impoverished will lead to tremendous social and economic pathologies."

KX_PLX_CRISIS_INDUSTRY_REVISION:0 "Save the Industry"
KX_PLX_CRISIS_INDUSTRY_REVISION_desc:0 "Industrial sector have been hit the most by the depression, polish industries have to be bailed out, that's clear, however the question lies with German ones..."

KX_PLX_CRISIS_NATIONALIZE_GER:0 "Nationalize German Industry"
KX_PLX_CRISIS_NATIONALIZE_GER_desc:0 "Since now we have no commitments to Germany, the most efficient way to deal with German industry is by nationalizing it."

KX_PLX_CRISIS_BUY_OUT_GER:0 "Buy Out German Industry"
KX_PLX_CRISIS_BUY_OUT_GER_desc:0 "Nationalization of German industry would anger our allies, we'll have to take more moderate approach and buy it."

KX_PLX_CRISIS_HOLD_INDUSTRY:0 "Hold onto German Industry"
KX_PLX_CRISIS_HOLD_INDUSTRY_desc:0 "At least for now, we should hold onto newly acquired industry to prevent it from collapsing even more."

KX_PLX_CRISIS_SELL_INDUSTRY:0 "Sell German Industry"
KX_PLX_CRISIS_SELL_INDUSTRY_desc:0 "Our Property policies are open for future revisions, but now we desperately need founds, and we can acquire them by selling our newly acquired industrial assets."

KX_PLX_CRISIS_RECOVERY_PROSPECT:0 "Road to Recovery"
KX_PLX_CRISIS_RECOVERY_PROSPECT_desc:0 "Our band aid policies are paying results. There is still a lot to be done, but the economic situation seems to stabilise and we can hope for eventual full recovery."

KX_PLX_CRISIS_ERADICATE_ILLITERACY:0 "Educate the Nation"
KX_PLX_CRISIS_ERADICATE_ILLITERACY_desc:0 "Illiteracy has been largely eliminate in the 'Congress Kingdom', it deosn't change the fact that higher education, and technical, education still leaves a lot to be desired, not to speak of the illiteracy in the lands in the east, we have to prepare our education system so it is up to the task of fueling future development and prosperity."

KX_PLX_CRISIS_SILLESIAN_RESOURCES:0 "Riches of Silesia"
KX_PLX_CRISIS_SILLESIAN_RESOURCES_desc:0 "Silesian resource deposits are extraordinarily rich, and there still is more of them that we are yet to discover; we should support both their extraction and prospecting to remain economically independent as much as possible."

KX_PLX_CRISIS_ERADICATE_ILLITERACY:0 "Modernise Warsaw"
KX_PLX_CRISIS_WARSAW_AMMENITIES_desc:0 "Although some may call Warsaw a 'Paris of the East', it still doesn't change the fact that there are large parts of the city left without necessary amenities like running water; we have to change that to the benefit of both the people and the economy."

KX_PLX_CRISIS_WARSAW_AMMENITIES:0 "Modernise Warsaw"
KX_PLX_CRISIS_WARSAW_AMMENITIES_desc:0 "Although some may call Warsaw a 'Paris of the East', it still doesn't change the fact that there are large parts of the city left without necessary amenities like running water; we have to change that to the benefit of both the people and the economy."

KX_PLX_LODZ_INDUSTRY:0 "Utilise the Potential of Łódź"
KX_PLX_LODZ_INDUSTRY_desc:0 "Łódź, the second largest city in Poland, has achieved unparalleled growth since 19th century, but the cities industry is getting old and outdated, we should consider modernising it, so that it doesn't become an industrial wasteland in the future."

KX_PLX_LODZ_CONSUMER:0 "Expand Consumer Factories"
KX_PLX_LODZ_CONSUMER_desc:0 "Łódź has always been the hub of Polish textile industry, we should continue this tradition and promote consumer goods production in the city."

KX_PLX_LODZ_MILITARY:0 "Shift Towards Military Production"
KX_PLX_LODZ_MILITARY_desc:0 "Consumers goods are necessary, of course, but there are hard challenges ahead of us, we should focus on shifting production in Łódź towards military use."

KX_PLX_KRAKOW_INDUSTRY:0 "Develop Kraków"
KX_PLX_KRAKOW_INDUSTRY_desc:0 "Although a big City, Kraków have never been known for its industrial produce, no more however! Large swaths of people from nearby countryside will soon seek employment here and we have to be ready to welcome them!"

KX_PLX_LWOW_INDUSTRY:0 "Develop Lwów"
KX_PLX_LWOW_INDUSTRY_desc:0 "Being on the peripheries of Austrian Empire, Lwów has been neglected for a very long time, but it still has potential! We just have to give the city our hand."

##Communist Tree
KX_PL_KPP_TAKES_POWER:0 "Communism Rises from Its Grave"
KX_PL_KPP_TAKES_POWER_desc:0 "Many have crossed Polish Communism as dead, how wrong they were!"

KX_PL_KPP_PACIFY_RESISTANCE:0 "Pacify the 'Dwarves of Reaction'"
KX_PL_KPP_PACIFY_RESISTANCE_desc:0 "Majority of 'problematic' elements of the Legionary Camp have been killed in one swift action, however there still are some who contest our right to rule."

KX_PL_KPP_SUPPORT_FROM_MODERATE_SOCIALISTS:0 "Seek Moderate Socialists Support"
KX_PL_KPP_SUPPORT_FROM_MODERATE_SOCIALISTS_desc:0 "Although accepting of Sławek's Coup, 'radical' wing of moderate Polish Socialists weren't entirely happy with this development, seeing Legionists devotion to social cause dubious at best, by convincing them to work with us, we will gain at least a little bit of desperately needed legitimacy."

KX_PL_KPP_CENTRAL_COMMITY_REVEALS_ITSELF:0 "Unify the Central Comity"
KX_PL_KPP_CENTRAL_COMMITY_REVEALS_ITSELF_desc:0 "Central Comity of the Polish Communist party have consisted of two parts, domestic and foreign one, now it is the time to reunite and take action!"

KX_PL_KPP_CREATING_COUNCILIARY_SYSTEM:0 "Lessons from Bolshevik Revolution"
KX_PL_KPP_CREATING_COUNCILIARY_SYSTEM_desc:0 "Although it is important to preserve the primacy of the Proletarian Vanguard, we should base our system of governance on councils (modelled after Russian experiences from the Bolshevik Revolution), so that they will counter any potential future depravation of the Party."

KX_PL_KPP_COMISSION_OF_PROLETARIAN_EDUCATION:0 "Institute of Proletarian Education"
KX_PL_KPP_COMISSION_OF_PROLETARIAN_EDUCATION_desc:0 "Poland may have become the Centre of Revolution at the Heart of Europe, but Polish people are clearly not entirely ready to carry this burden, we must educate them, so they understand what we are fighting for."

KX_PL_KPP_ECONOMIC_TRANSFORMATION:0 "Utilise Revolutionary Fervour"
KX_PL_KPP_ECONOMIC_TRANSFORMATION_desc:0 "Workers in our country are running amok; while their anger is justified, it should be directed towards useful goals, like fighting against internal reaction."

KX_PL_KPP_PREPARE_WORKERS:0 "Prepare the Workers"
KX_PL_KPP_PREPARE_WORKERS_desc:0 "Workers need not only to be educated in regards to their place in the revolution, but also in economy."

KX_PL_KPP_MASS_NATIONALIZATION:0 "End the Dictatorship of the Bourgeoisie"
KX_PL_KPP_MASS_NATIONALIZATION_desc:0 "Up to this point workers had been living under the Dictatorship of the Bourgeoisie, but now the roles had switched, and workers will oppress the owners!"

KX_PL_KPP_CENTRALIZED_PLANNING:0 "Centralized Planning"
KX_PL_KPP_CENTRALIZED_PLANNING_desc:0 "At the current state of the development of our 'Socialist Experiment' the most wise direction to take is top down system of economic planning."

KX_PL_KPP_DECENTRALIZED_PLANNING:0 "Decentralized Planning"
KX_PL_KPP_DECENTRALIZED_PLANNING_desc:0 "The decentralization of our planning system will give more input to local managers and officials, and pave the way to future workers self-governance."

KX_PL_KPP_MANDATORY_COLLECTIVISATION:0 "Collectivization of Agriculture"
KX_PL_KPP_MANDATORY_COLLECTIVISATION_desc:0 "Farms of the big landowners will be immediately put under the control of rural collectives, while the remaining small holders will be incentivised through special programmes and montetary compensation to voluntarily collectivise."

#KX_PL_KPP_VOLOUNTARY_COLLECTIVIZATION:0 "Take Inspiration from the 'NEP'"
#KX_PL_KPP_VOLOUNTARY_COLLECTIVIZATION_desc:0 "While the ultimate role is socialism both in the city, as well as in the village; we can put the village part on hold and instead focus on fully industrialising, so when majority of population migrates to the urban areas, the private property in the rural ones will be come insignificant. Still, large land holders will have their land confiscated and distributed among peasantry."

KX_PL_KPP_STATE_AGRICULTURE:0 "Nationalization of Agriculture"
KX_PL_KPP_STATE_AGRICULTURE_desc:0 "Some in our government have put forward a more radical version of collectivization, where all agriculture would be directly controlled by the state apparatus similar to how the industry already is. It would allow us to accelerate industrial development at the expanse of the peasantry..."

KX_PL_KPP_STATE_WILL_PROVIDE:0 "Fruits of Socialism"
KX_PL_KPP_STATE_WILL_PROVIDE_desc:0 "Although social welfare isn't at its core a communist ideal (it being workers ownership of the means of production), it still may be a good idea to distribute some of the preliminary ploughs of socialism to its builders."

KX_PL_KPP_INTERNATIONALISM:0 "Workers of the World, Unite!"
KX_PL_KPP_INTERNATIONALISM_desc:0 "Polish Communist Movement have always been more concerned with its place in the international fight against the beourgeoisie world order, than with such temporary gains as Polish Independence."

KX_PL_KPP_MAJORITY_FACTION:0 "Socialism of Today"
KX_PL_KPP_MAJORITY_FACTION_desc:0 "We may have been against Polish Independence in the past, but circumstances change and now we should work within the confinements of our country, until the world is ready."

KX_PL_KPP_ADAPTIVE_COMMUNISM:0 "Polish Way to Communism"
KX_PL_KPP_ADAPTIVE_COMMUNISM_desc:0 "Although our beliefs are still strictly communist, it doesn't change the fact that we are Polish Communists; we can't erase our past, so we can still respect it, while applying historical-materialist interpretation to it."

KX_PL_KPP_SUBSERVIENT_CHURCH:0 "Break the Church"
KX_PL_KPP_SUBSERVIENT_CHURCH_desc:0 "The will of the church has to be broken, that is undeniable, however we could perhaps control them and use them to legitimse ourselves..."

KX_PL_KPP_CULTURAL_REVOLUTION:0 "Social Revolution"
KX_PL_KPP_CULTURAL_REVOLUTION_desc:0 "We are not bound by the backwards ideals of right, or the church spreading its 'opioids for the people'; it is necessary to break the shackles of bourgeois morality. For freedom and justice, together bound in communism!"

KX_PL_KPP_DEPOLONIZATION:0 "Internationalism of Tomorrow"
KX_PL_KPP_DEPOLONIZATION_desc:0 "The Land on the Vistula is only a place from where we shall launch the world revolution. Caving to any nationalist sentiments is a pinnacle of revisionism, and we won't fall for it!"

KX_PL_KPP_ELIMINATE_THE_CHURCH:0 "Liquidate the Church"
KX_PL_KPP_ELIMINATE_THE_CHURCH_desc:0 "There are no negotiations with the Church, they are the symbol of everything that is wrong with this Land!"

KX_PL_KPP_EMULATE_RUSSIAN_NATIONALISTS:0 "Slavic Communitarianism"
KX_PL_KPP_EMULATE_RUSSIAN_NATIONALISTS_desc:0 "Communism does not exist in one - future - plain of existance, but as Marx has theorised it also existed in the past, and we believe that our ancient Slavic ancestors are a perfect example of such idyllic communitarian society."

KX_PL_KPP_GODLESS_RELIGION:0 "Godless Religion"
KX_PL_KPP_GODLESS_RELIGION_desc:0 "Developed by Bierut's mentor, Jan Hempel, concept of so called 'Godless Religion' is a revolutionary spiritual ideology that strives for the ultimate liberation of men, while staying in harmony with the universe, one's community, and finally with oneself; exemplifying the virtues of workers chivalry, honesty, and communitarian compassion."

KX_PL_KPP_PERMANENT_REVOLUTION:0 "Permanent Revolution"
KX_PL_KPP_PERMANENT_REVOLUTION_desc:0 "Whatever we think of Trotsky, he was right that Communism may only be achieved through World-Wide Revolution. We will prepare the structures of our State to become one with the workers of Central Europe, and than the world!"

##Monarchist Tree
KX_PL_PG_GERMAN_TAKEOVER:0 "New - German - Management"
KX_PL_PG_GERMAN_TAKEOVER_desc:0 "'Polish Wehrmacht' has taken over, now it is for the Generals of the expeditionary forces to decide the future course of Polish history."

KX_PL_PG_A_MONARCH_TO_CHOOSE:0 "A Monarch to Choose"
KX_PL_PG_A_MONARCH_TO_CHOOSE_desc:0 "To ensure stability we should consider installing a new monarch on the Polish throne..."

KX_PL_PG_KING_IN_POWER:0 "For the King's Well-Being!"
KX_PL_PG_KING_IN_POWER_desc:0 "The Monarchy survived, now the Crown's policies will shape our country, for better or for worse..."

KX_PL_PG_ROYAL_CABINET:0 "A Monarch to Choose?"
KX_PL_PG_ROYAL_CABINET_desc:0 "The Royal Council Prevailed, Karol II Olbracht however proved to not be the most cooperative monarch... Now many in the ultra-conservative circles see him as a 'traitor', opening the question of placing another person on the Polish throne..."

KX_PL_PG_CLERGICAL_ADVISORS:0 "Reaffirm Council's Authority"
KX_PL_PG_CLERGICAL_ADVISORS_desc:0 "Royal Council has guided us through turbulent times, and it will guide us in the future! Thus its prerogatives has to be strengthened and democratic institutions weakened."

KX_PL_PG_LOCAL_SEJMS:0 "Rely on Aristocracy"
KX_PL_PG_LOCAL_SEJMS_desc:0 "Polish Nation was once governed by so-called 'Golden Liberty', which ultimately lead to the demise of the 'First Commonwealth'; its faults were empowering of petty nobility, and we won't make such mistake again. Political power will be reserved for people of certain wealth or possessing sufficient amount of land."

KX_PL_PG_EMPOWER_SENAT:0 "Senat as Chief Legislative Body"
KX_PL_PG_EMPOWER_SENAT_desc:0 "The senate consisting mainly of aristocrats will become the main legislative body of our kingdom."

KX_PL_PG_NOBLES_OF_THE_ROBE:0 "Empower the Royal Ministers"
KX_PL_PG_NOBLES_OF_THE_ROBE_desc:0 "The power can not simply be surrendered to democratic institutions, ultimate authority will be transferred to the cabinet of ministers"

KX_PL_PG_ADVISORY_SENATE:0 "Advisory Senate"
KX_PL_PG_ADVISORY_SENATE_desc:0 "We will create the senate for concerns of the upper classes to be heard, but its role will be purely advisory and ceremonial."

KX_PL_PG_ADVISORY_SEJM:0 "Advisory Parliament"
KX_PL_PG_ADVISORY_SEJM_desc:0 "It is the time after a period of turmoil to reopen the parliament, however now the parliament will serve the king and not the other way around!"

KX_PL_PG_ESTATE_CONSOLIDATION:0 "Question of the Estates"
KX_PL_PG_ESTATE_CONSOLIDATION_desc:0 "For the last twenty years Poland saw progressing consolidation of its agricultural land, it has been largely beneficial for the overall economy, but perhaps not so for the general populace; thus creating some doubt regarding the merits of current government's policies. Furthermore it has risen concerns among the old rural elite due to the big capital breaking the boundaries between the city and countryside by taking part in land acquisition."

KX_PL_PG_NEO_SERFDOM:0 "Further Land Consolidation"
KX_PL_PG_NEO_SERFDOM_desc:0 "Only by consolidating the farming estates can we push the peasantry to the city, which may not be pretty, but necessary for further economic development."

KX_PL_PG_ROYAL_ESTATES:0 "Royal Domesne"
KX_PL_PG_ROYAL_ESTATES_desc:0 "To protect agricultural production of our kingdom it has been decide to increase involvement of the royal government in agriculture by buying out land from peasantry leaving for the city."

KX_PL_PG_AGRICTULTURAL_WORKERS_PROTECTION:0 "Limit the Land Sale"
KX_PL_PG_AGRICTULTURAL_WORKERS_PROTECTION_desc:0 "Further Consolidation of Agricultural land threatens not only the aristocracy, but also the peasantry, not to speak about the traditional order of society. Which is why we have to limit the 'nouveau riche' advancements in the village."

KX_PL_PG_ROYAL_TRADE_UNIONS:0 "Bureaucratised Economic Development"
KX_PL_PG_ROYAL_TRADE_UNIONS_desc:0 "When German economic influence in our country was strong it was impossible to enact anything but free market policies, now however our government sees necessity in using the guiding hand of the state to ensure further development and prosperity."

KX_PL_PG_PROGRESSIVE_TAX:0 "Indicative Planning"
KX_PL_PG_PROGRESSIVE_TAX_desc:0 "By utilising state controlled financial institutions, tax breaks, and state grants, we will able to steer our economy on the right course."

KX_PL_PG_ROYAL_MONOPOLIES:0 "Royal Monopolies"
KX_PL_PG_ROYAL_MONOPOLIES_desc:0 "Some industries will be given special rights, aiming at creation of large corporate bodies cooperating with the state."

KX_PL_PG_DEREGULATION:0 "'The Invisible Hand of the Market'"
KX_PL_PG_DEREGULATION_desc:0 "The 'unrestrained capitalism' has served us well until now, we will give free reigns to large industrialists to develop our economy."

KX_PL_PG_LIBERAL_TAX:0 "Economic Liberalisation"
KX_PL_PG_LIBERAL_TAX_desc:0 "The taxes will be cut and regulation reduced, this will make our economy both more efficient and the rich will have more to invest back into the economy."

KX_PL_PG_SUPPORT_FROM_CAPITAL:0 "Support from Big Capital"
KX_PL_PG_SUPPORT_FROM_CAPITAL_desc:0 "Our policies didn't go unnoticed by the big capital potentates, now we can surely rely on them in the times of need."

KX_PL_PG_TRADE_POLICY:0 "Reconsider Our Trade Policy"
KX_PL_PG_TRADE_POLICY_desc:0 "For a long time our economy has been dependant on German one, but with the events of the Black Monday a lot of ties have been severed and remain still to be re-established; and so a two paths exist, either seeking tighter cooperation with Germany risking our sovereignty, and economic dominance, but also with possibility of development by providing cheap labour to the German behemoth economy, OR we could try enacting protectionist policies to ensure stable but potentially slower development. However we are not entirely sure how Germany might react to the breach in their economic sphere of influence..."

KX_PL_PG_CHADECJA_ADVISORS:0 "Expand Monarch's Competencies"
KX_PL_PG_CHADECJA_ADVISORS_desc:0 "Royal Council is viewed by many as 'a bunch of scheming, grey eminences', thus perhaps we should consider transferring more power to our Monarch, who will safeguard our nation."

KX_PL_PG_DEVOLVED_GOVERNANCE:0 "Limited Democratisation"
KX_PL_PG_DEVOLVED_GOVERNANCE_desc:0 "What the recent crisis has shown is that Polish People desire more political rights; the King will consider granting them, although not too fast like the rebellious parliament wanted."

KX_PL_PG_EMPOWER_SEJM:0 "Supervised Parliamentarianism"
KX_PL_PG_EMPOWER_SEJM_desc:0 "Parliament have to be reopened and its powers restored, albeit under monarchs supervision, and the power of veto."

KX_PL_PG_EXPAND_ROYAL_COMPETENCIES:0 "Expand Royal Competencies"
KX_PL_PG_EXPAND_ROYAL_COMPETENCIES_desc:0 "Royal Council can't guarantee order by itself, our Monarch must be given strong prerogatives."

KX_PL_PG_RISE_OF_SYNARCHISM:0 "Rise of Synarchism"
KX_PL_PG_RISE_OF_SYNARCHISM_desc:0 "Synarchists has been influencing the Monarchist movement for quite some time, aiming at creating harmonious society with strong executive in the person of monarch. Now with the movement acknowledged by our King they are ready to implement their ideals."

KX_PL_PG_APPOINTABLE_SENATE:0 "Senate by Appointment"
KX_PL_PG_APPOINTABLE_SENATE_desc:0 "Senate for far too long has been dominated by the aristocracy, thanks to the unequal electoral system. Now it will be among the Monarch's prerogatives to appoint the senators, ensuring the harmonising control over the legislative system."

KX_PL_PG_REFORM_ROYAL_COUNCIL:0 "Royal Council - a Synarchist Council"
KX_PL_PG_REFORM_ROYAL_COUNCIL_desc:0 "Royal Council has already been quite similar to what Synarchists envisioned, albeit with one simple difference - instead consisting of the most able being appointed by the King, it has been a semi-independent body full of the wealthy and powerful. Thus it needs a deep reform to serve as a real harmonising body, where 'merit' is its defining word!"

KX_PL_PG_CASCADE_PARLIAMENT:0 "Cascade Parliament"
KX_PL_PG_CASCADE_PARLIAMENT_desc:0 "Parliament is in due need of necessary reform. In accordance with Synarchist principles, the electoral process will be deeply reformed, instead selected directly, the members of parliament will be elected by local bodies which then will elect parliamentarians from among themselves; furthermore the ballots provided will be designed around voting on the individual instead of a party."

KX_PL_PG_REAFFIRM_ROYAL_COUNCIL:0 "Reaffirm the Role of the Royal Council"
KX_PL_PG_REAFFIRM_ROYAL_COUNCIL_desc:0 "At all odds Royal Council survived, stronger than ever; now without Germany holding us back we can enact new policies, for strong Poland, in accordance with tradition and order."

KX_PL_PG_RELY_ON_ARISTOCRACY:0 "The Old Elite Holds On"
KX_PL_PG_RELY_ON_ARISTOCRACY_desc:0 "Only the Aristocracy can guarantee stability and prosperity for this nation, the Old Royal Council will hold on!"

KX_PL_PG_NEW_MILITARY_SAFEGUARD:0 "A New Military Safeguard"
KX_PL_PG_NEW_MILITARY_SAFEGUARD_desc:0 "Reformed army leadership under Władysław Sikorski will assume temporary control over the government to oversee transition towards democracy."

KX_PL_PG_FINDING_COMPROMISE:0 "Finding Compromise with Parliamentarians"
KX_PL_PG_FINDING_COMPROMISE_desc:0 "Sikorski will begin talks with the Members of the lower chamber of the Parliament to plan our steps towards democratic transition."

KX_PL_PG_REOPEN_PARLIAMENT:0 "Reopen the Sejm"
KX_PL_PG_REOPEN_PARLIAMENT_desc:0 "While its powers will remain suspended, the Sejm will reopen as a sign of good will, and to help us legitimise the amendments to constitution."

KX_PL_PG_SEJM_ADVISORY_ROLE:0 "Sejm Reduced to Advisory Role"
KX_PL_PG_SEJM_ADVISORY_ROLE_desc:0 "Sejm will be stripped of most of its powers, maintaining largely advisory role, to help our elite keep in touch with the general populace."

KX_PL_PG_CONTINUE_EXECUTIVE_ORDERS:0 "'Tradition' of the Executive Orders"
KX_PL_PG_CONTINUE_EXECUTIVE_ORDERS_desc:0 "While criticised by many due to perceived 'abuse' of executives orders by the Royal Council, the tradition has already been established and its use will continue."

KX_PL_PG_GOVERNMENT_BY_APPOINTMENT:0 "Government by Appointment"
KX_PL_PG_GOVERNMENT_BY_APPOINTMENT_desc:0 "Government will be appointed by the Monarch for the request of the Parliament, even if his powers are expected to be ceremonial he still will be able to exercise them in the times of crisis, retaining the Royal veto."

KX_PL_PG_LIMIT_ROYAL_PREROGATIVES:0 "Limit Royal Competencies"
KX_PL_PG_LIMIT_ROYAL_PREROGATIVES_desc:0 "Royal Competencies remain too strong at the moment, we can't be contained by the whims of the monarch, only the government can maintain stability!"

KX_PL_PG_UNITY_NOT_IDEOLOGY:0 "Unity - Not Ideology!"
KX_PL_PG_UNITY_NOT_IDEOLOGY_desc:0 "Radicalism brewed by 'Ideologism' has not served us well, we need to remain united and walk forward indeed, yet deliberately."

KX_PL_PG_ARISTOCRATIC_REPUBLIC:0 "'Republic' of Aristocracy"
KX_PL_PG_ARISTOCRATIC_REPUBLIC_desc:0 "Even with a Monarch, Republican traditions remain strong among the aristocracy in our country. No matter if we align with the 'Nouveau Riche', or if the clergy will exercise its influence, the ideals of 'Noble Democracy' will prevail!"

KX_PL_PG_POWER_TO_THE_SENAT:0 "Senat as Chief Legislative"
KX_PL_PG_POWER_TO_THE_SENAT_desc:0 "'Sejm' the lower chamber of Parliament has proven to be a rebellious element, now we will officially reduce its powers to advisory role, transfering legislative powers to senate, staffed with wealthy - and worthy! - elite."

KX_PL_PG_EXPAND_LOCAL_GOVERNANCE:0 "Expand Local Governance"
KX_PL_PG_EXPAND_LOCAL_GOVERNANCE_desc:0 "Local governance is an important component of healthy state, we will give more competencies to local 'sejms' for they know the best what is right for their regions."

KX_PL_PG_APPEAL_TO_INDUSTRIALISTS:0 "Appeal to Industrialists"
KX_PL_PG_APPEAL_TO_INDUSTRIALISTS_desc:0 "Despite our reliance on aristocracy, we can't ignore the urban capital. We will seek involvement with them, albeit keeping protectionf of aristocratic rights in mind"

KX_PL_PG_TAX_BREAKS:0 "Issue Tax Breaks"
KX_PL_PG_TAX_BREAKS_desc:0 "Tax breaks will kickstart our economy after the recent economic depression, and satisfy our ruling enviroment at the same time."

KX_PL_PG_LOWER_REGULATIONS:0 "Deregulate the Market"
KX_PL_PG_LOWER_REGULATIONS_desc:0 "We will lower regulations, allowing corporations to operate without fear of state stepping in, this will guarantee us rapid economic growth."

KX_PL_PG_PROTECTIONISM:0 "Protectionist Policies"
KX_PL_PG_PROTECTIONISM_desc:0 "Polish market needs to be protected from flood of foreign goods, we will enact appropriate trade policies to counter influence from abroad."

KX_PL_PG_CONTINUE_LAND_CONSOLIDATION:0 "Changes in the Village"
KX_PL_PG_CONTINUE_LAND_CONSOLIDATION_desc:0 "We cannot stop what is inevitable, land consolidation needs to be finished, even if it means crossing urban-rural lines."

KX_PL_PG_LIMIT_LAND_SALE:0 "Limit Land Sale"
KX_PL_PG_LIMIT_LAND_SALE_desc:0 "The urban capital has been crossing the lines and getting involved with agricultural land. We need to stop this course, to protect the interests of aristocracy."

KX_PL_PG_IGNORE_THE_NEW_RICH:0 "Ignore the 'Nouveau Riche'"
KX_PL_PG_IGNORE_THE_NEW_RICH_desc:0 "Only aristocracy, the nobility of old, can guide the nation in reasonable manner. We will ignore the industrialists, who perhaps have money, but not human dignity!"

KX_PL_PG_SEEK_LEGITIMACY_IN_PEOPLE:0 "Legitimacy in Nation"
KX_PL_PG_SEEK_LEGITIMACY_IN_PEOPLE_desc:0 "We will seek to reconcile all the classes of our state. We are all one Nation, and we will work as such."

KX_PL_PG_STATE_CONTRACTING:0 "State Contracting"
KX_PL_PG_STATE_CONTRACTING_desc:0 "In order to protect our country from the influence of decadent industrialists, we will introduce a system of state contracting, that will consider more than simply monetary aspects."

KX_PL_PG_PROMOTE_PHILANTROPY:0 "Promote Philanthropy"
KX_PL_PG_PROMOTE_PHILANTROPY_desc:0 "Although philanthropy won't replace proper welfare, by promoting it, we'll be able to tighten our budget."

KX_PL_PG_RESTORE_TRADE_UNIONS:0 "Restore Trade Unions"
KX_PL_PG_RESTORE_TRADE_UNIONS_desc:0 "Trade Unions will be restored and reformed into a three-way bridge between the state, the business, and the workers."

KX_PL_PG_PLATFORM_BETWEEN_CLASSES:0 "Platform Between Classes"
KX_PL_PG_PLATFORM_BETWEEN_CLASSES_desc:0 "To develop our country we need a proper coordination, business have to invest, workers need to protect their own dignity (in a constructive manner of course), and the government will oversee it."

KX_PL_PG_MODERATE_WELFARE_STATE:0 "Welfare in Moderation"
KX_PL_PG_MODERATE_WELFARE_STATE_desc:0 "Even if Bismarck certainly wasn't a friend of the Polish nation, he was right that there needs to be certain degree of reform and welfare to provided to people; so that both the lower classes are happy, and the upper ones keep stability."

#

KX_PL_PG_SCIENTIFIC_ECONOMY:0 "Scientific Economy"
KX_PL_PG_SCIENTIFIC_ECONOMY_desc:0 "Economy can not simply be left to the whims of the market, only by treating it as science will we be able to conduct rapid, yet sustainable, growth."

KX_PL_PG_NEW_KIND_OF_MONEY:0 "New Kind of Money"
KX_PL_PG_NEW_KIND_OF_MONEY_desc:0 "Financial models based on growth are severely outdated; we need to implement a new monetary system based on labour."

KX_PL_PG_CALCULATE_TAXES:0 "Taxation According to One's Ability"
KX_PL_PG_CALCULATE_TAXES_desc:0 "For far too long has the tax burden be disproportional for the lower classes! Institute of guidance will implement a new system based on wealth date and mathematics, to calculate how much one is due, ultimately aiming to limit taxation to profit from private property, in the future."

KX_PL_PG_EQUALITY_OF_LABOUR_AND_CAPITAL:0 "Equality of Labour and Capital"
KX_PL_PG_EQUALITY_OF_LABOUR_AND_CAPITAL_desc:0 "While possession of capital is justified, because it is achieved from ones work, labour relations have for far too long been dominated by the owning class. We need to aim at striking the balance between the workers and the employers, to attain just system for all."

KX_PL_PG_BALANCE_CONSUMPTION:0 "Balancing Consumption"
KX_PL_PG_BALANCE_CONSUMPTION_desc:0 "Consumer production has been plagued by inefficiencies, creating excess goods and causing the market to collapse. We need to employ elements of economic planning to regulate prices and encourage production of some goods, while discouraging others."

KX_PL_PG_HARMONY_ACHIEVED:0 "Harmony Achieved"
KX_PL_PG_HARMONY_ACHIEVED_desc:0 "Our system is yet to be implemented in full, but we already can see fruits of our work; Polish society will be a just one, where worker can enjoy ploughs of one's labour, and employer have their property be safe, where everything is efficient, leading to fulfilling life."

KX_PL_PG_INSTITUTE_OF_GUIDANCE:0 "Institute of Guidance"
KX_PL_PG_INSTITUTE_OF_GUIDANCE_desc:0 "'Instytut Celowości' will serve harmonising role in economy, coordinating production and providing basis for economic planning."

##Falanga Tree
KX_FAL_NATDEM_FALANGA:0 "Ascendancy of Radicalism"
KX_FAL_NATDEM_FALANGA_desc:0 "From the Chaos arose the new radical movement, National-Revolutionaries has take over the Polish state, vowing to implement their extremally nationalistic ideals, their planned economy, and guarantee Polish revenge against its neighbours."

KX_FAL_NATIONAL_CATHOLICISM:0 "National Catholicism"
KX_FAL_NATIONAL_CATHOLICISM_desc:0 "Despite our devotion to Catholic Identity, large swaths of Catholic Church refrained from supporting us, most likely due to our perceived radicalism. We have to strike them and initiate policy of separating the Catholic Church in Poland from the Vatican, after all, it is the Polish People that are the Chosen Nation!"

KX_FAL_GREATER_POLISH_NATION:0 "Greater Polish Nation"
KX_FAL_GREATER_POLISH_NATION_desc:0 "Many so-called 'Belorussians' and 'Ukrainians', lose the mark mistakingly denoting themselves as separate nationalities, while in reality they are nothing more than part of the 'Greater Polish Nation'. We have to support their assimilation, so that they remember their Polish roots, and we must manifest our destiny in the lands they claim home; which is our home, of course!"

KX_FAL_CULT_OF_PERSONALITY:0 "Develop Cult of Personality"
KX_FAL_CULT_OF_PERSONALITY_desc:0 "Poland Needs strong guidance, and certain people are destined to guide us; by elevating them we will guarantee unity for our nation. Poland once had strong people like that, like Sobieski, but than came degeneration of the traditional elites, and repulsive ideas of enlightenment..."

#KX_FAL_STRENGTH_OF_CHARACTER:0 "Merit by 'Strength of Character'"
KX_FAL_STRENGTH_OF_CHARACTER:0 "Proletarian Aristocracy"
KX_FAL_STRENGTH_OF_CHARACTER_desc:0 "Poland needs to be ruled in hierarchical order, of course not by the rotten elites of the past, that lost their mandate by making Polish People turn to despair, but by the people truly committed to national cause (those of course being party members), to ultimately create the 'proletarian aristocracy', just as both Lenin and Sorel envisioned."

KX_FAL_TOTAL_STATE:0 "Totality of the State"
KX_FAL_TOTAL_STATE_desc:0 "Even if most ideas of Marks proved to be a 'poison of nations', what Lenin theorised holds tremendous truth, for the national destiny of Polish working men can only be achieved through development of Vanguard Single-Party State, encompassing every aspect of human life."

KX_FAL_HIERARCHICAL_ECONOMY:0 "Degeneracy of Capitalism"
KX_FAL_HIERARCHICAL_ECONOMY_desc:0 "Capitalist is a degenerate economic system, serving not nation but few rich individuals. It has to be smashed and economy brought under state guidance."

KX_FAL_NATIONALIZED_INDUSTRY:0 "Capital Belongs to Nation"
KX_FAL_NATIONALIZED_INDUSTRY_desc:0 "Big Industry has to be nationalised, means of production will be organised by the state in order of fulfilling national interests."

KX_FAL_ONLY_SMALL_PRODUCERS:0 "Profit Only From Ones Sweat"
KX_FAL_ONLY_SMALL_PRODUCERS_desc:0 "Certain private initiative can be still be exercised, but wage labour has to be banned, for their is no justice in one living of others sweat."

KX_FAL_TRADE_UNION_PLANNING:0 "Smash the Parasitical Remnants of Nobility"
KX_FAL_TRADE_UNION_PLANNING_desc:0 "The rural elite has failed Polish Nation, they brought it to its downfall, and they have to pay for it; their land will be confiscated and put under 'common land' guided by the State."

KX_FAL_WAR_ECONOMY:0 "Economy in Service of Warriors"
KX_FAL_WAR_ECONOMY_desc:0 "Ultimately Poland has to maintain Militarised economy, for there are enemies on all sides, and only by defeating them will we restore Poland to its greatness."

KX_FAL_NATIONALIZE_BANKING:0 "Organize State Planning"
KX_FAL_NATIONALIZE_BANKING_desc:0 "To manifest the greatness of Polish Nation, economy will need strong state guidance, exercising entrepreneurship on national scale."

KX_FAL_PLANNING_BOARD:0 "Create All-National Trade Unions"
KX_FAL_PLANNING_BOARD_desc:0 "Trade Unions will play an important role in our national economy, by providing feedback in economic planning and coordinating work on micro-scale. Currently they are still not in our sphere of influence, that's why we will organise them along state lines, by institutionalising them into a country-wide body. Sorelians would call them syndicates, but we are long past their weak economic ideas that leave the workers alone in their struggle!"

KX_FAL_HIJACK_SOCIALIST_RHETORIC:0 "Hijack Socialist Rhetoric"
KX_FAL_HIJACK_SOCIALIST_RHETORIC_desc:0 "Despite socialist's treacherous internationalist views, they weren't all that wrong, their views on economy were somewhat right, and they were semi-right on class struggle, rightfully pointing out the parasitism of the owners of means of production, even if they wrongly extended their struggle towards non capitalist forms of hierarchy. We should utilise their rhetoric to gain support for our regime, and limit their support at the same time."

KX_FAL_NATIONAL_REVOLUTION:0 "National Revolution"
KX_FAL_NATIONAL_REVOLUTION_desc:0 "Polish nation has to undergo a fundamental change, a revolution! We will restore things worth restoring, and advance what's worth advancing; and by the end Polish Nation will be Pure, Christian, Free of Degeneracy and foreign elements, and under the rightful guidance."

