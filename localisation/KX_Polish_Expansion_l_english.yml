##New Endecja
KX_PL_NATDEM_NATION_DEMOCRACY_STATE:0 "The Young Unleashing Their Anger"
KX_PL_NATDEM_NATION_DEMOCRACY_STATE_desc:0 "The Young Radicals seized opportunity and control over National-Democratic movement. Their vigour will now shape the Nation!"

KX_PL_NATDEM_ELIMINATE_SOCIALIST_MEANCE:0 "Fight with Socialist Menace"
KX_PL_NATDEM_ELIMINATE_SOCIALIST_MEANCE_desc:0 "Socialist disease has rotten this nation to its core, we have to cut off those sick parts of us. Socialist activities, will be either severely limited or outright banned (like right to strike), we don't need them to disrupt functioning of our country with their so-called 'class struggle'."

KX_PL_NATDEM_TERMINATE_FOREIGN_ELEMENTS:0 "Terminate Foreign Elements"
KX_PL_NATDEM_TERMINATE_FOREIGN_ELEMENTS_desc:0 "We need to conduct a campaign of repression and assimilation of national - and ethnic - minorities; Poland can only be united through ethnic homogeneity!"

KX_PL_NATDEM_SUPPORT_CATHOLIC_CHURCH:0 "Poland National and Catholic"
KX_PL_NATDEM_SUPPORT_CATHOLIC_CHURCH_desc:0 "For far too long had German Protestantism been tempering the Zeal of our Church and our People, Catholicism will be restored to its proper place, for being a Pole is being a Catholic!"

KX_PL_NATDEM_ETATISM:0 "Morph the Beasts of Industry"
KX_PL_NATDEM_ETATISM_desc:0 "Polish Industries need to be combined into small bunch of Key Companies, only economy on large scale can truly work."

KX_PL_NATDEM_ORGANIC:0 "Nurture the Organic Society"
KX_PL_NATDEM_ORGANIC_desc:0 "Nation needs to behave like a Harmonious Organism, everyone serves their function - the Elite, the Worker, we share this Nations burden, everyone in some way."

KX_PL_NATDEM_ECONOMIC_DIRECTIVES:0 "Entrenching the Ownership"
KX_PL_NATDEM_ECONOMIC_DIRECTIVES_desc:0 "While our economic systems is characterised by Etatism, it doesn't means elimination of Capital; and even if with little to say about how their property is run, the Owning Class remains as an Elite from which we can draw strength..."

KX_PL_NATDEM_APEAL_TO_WORKERS:0 "Appeal to the Workers"
KX_PL_NATDEM_APEAL_TO_WORKERS_desc:0 "."

KX_PL_NATDEM_ALLOW_THE_CAPITALIST_DECADENCE:0 "Publicly Managed Capitalism"
KX_PL_NATDEM_ALLOW_THE_CAPITALIST_DECADENCE_desc:0 "While maintaining market mechanisms, our economy will be largely managed by bureaucratic orders, interfering when necessary, that is quite often..."

KX_PL_NATDEM_ONE_PARTY_STATE:0 "One Party to Rule them All"
KX_PL_NATDEM_ONE_PARTY_STATE_desc:0 "We won't pretend any more, democracy is weak and only the strong party can guide our Nation; and while we will maintain elements of democracy - especially referendums - to legitimise our rule, only one Party will remain."

KX_PL_NATDEM_PURELY_DEMOCRACY_FOR_ELITE:0 "Pure Democracy"
KX_PL_NATDEM_PURELY_DEMOCRACY_FOR_ELITE_desc:0 "We are a 'National-DEMOCRACY'; some may say our rule is undemocratic, those critics have to understand the difference between democracy and rule of the mob, not everyone is equal, and so not everyone's vote should be equal."

