PLX_KR_GATHERING_STORM_DESC:0 "After the Great War, Poland finally achieved it's independence. One could say that, but this 'independence' awfully looks like dependence on Germany. Never the less Polish people gained their own state, even if in it's minimal borders, and economy have been booming for a while now. Despite constant scheming of Polish Army, checked by German Garrison Forces, road ahead seems bright, or so we hope..."