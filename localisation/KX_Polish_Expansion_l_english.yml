### Events ###
plx.1.t:0 "Kingdom of Prosperity"
plx.1.d:0 "Despite theoretically existing as so called 'Congress Kingdom', Poland and Polish people were subjugated by the governments of partitioning power; so it came as no surprise that the 'Weltkrieg' gave Poles a hope of independence, especially after Germany and Austria initiated creation of Polish government in the lands of Russian partition. To many however, their hope materialised in disappointment, seeing, Polish disunity in internal matters, as well as increasingly interventionist German policies in this regard. \nNot long after the end of the Great War Poland was thrown into a crisis being unable to form a government and so Piłsudski marched with an army on Warsaw, but was swiftly stopped by German intervention, and forced into house arrest. What saved him from more gruesome fate was his popularity, Germany simply could not afford to get rid of him because it would severely undermine the supposed Polish-German 'alliance'. Germany also didn't want to antagonise entirety of Polish Army, considering potential Soviet threat at the time, thus a peculiar system of dual army was formed centred around both core Legionist Forces as well as German Garrison, keeping each other in check. Bolsheviks however were not to last long and with revolution in France and Britain, Legionists found themselves gravitating more and more towards the left, with increasing anti-German sentiment orchestrated by Piłsudski from his golden cage. And although the 'Informal Marshal' passed away almost a year ago his influence in the military still runs deep. \nMeanwhile, under German Pressure, a new constitution was adopted giving the de facto power to the 'Royal Council', with parliament serving a ceremonial role, and Christian-Democrats fulfilling the role of 'Rubber Stampers', largely due to them being the only legally allowed major party. Despite all that, during this time Poland experienced an unparalleled economic growth due to German investments, even if the benefits of this growth has been distributed unevenly... \nNevertheless, with the ascension of Karol II Olbracht (essentially a Pole himself!) onto the throne, continuous prosperity seems to be almost guaranteed..."
plx.1.a:0 "It truly is a Golden Age!"

plx.2.t:0 "Black Monday Hits Poland"
plx.2.d:0 "To the shock and horror of everyone in Polish government, the German Economy has crashed! Our absolute dependence on Germany caused economic collapse even greater than in our investor itself. Everyone fears what tomorrow will bring."
plx.2.a:0 "This situation is truly overwhelming"

plx.3.t:0 "Economy in Shambles"
plx.3.d:0 "Essentially every aspect of Polish economy was affected by the Black Monday, many industries went bankrupt and unemployment is skyrocketing. It became apparent that german-owned industry have to be either bought up or nationalised, however with the parliament challenging us, army making concerning manoeuvrers, and on top of that, general strike; we have to carefully consider our course of action..."
plx.3.a:0 "There is a rocky road ahead of us"

plx.4.t:0 "The Second March on Warsaw"
plx.4.d:0 "Dissatisfied with domestic developments, Legionists sized the opportunity and marched on Warsaw once again, and with the help of railway workers military troops were swiftly transported to the capital, ensuring their control over the government, and over the country..."
plx.4.a:0 "The time for 'Nation-Healing' has come!"

plx.6.t:0 "In the Spirit of '1905'"
plx.6.d:0 "New Constitution is not enough! Our crackdown on trade unions provoked the socialists to take action, and under the influence of radical PPS faction, railway workers helped transport socialist paramilitary organisations to the capital. For now the army has remained silent, waiting for the situation to develop."
plx.6.a:0 "Will it bring better tomorrow?"

plx.7.t:0 "Elections"
plx.7.d:0 "Thankfully we were able to secure a peaceful transition of power, the question now is which party will win the ballot..."
plx.7.a:0 "Chadecja will provide stability!"
plx.7.b:0 "PPS will ease the workers burden!"
plx.7.c:0 "PSL shall help the village!"
plx.7.e:0 "Endecja will ansure a National Rebirth!"
plx.7.f:0 "Endecja is victorious!"
plx.7.g:0 "Communists achieve surprising victory!"

plx.8.t:0 "Germany - a Foe After All?"
plx.8.d:0 "It was thanks to the German victory that we were able to ensure the creation of Polish State, nevertheless German Domination over our country has become especially apparent with recent events; perhaps we should reconsider our geopolitical allegiances..."
plx.8.a:0 "Our overreliance proved to be our weakness, we should cut-off from them"
plx.8.b:0 "Only Germany can guarantee our security"

plx.9.t:0 "Future of Polish Socialism"
plx.9.d:0 "It was the left wing of PPS that was put at the top by the army, however a great amount of work during the general strike has been done by Polish Syndicalists. PPS isn't averse to democratic process and so a special gathering will be called to decide the shape of our republic."
plx.9.a:0 "PPS proves more acceptable for general populace"
plx.9.b:0 "Syndicalists are triumphant!"

plx.10.t:0 "Legionist's Purpose"
plx.10.d:0 "German collaborators have finally been overthrown, now the question arises what is the future of Poland. Many in the Legionist Camp believes that only Legionists are qualified to guide Polish society, however some believe that we shouldn't cling to power so tightly, and have proposed gradual transfer of power to the moderate wing of PPS, after all it is the party of our origin, so that re-merging of Patriotic Socialists will provide a basis for transition into a healthy democracy. Although there still is an option for immediate declaration of democratic Republic, under military supervision, of course..."
plx.10.a:0 "Poland needs strong guidance"
plx.10.b:0 "Patriotic Socialists reunite at last!"
plx.10.c:0 "Democracy will be restored immediately!"

plx.11.t:0 "New Economy for New Poland"
plx.11.d:0 "Eugeniusz Kwiatkowski have always been the most vocal proponent of more centralised economy among the Legionists, and now since we found ourselves in power and decided to take his approach it is only natural to appoint him to be in charge of the economic reforms"
plx.11.a:0 "His influence will grow steadily..."
plx.11.b:0 "We might take his approach but he still is a civilian"

plx.12.t:0 "Kwiatkowski Rises to the Top"
plx.12.d:0 "Since his ascension as chief economic advisor, Kwiatkowski was able to gather tremendous amount of influence over the government, and since his reforms are proving to be quite successful the support for him among the Legionist leadership have been growing at rapid pace, it is only a matter of time until his factions assumes full control."
plx.12.a:0 "Sławek has been outmanoeuvred..."

plx.14.t:0 "Pitiful Coup Attempt"
plx.14.d:0 "Walery Sławek carried the second march on Warsaw! However his desperate action didn't give bold results, his unit was quickly comprehended and executed, largely due to majority of Polish military being swayed by the politicians to cooperate. This recklessness essentially brought doom to the whole Legionist movement."
plx.14.a:0 "At least now we have one problem less..."

plx.15.t:0 "The 'Workers Unity Front'"
plx.15.d:0 "Election of National-Democrats has been widely condemned by the majority of political spectrum, not trusting in their good intentions major opposition parties were faced with two options: begin talks to form a united front against the potential threat to Poland's welfare, or to plunge Poland into even greater chaos. The strongest and most vocal proponent of cooperation has been Antoni Ciszak - leader of the most far-left faction of Christian Democrats (which is quite ironic considering his anti-clerical views), he strives to create a big tent, yet united, movement of like-minded, socially-oriented organisations, so that no one will ever be able to dismantle welfare they want to build. The coalition will for, or god only knows what happens to Poland."
plx.15.a:0 "Coalition is formed, and crisis resolved!"
plx.15.b:0 "Poland plunges deeper into despair..."

plx.16.t:0 "Referendum in Motion"
plx.16.d:0 "The referendum has been called with the purpose of adopting new Constitution written purely by the National-Democrats. \nIt's most important aspects are; \n- Abolishion of Monarchy \n- Changes to the voting system (introducing wealth census)\n- And Stronger codification of Catholicism as the primary religion of the State. \n\nEssentialy every other political force in the country condemned the referendum, but the opposition remains fragmented..."
plx.16.a:0 "And so, the Endecja Marches On!"

plx.17.t:0 "Elections Once Again"
plx.17.d:0 "Shortly after the fall of National-Democratic Government a temporary, minority government of opposition parties was formed, it weren't to last for long however, and everyone knew it. That's why the parliament disbanded itself and called for new elections. Now, although many voters became disillusioned with the National-Democrats, they still hold a considerable support and one opposition party would most likely not be able to form a government by themselves, that's why the 'Workers Unity Front' is still necessary or we will face the cycle of perpetual elections once again. The coalition must carry on, that is for sure, many are however questioning its shape. \nThere are two directions the coalition can take, either sticking to the left, OR trying to absorb much more socially inclined wing of National-Democrats, their xenophobic tendencies and readiness to work with big business will however alienate the most socialist members of the coalition. Either way, if we take one of those routs our victory is near all but certain"
plx.17.a:0 "Our orientation remains to the Left!"
plx.17.b:0 "We have to be more flexible, ally the Right!"

plx.18.t:0 "Socialists Leave Coalition"
plx.18.d:0 "Without big surprise the socialists declared our right wing alliance as a 'betrayal of the working class' and denounce us, leaving the coalition in the process."
plx.18.a:0 "We are just being pragmatic!"

plx.19.t:0 "Radical Socialists Leave Coalition"
plx.19.d:0 "Our recent political decisions, have caused outrage among the most radical left-wing of the coalition leading to their withdrawal from it. Their presence in the parliament however weren't that big, and with more moderate socialists being unfazed by this commotion, our sizeable majority in parliament is still secure."
plx.19.a:0 "They are just being too idealistic!"

plx.20.t:0 "Formation of the 'PZPR'"
plx.20.d:0 "With our dominance over Polish political system secured, it is only natural to solidify it even more by transforming our coalition into a proper party, 'Polska Zjednoczona Partia Robotnicza' is here to stay."
plx.20.a:0 "One Party to Rule them All"

plx.21.t:0 "Shift in the Coalition"
plx.21.d:0 "With our recent actions, and growing influence of pro-social elements in the coalition, it become abundantly clear that our political alignment is to the left. We shall embrace it and prove that we are truly striving for people's welfare!"
plx.21.a:0 "Toward more just society!"

plx.22.t:0 "Republic After All?"
plx.22.d:0 "It can not be denied that we deserve our ascension to power from supporting monarchy in the first place, however what we care the most is the welfare of the people! Right!? And monarchy may prove to be nail to our coffin in the future too (not to mention it is unjust after all...) That's why we should perhaps consider abolition of it, we won't repeat our predecessors mistakes however and it will be decided through parliamentary vote, since... technically constitution don't forbid that... It may prove to be unpopular but we have enough political capital to burn!"
plx.22.a:0 "No, Monarchy is a guarantee of stability"
plx.22.b:0 "Our allegiance is to the Republic, to democracy!"
plx.22.b2:0 "Our allegiance is to the Republic, to democracy!"
plx.22.b3:0 "Our allegiance is to the Republic, to democracy!"

plx.23.t:0 "Economic Recovery"
plx.23.d:0 "We are very close to achieving pre-depression economic indicators, road to prosperity is ahead of us!"
plx.23.a:0 "It truly is!"

plx.24.t:0 "Budget Stabilisation"
plx.24.d:0 "The revenue to our budget is increasing, it won't take long until will be able to provide a balanced budget!"
plx.24.a:0 "Should budget be balanced though?"

plx.25.t:0 "Polish Ambitions"
plx.25.d:0 "Even though Poland recived theoretical independence after the war, this independence has only achieved a minimal polish state, and now that our independence has become more than theoretical many would like to see expansion of Polish territory to encompass all ethnic Poles. However there also have been some vocal proponents of the Intermarium dream that Piłsudski envisioned, and although everyone knows that it's goals are unrealistic, perhaps we should still strive for larger territory so that we can increase our power projection and ensure that our independence is eternal."
plx.25.a:0 "Let's not get overboard and focus on Polish ethnic territories"
plx.25.b:0 "We shall strive for greater territory!"

plx.26.t:0 "A Monarch No More"
plx.26.d:0 "To surprise of many Karol Olbracht have decided to peacefully abdicate. Wanting to prevent any bloodshed that his holding onto power could cause. \nHe cited his love for Polish Nation, and said that, although heartbroken by this development, he respects the course of action our nation took, wishing only the best for the people of our country. \nHe pledged to retreat into obscurity as a private Polish citizen, and although our government will closely monitor him, this development speaks well of our legitimacy."
plx.26.a:0 "Maybe He was a good monarch after all..."

plx.27.t:0 "Legionists Pledge Loyalt to the new Poland"
plx.27.d:0 "Although a man not without ambition, Walery Sławek had to recognize that the general strike presented the best opportunity for steering the course of Polish history back on its rightful track, free of the excessive influences of foreign powers. Thus he pledged unanimous support for our government, and majority of Legionists followed his lead, seeing him as a man personally picked by Piłsudski for his successor. Taking all that into consideration, it is certain that Sławek will sooner or later try to build his influence in Polish politics, hopefully through legitimate means...
plx.27.a:0 "They are loyal to us, and we will be loyal to their - our! - patriotic principles."

plx.28.t:0 "A Slavic Unity?"
plx.28.d:0 "Many influential people in Polish syndicalist movement have strong sympathies for the cause of Slavic Solidarity, some of them even went as far as to propose formation of Slavic federal state. It may seem far fetched and unrealistic, but perhaps we should entertain the idea?"
plx.28.a:0 "The Canvas of our future are still to be painted..."

plx.29.t:0 "Trade Unions hit the streets"
plx.29.d:0 "Our attempts to limit trade unions' activities have backfired. We were able to contain the unrest with a mix promises and subtle allusions to the threat of German intervention, however rebuilding unionists trust will take some time..."
plx.29.a:0 "We shouldn't be dividing people like that..."

plx.30.t:0 "Death of Antoni Ciszak"
plx.30.d:0 "Antoni Ciszak the chief founder of 'PZPR' suffered today a fatal stroke, and died soon after. This truly saddening situation however, won't have much of an impact on the political movement we built. Ciszak's work has been diligent, and thanks to him, Polish political scene is more united than ever. Now he will be succeeded by one of his proteges."
plx.30.a:0 "May His name never be forgotten!"
plx.30.a2:0 "May His name never be forgotten!"
plx.30.b:0 "May His name never be forgotten!"
plx.30.b2:0 "May His name never be forgotten!"

plx.31.t:0 "Social Situation Calms Down"
plx.31.d:0 "The excessive unemployment has largely been dealt with, and populations' financial situation is steadily improving. We are aiming at greater prosperity than before the depression!"
plx.31.a:0 "After all, what is the purpose of economic indicators, if everyone is still impoverished?"

plx.32.t:0 "Salvaging the Economy"
plx.32.d:0 "Our Government is now firmly in power. The time has come to finally address real issues and bring deterioration of our economy to a halt!"
plx.32.a:0 "Let's get to work!"

plx.33.t:0 "Meeting with Workers?"
plx.33.d:0 "Legionists' grip over the state apparatus seems almost assured now, the same can not however be said about people's hearts, some of the workers seem alienated from our originaly Socialist movement. Perhaps it would be in our interest to stage a meeting between the Legionist Leadership and some ordinary workers to warm up our image."
plx.33.a:0 "No, we should focus on more important matters"
plx.33.b:0 "Splendid idea!"

plx.34.t:0 "Streets Flow with Legionist Blood"
plx.34.d:0 "What was supposed to be a 'simple coup' proved to be a bloodbath organised by the (thought to be extinguished) members of Polish Communist Party, the Army Leadership lays dead, the Army itself is in disarray, and the Royal Council lost the control as well. And Communists declared themselves the new government..."
plx.34.a:0 "Onwards towards Communism!"
plx.34.b:0 "German Garrison intervenes to 'save' the day"

plx.35.t:0 "Declaration of the 'Polish Socialist Council Republic'"
plx.35.d:0 "The Central Comity of the Polish Communist Party have announced their plan for gradual transition of temporary powers to the Councils, thus marking the beginning of the new chapter in the history of Poland. Of course many across the political spectrum called this change 'unconstitutional', but we won't worry about some bourgeois piece of paper!"
plx.35.a:0 "'Polska Socjalistyczna Republika Rad' marches toward liberation of the Proletariat"

plx.36.t:0 "Birth of the 'Federation of Socialist Council Republics'"
plx.36.d:0 "At the recent plenary session of the Polish Supreme Council the General Secretary of the Communist Party - [POL.GETLeader], declared inclusion of the 'Doctrine of the Permanent Revolution' into the State Program, in the process creating new entity called 'Federacja Socjalistycznych Republik Rad', thus declaring our intent of going beyond Poland, aiming at the unification of the European Proletariat. There remains one question however, some in our party propose to focus on the West, seeing it as more 'mature' and ready for communis, others however point to our historical ties with Russia, and Eastern Europe in general..."
plx.36.a:0 "Let's focus on the West"
plx.36.b:0 "The East is our calling!"

plx.37.t:0 "Nationalism in Service of Communism"
plx.37.d:0 "World-Wide Communism is our goal, that is undeniable, however on our road to it we can't erase the past, and the national identities won't disappear over night either; because of those reasons more Polish-Oriented camps within the party has been gaining more and more support criticising our disregard for the identity of workers and accusing us of 'overzealous vanguardism'. As things stand now, those factions will sooner or later take the control over the party."
plx.37.a:0 "We should focus on Polish-Communist identity"
plx.37.b:0 "Towards the Slavic Utopia!"

plx.38.t:0 "Battle for Modlin"
plx.38.d:0 "Since our government have decided to finally get of the German leash, its first move was 'repolonization' of the Modlin Fortress. For a long time it has been seen as a symbol of Polish dependence on other powers, first Russians, and later Germans; no more however! Polish Troops were ordered to 'expatriate' the German Garrison stationed there, but what was supposed to be a peaceful requisition, turned into a massive shootout. Thankfully Polish troops were able to swiftly deal with the situation, taking many German soldiers as prisoners and 'confiscating' some of the German arms located within the fortress. Although the highest 'Polish Wehrmacht' command wasn't present in the fortress, and were able to escape; it is all but sure to cause an international incident."
plx.38.a:0 "We will wash away all the humiliations of the past!"

plx.39.t:0 "The Dream of Intermarium"
plx.39.d:0 "Intermarium has been Piłsudski's long time dream... More than that, it has been Polish geopolitical dream for centuries in all but name! Now that Poland is in position to dictate terms it is only natural that we would strive for the unification of Central Europe, it is the only way otherwise those nations, the Beating Heart of Europe, will sooner or later become either Russian or German pray, together we are strong! The question however remain to what extent we intend to go..."
plx.39.a:0 "Let's Unify the Lands of the Commonwealth..."
plx.39.b:0 "and the Western Slavs..."
plx.39.c:0 "and Hungary, and Romania..."
plx.39.e:0 "and the Balkans..."

plx.40.t:0 "Face of the Party"
plx.40.d:0 "Recently Our Coalition has passed a new republican constitution, according to which Poland is a parliamentary republic with the Premier serving as the head of the government, and President also chosen by the Parliament, performing largely representative role, holding powers similar to the monarch in the former constitution. In effect in the system dominated by our Party, the President is bound to become the image of the party itself. The question however remains of who would serve this role the best... it is also important to remember that nothing in the constitution prevents President and Premier from being one and the same in case the Parliament wishes so..."
plx.40.a:0 "Antoni Ciszak leads us well, he can hold both posts..."
plx.40.b:0 "Jan Brzechwa, a poet, is both competent and popular!"
plx.40.c:0 "Mieczysław Fogg, a famous singer, will handle 'spectators' well!"
plx.40.e:0 "Bolesław Piasecki, a nationalist-compromiser, will represent us well."

plx.41.t:0 "[GetYear] Elections"
plx.41.d:0 "Despite the dominance of Socialists in our country, Poland is still a democracy, and so every party that vows to respect that socialist constitution is allowed participate in the elections. Many political organisations adapted to this new reality, and now seek an electoral victory. But who will attain such victory..."
plx.41.a:0 "Norbert Barlicki and the PPS!"
plx.41.b:0 "Stanisław Dubois and the PPS!"
plx.41.c:0 "Julian Tuwim and the PPS!"
plx.41.e:0 "Władysław Gomułka and the PPS radicals!"
plx.41.f:0 "Walery Sławek and the patriotic PPS!"
plx.41.g:0 "Reformed PSL under Józef Niećko!"
plx.41.h:0 "Stefan Wyszyński and his Christian Socialists!"
plx.41.i:0 "Zygmunt Żuławski and the PPS!"

plx.42.t:0 "Socialist Parliamentary Democracy"
plx.42.d:0 "Among socialists there is a great amount of distrust towards so called 'liberal democracies', and although we agree with them to a degree, we still believe that the issues of those kind of democracies lies not within the systems themselves but within the capital and its greed that corrupts in an absolute manner; thus we believe in a literal 'social democracy' the reform of the old system, but still not accommodation to it. That being said what's the point of all the reforms we do, of all the progress we make, if over time, a wave of authoritarian opportunism sweeps it all away? We can't allow that! We are a democracy and elections will still be held, some radicals will just not be allowed to operate openly, as common sense dictates."
plx.42.a:0 "For Justice and Democracy!"

plx.43.t:0 "[GetYear] Elections"
plx.43.d:0 "We are a democracy and elections are the only natural order, and the will of the people is a mandate from which we carry our right to rule; and thankfully for us, in the current political system, there is no one that can challenge us!"
plx.43.a:0 "I love Democracy!"

plx.44.t:0 "[GetYear] Elections"
plx.44.d:0 "The recent years have been turbulent for our country, but we still are a democracy, and the call of who should rule belongs to the people; and their trust lies with..."
plx.44.a:0 "Chadecja!"
plx.44.b:0 "PPS!"
plx.44.c:0 "PSL!"
plx.44.e:0 "National Labour!"

plx.45.t:0 "Slavic Revival under Communism"
plx.45.d:0 "Polish Identity is so narrow minded, we should look into our roots, look up to our Slavic forefathers, whose communitarian ethos, not tainted by christian morality, allowed them to live in the state of spiritual liberation; and we strive to recreate this paradise on earth through unification of the Slavic People!"
plx.45.a:0 "Towards Tomorrow reinforced by the Past!"

plx.46.t:0 "Post-Bolshevik Terrorist Cells Destroyed"
plx.46.d:0 "It was commonly thought that all 'Post-Bolshevik' organisations were destroyed not long after the Reds defeat in the Russian Revolution; it proved to be untrue, since we discovered they were planning a covert operation aimed at the highest ranking officials in our country, to throw it into chaos and take control. We simply can't allow such thing to slide, and so they have been arrested and await the trial..."
plx.46.a:0 "Phantoms of the past have finally withered away..."

plx.47.t:0 "Pre-Emptive Miliary Purge "
plx.47.d:0 "Despite their initial inaction, it comes at no surprise that the military is largely hostile towards us. We need to act pre-emptively and and purge the high-ranking Legionists. Stefan Żbikowski, assigned as the head of internal security, will be tasked with removal of reactionary elements, and organising 'Czerwona Gwardia' ('Red Guard') in order to safeguard the Revolution!"
plx.47.a:0 "In memory of the Martyrs of the 'Red Regiment of Warsaw'"

plx.48.t:0 "Question of Leadership"
plx.48.d:0 "Polish Communist Party for the last twenty years has been divided into 'Majority' and 'Minority' factions, the former has remained in the country and advocates for more moderate policies, while the latter consists of more radical members, largely hard-liners associated with Russian 'Bolsheviks', that operated in exile. Furthermore, recently members of 'Radical Peasant Party' had joined our ranks. \nNow that the communist leadership in the country has been secured, the minority faction has entered the confines of our country, demanding primary role in the leadership, citing their 'ideological purity', of course they have been criticised by many, pointing our their detachment from the country issues. Nevertheless the decision of leadership, remains in the collective hands of the Central Comity. It will dictate the faction, and persona that will lead our nation, so that we stay united, as 'democratic centralism' dictates!"
plx.48.a:0 "Majority Faction - Adolf Warski!"
plx.48.b:0 "Majority Faction - Maria Koszutska!"
plx.48.c:0 "Minority Faction - Józef Unszlicht!"
plx.48.e:0 "Minority Faction - Feliks Dzierżyński!"
plx.48.f:0 "Minority Faction - Karol Radek!"
plx.48.g:0 "Minority Faction - Wanda Wasilewska!"
plx.48.h:0 "Majority Faction - Feliks Hołowacz!"
plx.48.h:0 "Minority Faction - Stefan Żbikowski!"

plx.49.t:0 "Question of the Official Language"
plx.49.d:0 "We strive for the World Revolution and so we may need a revolutionary language! Many have proposed switching to using Esperanto as an official language, deeming retaining Polish Language as primary one 'reactionary'; critics of this idea say however, that local languages would still be used out of pragmatism. Nevertheless maybe we should still entertain this idea to prove that we prefer no nationality over another, in our country."
plx.49.a:0 "Incredible idea, Esperanto it is!"
plx.49.b:0 "We should stick to Polish..."

plx.50.t:0 "Question of the Official Language"
plx.50.d:0 "Since we strive to revive old Slavic ideals in the spirit of communitarianism, it would be only natural that we switch our official language to 'Pan-Slavic' one, to emphasise Slavic Unity. Opponents of this idea however, say that since we strive to be closer to our Slavic roots, creating a modern constructed language will be counterproductive to that. Never the less maybe we could still entertain this idea, after all we not only want to go to our roots, but to go further, towards the liberation of all men!"
plx.50.a:0 "Incredible idea, Pan-Slavic it is!"
plx.50.b:0 "We should stick to Polish..."

plx.51.t:0 "A Party Divided"
plx.51.d:0 "Ever since the end of the war Endecja had been progressively more and more divided, hold essentially only by Dmowski's authority, and now that Dmowski is no more, Endecja have to finally make its course clear. \n\nThe party divide is chracterised by the 'Old' and 'Young' factions; the 'Olds' having more moderate nationalist outlook and focus on laissez-faire economics, while the 'Young' Camp is largely more nationalistic and leaning towards corporatism. \nHowever another factions while technically belonging to the 'Young', remains separate; having some ties to the 'Red National Radicals', while remaining in the broad 'Endecja'. \n\nConfrontation of those camps can no longer be avoided, and now it is time to decide on what course National-Democracy is set to go..."
plx.51.a:0 "The Old Castle Shall Prevail!"
plx.51.b:0 "It is the Time for Younger Generation!"
plx.51.c:0 "Poland is No Country for Old Men..."

plx.52.t:0 "The Wealth of the Church"
plx.52.d:0 "Despite having its roots in Christian-Democratic movement, Antoni Ciszak and his faction have always been largely anti-clerical; on top of that Socialists, also support limiting the power of clergy; however there still are many 'classical' religiously attached Christian-Democrats supporting us, which makes our coalition divided on the issue of the Catholic Church, although many opponents of the Church still accent that those are the rotten institutions, and not the religion itself, they are against. Considering this situation there are three proposals coming at play here. The first one, supported by the moderate-left wing of the coalition, consists of creation of the church fund, where the special religious tax will be collected from the ones willing to pay it, which than will go through our government; this will make the Catholic Church (and any other religious institutions at that) heavily dependant on the government. Second proposal, pushed by the more radical left (and Ciszak himself), insists on not only severing the ties between church and the state, but also implementing anti-religious measures, discouraging the population from practising religion, furthermore the Church land is to be confiscated, and religious organisations banned from ownership over any form of property altogether, and forced to lease churches from the state. Third and last proposal is barely a proposal at all, because its supporters want to just keep the status quo, criticising overtly anti-church sentiments for potentially unnecessarily disturbing the social fabric, through petty conflicts with the clergy. Ultimately however, with the coalition divided on the issue, the choice lies in the hands of Ciszak, whose faction holds the political alliance together; will he prioritise beliefs of his camp or maintaining balance within the coalition?"
plx.52.a:0 "Church Fund is the most elegant solution"
plx.52.b:0 "Church Fund is not enough, we have to give them a lesson in "charity"!"
plx.52.c:0 "We should keep the status quo..."

plx.53.t:0 "Shift in the Coalition"
plx.53.d:0 "Both our economic, as well as social policies positioned us firmly on the left, so firmly in fact that the more right-oriented elements in our camp have decided to breakaway, we can only bid them farewell to act in opposition, since even without them, our political position remains dominant, and we stand stronger than ever with our left-wing position firmly assured."
plx.53.a:0 "Justice and Progress for All!"

plx.56.t:0 "Preacher of Poverty and Justice"
plx.56.d:0 "Although our policies towards Catholic Church might have been harsh, it seems like not all clergy were alienated by it. Bishop Stefan Wyszyński has become quite famous in recent days, due to his unorthodox sermons, preaching the spiritual renewal of church through giving up its temporal wealth, and standing in support of social justice. He might prove to be an invulnerable asset in pacifying down the church hierarchs anti-government rhetoric, however it remains uncertain whether his preachings are sincere, or he does it all to protect the interests of the Church itself..."
plx.56.a:0 "Closer cooperation might prove beneficial"
plx.56.b:0 "Government should not intermingle with clergy, in any form"

#Superstates
plx.57.t:0 "Seeking the Like-Minded"
plx.57.d:0 "Of course, we don't just happen to be the only Panslavists, there is a wide variety of such movements, from left to right; we should seek to expand our links and strive for closer cooperation with such groups."
plx.57.a:0 "'Democratic National Syndicalists' will be perfect allies!"
plx.57.b:0 "Bierut's 'Slavic Communists' will bolster our movement!"

plx.58.t:0 "The Phenomenon of Zadruga"
plx.58.d:0 "One peculiar movement came into our attention. Jan Stachniuk's 'Zadruga' is a peculiar blend of different political, economic, and spiritual ideas, and while Hempel's 'paganism' is more esoteric, Stachniuk's slavism is genuine in practice, and nationalism more fervent, putting us somewhat at odds. Despite all that, Stachniuk has expressed a high degree of enthusiasm towards our reforms, and so Zadruga might be a perfect candidate for broadening our coalition."
plx.58.a:0 "Welcome them as our brethren!"
plx.58.b:0 "No, they are way too shady and nationalistic..."

plx.59.t:0 "Rise of Zadruga"
plx.59.d:0 "Stachniuk has adapted really well into our political and social system; his movement has been gaining momentum, with his personal influence is growing, and even though the de facto composition of our government remains intact, 'Stoigniew's' (as Stachniuk dubed himsel) presence is now all encompassing among the communes; it is only natural that he will be our leader, from now on. With Stachniuk's new-found popularity, the movement is growing, and there is much to do, to better reflect our 'ancient Slavic roots'!"
plx.59.a:0 "The course is changing..."

plx.60.t:0 "Lumpen Communists"
plx.60.d:0 "Ever since the Great War, German and Austrian socialist movements have been a shadow of their former selves; it doesn't mean however that there is nothing to be salvadged here, the communist activists that survived are more zealous than ever before; now they can help us building up our structures in the newly liberated lands."
plx.60.a:0 "Building Local Structures might be boring but Important..."

plx.61.t:0 "The 'Social-Monarchists'"
plx.61.d:0 "It is undeniable that the Social Democrats have betrayed the socialism in the time of great need, however it could be argued that some of their actions were rather Machiavellian, rather than coming from love for the old order; and now their 'flexibility' might prove beneficial. Some social democrats has expressed their willingness to work with us; we could seriously make use of their political base, considering they already have built local structures as the furthest left legally operating organisation, and with support of those 'wild oats' coopting social-democratic institutions won't be hard."
plx.61.a:0 "We Stand United Like Never Before!"

plx.62.t:0 "Radicalising the Unionists"
plx.62.d:0 "Even though the Social-Democrats were the 'far-left' of Central-European mainstream politics, the trade unions have been a breeding ground for more informal organisation of the working class. By aligning with more radical elements within the Trade Unions, we'll be able to efficiently utilise them in our political machine, as well as help managing the transforming economy."
plx.62.a:0 "Syndicalists might help, but the Vanguard will stay on top..."

plx.63.t:0 "Europe or Beyond?"
plx.63.d:0 "We've made great advances in our struggle, now it is important to reflect on how we should go, many say it is impossible to efficiently unite Europe under single, undivided, Socialist banner; even less possible uniting the World under one, but maybe we shouldn't listen to those obstructionists, and let the men dream!"
plx.63.a:0 "First Europe..."
plx.63.b:0 "...than the Whole World!"
plx.63.c:0 "We have to retain our sanity and stay pragmatic..."

#Dmowski Dies
plx.64.t:0 "Death of Dmowski"
plx.64.d:0 "For quite some time now Dmowski has been struggling with poor health, and in recent days the sickness finally overpowered him; Roman Dmowski died at his own house, although not unfulfilled... He has been credited as the father of National-Democratic movement, and in recent years he finally oversaw the rise of his political party to power. Although many critiques of the government rejoice at his death, National-Democrats have declared a national day of mourning to commemorate his death. \n\nFor now Rybarski will assume the leadership, however the cracks in the movement are clear, and need to be addressed, sooner rather than later..."
plx.64.a:0 "But his legacy lives on..."

plx.65.t:0 "Reluctant Presidency"
plx.65.d:0 "Dmowski's days of youth has become only a distant memory, and in recent years his health has been rapidly deteriorating; despite of that the National-Democratic leadership had insisted on him accepting the presidential post, even if only in symbolic manner. Thankfully for the party their pleas came to fruition, and Dmowski reluctantly agreed, holding National-Democracy together, for the time being..."
plx.65.a:0 "Even if only as a Symbol, he guides us"

#Royal Council Start Rework
plx.66.t:0 "King Refuses to Sign Parliament's Constitution"
plx.66.d:0 "The king has refused to sign the parliamentary bill that would amend the constitution! In effect cementing the power of the Royal Council."
plx.66.a:0 "Ruling is not for the 'unenlightened ones'!"

plx.67.t:0 "German Garrison Commences Hostile Takeover"
plx.67.d:0 "To the horror of everyone in Poland, unsatisfied with Polish domestic developments, German Garrison has decided to take full control."
plx.67.a:0 "The German is truly spiting in our face now..."

plx.68.t:0 "King Signs the New Constitution"
plx.68.d:0 "The King has decided to side with the Parliament and sign the new constitution! Effectively abolishing the Royal Council, and marking the beginning of truly parliamentary monarchy!"
plx.68.a:0 "Long Live the King!"

plx.69.t:0 "The King's Speech?"
plx.69.d:0 "Polish King has for a long time been largely a figurehead for the Royal Council, not having any real opportunity for independent actions; but it is about to change. Despite constitutionally requiring support of the eighty percent of parliamentarians, politicians form all of the political spectrum united to propose the new Constitution; nevertheless the King still possesses the power to exercise his right of veto. It is well known that the King has a lot of compassion for the Polish people, and his decision will most likely be based purely on what he considers the best for them..."
plx.69.a:0 "But for now, Karol II Olbracht remains silent..."

plx.70.t:0 "Parliament Calls for Change"
plx.70.d:0 "Since the end of the War Polish Parliament has remained largely irrelevant, not holding any real power; but in those times of crisis the parliament has decided to finally make it's move. Politicians from across the Political Spectrum demand the abolition of Royal Council and Creation of Democracy."
plx.70.a:0 "So they stand united for once!?"

plx.72.t:0 "Piłsudski The Socialist"
plx.72.d:0 "Our Recent Policies have showed everyone doubting that our allegiance is truly to the left, realising Piłsudski's vision of Socialist Patriotism."
plx.72.a:0 "Salute to the Marshal's Legacy!"

plx.73.t:0 "Piłsudski The Statesman"
plx.73.d:0 "Our Recent Policies have showed that we are ready to accommodate and build society on solidarity, not strife; Piłsudski would truly be proud."
plx.73.a:0 "Salute to the Marshal's Legacy!"

##v2
plxv2.002.t:0 "The Unacceptable Outcome"
#plxv2.002.d:0 "With election resulting in National-Democrat victory, and Legionists refusing to accept them due 'incompatibility with Polish interests', Poland stands at the face of yet another crisis. \n Antoni Ciszak sized the opportunity in an attempt to construct a coalition, dubbed as the 'National Unity Front'. Ciszak has been a peculiar character in the Polish politics, moving from Poznań to the Kingdom of Poland, shortly after its creations, he has been manoeuvring between different political camps, from Socialists to Christian-Democrats, even despite his staunchly anti-clerical views. His peculiarity however may work in his favour, this time, he may be able to create a coalition sanctioned by the Military, and hopefully protect Poland from grim fate. \nAnd who knows what will happen otherwise...."
plxv2.002.d:0 "With election resulting in National-Democrat victory, and Legionists refusing to accept them due 'incompatibility with Polish interests', Poland stands at the face of yet another crisis..."
plxv2.002.a:0 "Coalition will save Poland!"
plxv2.002.b:0 "Is the regime doomed to fall?"

plxv2.003.t:0 "Growing Dissent in the Army"
plxv2.003.d:0 "For years the Army has proven itself to be unruly, however recently its resistance has reached alarming levels. Perhaps they are preparing for a coup... \nWe could initiate a military purge, leaning on German garrison, but such move might backfire, as well..."
plxv2.003.a:0 "We have to resolve this situation..."

plxv2.004.t:0 "Workers Hit the Streets"
plxv2.004.d:0 "Urban workers has been hit the most by the economic crisis, now they has organised a general strike, seeking bread... \nWe should consider talking to them, or otherwise, they might pressure the King to adapt new constitution in their favour; or even support the military coup..."
plxv2.004.a:0 "There surely is a way deal with that..."

plxv2.007.t:0 "Future of 'Chadecja'"
plxv2.007.d:0 "Chadecja won the elections and secured its position as the most important party in Poland, being able to finally fulfil its program, however, happens to be rather overwhelming. Many insist on sticking to the plan of maintaining balance between middle and lower class, some want to cooperate with moderate National-Democrats, others propose turning the turning our movement towards creation of a truly mass labour party; but the question remains open..."
plxv2.007.a:0 "Christian-Democratic Center remains strong"
plxv2.007.b:0 "National-Democrats will bolster our support base"
plxv2.007.c:0 "The conservative Labour Movement it is!"

plxv2.006.t:0 "The Fall of the Big Tent"
plxv2.006.d:0 "With its victory in the elections, PSL function as an electoral platform has been fulfilled; now torn from within, the People's Movement is at crossroads and any particular faction won't be able to form the government by themselves, instead having to rely on coalition partners. \n\nEugeniusz Okoń - a Catholic priest representing the most radical incarnation of the People's Movement (aside from Communist Party mergers), vows to align with PPS and conduct unconditional land reform, taking all of the land for 'those who work on it'. \nOn the opposite side of the spectrum is Wincenty Witos, a proponent of extraordinarily moderate approach, not shying away from aligning himself even with National-Democrats. \nSomewhere in the middle stands Stanisław Mikołajczyk, wanting to carry on a moderate, yet uniform land reform, contrary to Witos, who would prefer to base land quotas depending on the region. \n\nDespite this discord, the victory of the People's movement, can give our nation hope to finally, decisively, resolve the matter of land reform."
plxv2.006.a:0 "Witos' faction will carry constructive land reform!"
plxv2.006.b:0 "Mikołajczyk will bring prosperity!"
plxv2.006.c:0 "Okoń and the Radicals - for Justice!"

plxv2.005.t:0 "Factions of PPS"
plxv2.005.d:0 "PPS was able to secure its victory, but the Party remains divided. Even though both wings of the party want to conduct similar reforms, the radicals want to do it immediately, while the moderates prefer gradual transition. And so the dilemma stands, who will lead us?"
plxv2.005.a:0 "Slow and Stead we will go"
plxv2.005.b:0 "Radical PPS rules the day!"

plxv2.008.t:0 "Question of Leadership"
plxv2.008.d:0 "Up to this point we have been led by Jan Hempel, however many have pointed out his connections to communism, which might put us at odds with the Legionist Army. Perhaps Zakrzewski should replace him..."
plxv2.008.a:0 "Zakrzewski is more agreeable"
plxv2.008.b:0 "We won't betray Hempel's devotion!"

plxv2.009.t:0 "Question of Presidency"
plxv2.009.d:0 "In the face of recent developments and reunification of the Polish Socialist Movement, a compromise arose. It has been decided that Poland will become a semi-presidential republic, with the president appointed by a special comity consisting of military and civilian officials. Up to this time Walery Sławek has been holding the presidency provisionally, but with the comity's vote coming, there is a possibility of someone else becoming the president... But who will it be?"
plxv2.009.a:0 "Sławek Shall Remain"
plxv2.009.b:0 "Ignacy Mościcki"
plxv2.009.c:0 "Eugeniusz Kwiatkowski"
plxv2.009.e:0 "Józef Beck"
plxv2.009.f:0 "Karol Olbracht"
plxv2.009.g:0 "Norbert Barlicki"
plxv2.009.h:0 "Kazimierz Pużak"
plxv2.009.i:0 "Jędrzej Moraczewski"

plxv2.010.t:0 "20th Aniversary of the Proclamation of the Kingdom of Poland"
plxv2.010.d:0 "Since the November Uprising, Polish people were denied any representation. This changed however in 1916, when Austria and Germany supported creation of the new 'Kingdom of Poland'. No matter our opinion on this government, it is undeniable that it had been an important step towards independence."
plxv2.010.a:0 "Maybe we should organise something to celebrate it..."

plxv2.011.t:0 "Mieczysław Fogg Commits to Countrywide Tour"
plxv2.011.d:0 "Popular singer Mieczysław Fogg has recently announced his intent to tour the whole country, his hit songs will surely brighten the mood of our people in those hard times."
plxv2.011.a:0 "Hmhm... *To Ostatnia Niedziela*... hmhm"

plxv2.012.t:0 "Aleksander's Line"
plxv2.012.d:0 "A proposal came on our desk. Many in our government suggest building of the fortification line on the Polish-German border. The project has been dubbed as 'Linia Aleksandra', intended in an ironic way, it references Tsar Alexander's foundation of 'Congress Poland', on which borders the potentia fortification will be constructed. However, it might be costly endeavour..."
plxv2.012.a:0 "Splendid Idea"
plxv2.012.b:0 "We have other things to invest into"

plxv2.013.t:0 "Habsburg House Divided"
plxv2.013.d:0 "Recent declaration of war between Poland and Austria didn't escape our Monarchs attention. He expressed regret, but also reaffirmed his image as a symbol of nation, and not an absolute monarch."
plxv2.013.a:0 "Hopefully the war will be quickly resolved..."

plxv2.014.t:0 "National Railway Company"
plxv2.014.d:0 "An important project has come on our governments desk. Modernisation of our Railway system is an important matter, especially if we potentially want to connect regions from all partitions. 'Narodowa Spółka Kolejowa' will help us with that, not only to build the railway system, but also to modernise the trains themselves."
plxv2.014.a:0 "Its an important step towards integration of all Partitions"

plxv2.015.t:0 "Silesian Autonomy?"
plxv2.015.d:0 "Polish people of Silesia, present a unique case with its unique identity. Many Silesians are calling for the creation of special autonomous region. However the region is also crucial to industrialisation of our country and granting it autonomy might hinder the coordination between our other industrial endeavours."
plxv2.015.a:0 "We will grant it to them"
plxv2.015.b:0 "No preferential treatment!"

plxv2.016.t:0 "Harcerstwo Polskie"
plxv2.016.d:0 "Polish Scouts are an important component of our education, but also, to some degree military. Originally organised by the Legionist troops, scouts have served well in helping the youth develop their physical and mental capabilities. Now with many young people graduating from the organisation, a considerable amount of them intend to join military ranks."
plxv2.016.a:0 "We salute them!"

plxv2.017.t:0 "The Worker and the Peasant"
plxv2.017.d:0 "Position of the PPS in the countryside is rather weak, considering that our power base is urban proletariat. Meanwhile left wing of the PSL, is not so dissimilar to our position on agricultural reforms. Perhaps should approach them and seek close cooperation; however some has pointed at the PSL right wing potentially pulling our government right indeed, thus it would be wise to consider our level of commitment to cooperation."
plxv2.017.a:0 "We should maintain political coherence"
plxv2.017.b:0 "Incorporating socialy-radical members of PSL is a good idea"
plxv2.017.c:0 "Let's work with all of the People's Movement"

plxv2.018.t:0 "History of the Galician Crisis"
plxv2.018.d:0 "In 1922, tensions in Galicia-Lodomeria culminated in clashes between the Poles, Ukrainians, and Austrian authorities. As a result, the Polish military disregarded the calls of the Royal Council and entered the territory of the Austrian Partition. The Ukrainian military soon followed. \nGermany demanded that the Legionists cease their advances. The Legionists initially rejected these demands but ultimately agreed to enter negotiations. In the end, it was decided that Galicia would receive greater autonomy within the Austrian Imperial Possessions. However, the agreement was never implemented. \nOnce the situation seemingly calmed down, the Polish Legions never left the territory of Galicia-Lodomeria. Germany, still burdened by the consequences of the Great War, chose to ignore the issue, and Austria, afraid of further ethnic turmoil within its lands, was powerless - for the time being. \nThus, a peculiar system of governance was put in place, whereby the Polish military administered Galicia (under nominal Austrian sovereignty) independently of the Polish state apparatus. \nPerhaps, one day, we may hope for the official annexation of Galicia."
plxv2.018.a:0 "And perhaps one day all Poles will be reunited..."

plxv2.019.t:0 "Question of the PSL platform"
plxv2.019.d:0 "Our party were peoples party from the beginning, focusing on rural population we were able to create strong power base, however the times are changing, and village becomes less and less important, perhaps it is time to somewhat rebrand ourselves?"
plxv2.019.a:0 "No, we are agrarians now and forever!"
plxv2.019.b:0 "We will lean onto Christian Socialism!"
plxv2.019.c:0 "Radical Progressivism is our future!"
plxv2.019.e:0 "Progressive Democracy is the direction we will take!"

plxv2.020.t:0 "Byzantine Inspirations"
plxv2.020.d:0 "It isn't a secret that our leader - Zakrzewski - have great interest in Byzantine history, and has been trying to push us towards sponsoring his research and even include some byzantine ideas into our political stance; according to him we could greatly benefit from studying Byzantine administration, and synthesising it with Syndicalist thought."
plxv2.020.a:0 "That's just not very reasonable..."
plxv2.020.b:0 "Whatever you say my 'Basileus'!"

plxv2.021.t:0 "Hempelian Syndicalists Organise Themselves"
plxv2.021.d:0 "The General Strike, has emboldened the syndicalist movement. 'Federation of Polish Syndicalists' has begin organising into a party, to become a potential contestant in the future elections. Despite going to great lengths to convince everyone that they actually are 'not a party', their structures... well... strongly resemble a party. \nThe leadership of the Syndicalists consist of Jan Hempel, representing the more idealist wing, and Bolesław Bierut, supporter of more pragmatic approach. Will their hopes of ruling the country materialise? Who knows."
plxv2.021.a:0 "Royal Council certainly won't endorse such anti-establishmentarians..."

plxv2.022.t:0 "The Royal Council"
plxv2.022.d:0 "Although originally, the first government of the Kingdom of Poland, created by Germany and Austria, included almost all forces in the political spectrum, it was eventually replaced by the Royal Council, partially due to instability of the new Polish state, and partially due to Germany steping back on their promises, seeing no longer need in wining Poles support. \nThe Royal Council consists mainly of the influential members of former Nobility, and of Clergy, although there is an advisory body consisting of some christian-democrats."
plxv2.022.a:0 "Their role isn't graceful, but perhaps necessary..."

plxv2.023.t:0 "The King and the Parliament"
plxv2.023.d:0 "The important matter of the early days of the new Polish Kingdom, was the question of Monarchy. Both Germany and Austria demanded Poland to be a monarchy, they weren't however united on the question of who the monarch should be. Ultimately however it was settled that 'Karol I' of the house of Habsburg, will assume such role. \nMonarch's position in the Polish Kingdom is rather strong one, he possesses a right of veto, and can ratify a new constitution, that is if 80 percent of parliament first votes in its favour... in practice however, such prerogatives were never used, due to Royal Council's efforts to circumvent legislature at every step. \nThe current monarch 'Karol II Olbracht' is widely popular (or at least as much as a puppet monarch can be) in no small part thanks to his commitment to the Polish identity."
plxv2.023.a:0 "If a Monarch is needed..."

plxv2.024.t:0 "'Chadecja'"
plxv2.024.d:0 "'Chadecja' (or short for the 'Christian-Democracy') has shaped to be perhaps the most important party in the political landscape of the last twenty years, and for those last twenty years hold the parliamentary majority, mainly due to other parties either being banned of boycotting elections, being the most accommodating of all political parties also has been in their favour; and the Royal Council returned the favour with gerrymandering, and such... \nChristian-Democratic program isn't a uniform one, some factions of the party draw closer to the National-Democracy, other are less socially conservative, and more progressive in their economic policies. \nNo matter what however, none in the party is content with their inability to fulfil their programme."
plxv2.024.a:0 "Some might call them 'traitors' but the country must be governed..."

plxv2.025.t:0 "The PPS"
plxv2.025.d:0 "PPS (or Polish Socialist Party) is perhaps not the most popular of all parties, but its influence greatly outweighs its size. It was the party of Piłsudski, and despite being either socialist or social-democrat (depending on interpretation), they are also commited to the national cause. Peculiarly despite their worker-oriented programme, it is also a party of intelligentsia, with many artists haveing socialist sympathies. \nDuring the formation of the Polish kingdom the Socialist Party was at the forefront of the first government, so their outrage came at no surprise when Germany begun to carve out any elements of already questionable independence. \nThe current situation of the PPS is rather peculiar, with neither being fully banned nor allowed to partake in the parliament, some members however are able to circumvent this by starting from the PSL lists, during the elections."
plxv2.025.a:0 "Will they one day return to power?"

plxv2.026.t:0 "The People's Movement"
plxv2.026.d:0 "PSL (or Polish Peoples Party) has came through many incarnations, but eventually settled on being one big-tent party. Being the second biggest political force in the parliament, PSL mainly represent interests of the village, the peasants; however it has also been a platform for otherwise disfranchised progressives. \nPSL's power base is rather strong, with Poland still being largely agrarian country, but it may not last for long, because throughout the last twenty years we have seen massive industrialisation effort. Perhaps it is time for the party to modernise..."
plxv2.026.a:0 "Will they be able to prevail in the political landscape?"

plxv2.027.t:0 "'Endecja'"
plxv2.027.d:0 "Endecja (or short for National-Democracy), is practically one of the most important movements in our country, even if they have boycotted essentially every elections, largely due to their staunchly-anti German position. \nWhile being highly xenophobic, it also mainly represents the Polish capital, conservative middle class and partially the large landowners. \nThe movement is divided into two factions, the 'Young' and the 'Old' one; the latter is committed to the earlier mentioned programme, while the former draws more towards corporatist tendencies, and is somewhat more working-class-oriented."
plxv2.027.a:0 "Will 'Endecja' see the end of German domination?"

plxv2.028.t:0 "The Legionist Camp"
plxv2.028.d:0 "Having its roots in the Socialist movement, 'Legionists' were born from the initiative of Józef Piłsudski; during the war he approached the Austrian command, with the goal of setting fundaments for the creation of Polish armed forces, and so, so-called 'Legiony' were born. \nPiłsudki's loyalty however didn't came from the purity of the heart, but rather from political necessity, and at the first occasion he made a gamble to take over fragmented government. Unfortunately such gamble didn't pay off, the coup was stopped, and Piłsudski put under house arrest. Perhaps, to his horror the situation backfired spectacularly, with Germany forcing Poland to adapt new constitution, essentially transferring all power to the Royal Council."
plxv2.028.a:0 "All major factions has been presented to us, but who will achieve their goals?"

plxv2.029.t:0 "King Seeks Cooperation with the Socialist Movement"
plxv2.029.d:0 "It comes at no surprise that the radical wing of PPS doesn't hold much love for the institution of Monarchy; however the King recently addressed the issue by vowing to relinquish his powers and seek cooperation. Although it may leave the bitter taste in the most radical of radicals, trying to overthrow the king at this point could prove disastrous, thus it has been decided to work somewhat within the current political system, not forgetting about passing necessary reforms, of course!"
plxv2.029.a:0 "Monarcho-Socialism?!"

plxv2.030.t:0 "Karol 'II' Olbracht, and his candidacy"
plxv2.030.d:0 "At the last moment a new opportunity presented itself! Karol Olbracht (now without the royal numeral) has been proposed as a presidential candidate. His appointment would significantly strengthen our legitimacy, although it would somewhat undermine our political base."
plxv2.030.a:0 "His Presidency would undermine our rhetoric..."
plxv2.030.b:0 "Long time no see Your Hi- *er*... Mr. President!"

plxv2.031.t:0 "Rise of the 'National-Revolutionary Movement'"
plxv2.031.d:0 "With the uncertain situation Poland has been plunged into, it was only natural that sooner or later extremely radical movements would gain traction. The strongest of those movements being 'National Revolutionary' one. Inspired by the radical current of National-Democracy, Bolshevik revolutionary thought, and adapting some ideological elements from Sorelians and Maximists; 'National-Revolutionaries' has been able to grow tremendously from only a few thousands supporters, mainly due to their broad appeal to the workers, and xenophobic fear-mongering. \nYoung Bolesław Piasecki has been a leader of National-Revolutionaries, or Red National-Radicals (as the name has been used interchangeably), since its inception. Initially joining National-Democratic movement, on the wave of anti-german sentiments, he and his followers quickly became disillusioned with 'Endecja' seeing them as 'servants of the rotten elites and capital instead of the Nation', announcing them as 'crypto German supporters', due to involvement with Polish industrialists, that in turn had to work with the German capital. \nThis brought Piasecki's circle into contact with western Sorelians, sharing common enemy, that being Germany. The shaping of National-Revolutionary ideology didn't stop at that however, not satisfied by Sorelians' too lenient stance on bourgeoisie, Piasecki and his supporters started studying 'War Communism' employed by the Bolsheviks during the Russian Civil War; even though Bolsheviks became largely disgraced in Russia itself, or perhaps precisely because of the mythos of brutality that was built around them. \nThus the new movement was born, syncretising western Totalism, and Bolshevism, with Polish Nationalism and Catholicism (although more ideological Catholicism than institutional one, due to the dismissing attitude from the actual Church). \n\nNational-Revolutionaries aim at creation of totalitarian state, that will 'purify' Poland from 'Non-Polish' elements, 'smash the decadent elite', and 'give purpose in the National Collective'. Those claims might sound outlandish, but not regarding reality, this is how desperation manifests itself..."
plxv2.031.a:0 "Bad times breed radicalism..."

plxv2.032.t:0 "Murder of Walery Sławek"
plxv2.032.d:0 "Walery Sławe has been 'blown-away' by the recent events, quite literally... He was killed in an explosion while travelling by car. The perpetrator is unknown, some accuse remnants of communist cells, some National-Revolutionaries, but NRs themselves have been throwing xenophobic accusations, capitalising on this tragedy. Now even the Military is in disarray not really knowing who is in command now. No matter what however, this event may had plunged Poland into a final spiral of doom..."
plxv2.032.a:0 "In Chaos They thrive..."

plxv2.033.t:0 "Chaos in the streets"
plxv2.033.d:0 "With death of Sławek, Army in crisis, and socialists being disgraced by the recent failure to form coalition, National Revolutionaries started organising paramilitary groups to take control over the capital. Bolesław Piasecki, leader of the revolutionaries, has stated that he is the only one able to resolve the situation, and called the army to surrender all power to him. The Officers are not very pleased with his course of action, however younger regular soldiers has already started deserting on the Radicals side."
plxv2.033.a:0 "Will this ever end?"

plxv2.034.t:0 "Army Surrenders Power to Piasecki"
plxv2.034.d:0 "Not seeing any option left, Army has decided to surrender power to Piasecki. He swiftly began his rule by delivering the speech, where he vowed to 'purge foreign elements', 'eliminate degenerate elite', and 'restore Poland to its rightful place'. This opens a new chapter in Polish history, being set on its way towards totalitarianism."
plxv2.034.a:0 "It can't be that grim... right??"

plxv2.035.t:0 "Question of Chieftainship"
plxv2.035.d:0 "Up until now 'Wodzostwo' has been at the hands of Bolesław Piasecki, however some called for separation of the posts of the General Secretary of State, and that of 'Wódz' (Chief). Piasecki would of course remain as the general secretary effectively running the country apparatus, but with someone else at the forefront. There are three clear candidates - Jan Dobraczyński, a more left-oriented and devoutly Catholic National-Revolutionary, Ryszard Borowy - a supporter of National-Syndicalism, or more moderate Helena Jamontt. Of course many in such 'hyper-masculine' movement dismiss the notion of female leadership, however as the most prominent moderate candidate, Jamontt could still gather sizeable support."
plxv2.035.a:0 "Piasecki will Remain"
plxv2.035.b:0 "Jan Dobraczyński will lead us"
plxv2.035.c:0 "Helena Jamontt will bring harmony to the movement"
plxv2.035.e:0 "Ryszard Borowy will guide us"
plxv2.035.f:0 "But there might be a wild card..."

plxv2.036.t:0 "Implementing Autarky"
plxv2.036.d:0 "With our economic reforms in full motion it is time to bring forward a plan the will guarantee self-sufficiency of our Nation. Trade will be limited, agricultural efforts intensified and resources nationalised as well. We are surrounded by enemies from all sides, so there is no real choice."
plxv2.036.a:0 "Indeed there is none..."

plxv2.037.t:0 "Militarisation of Education"
plxv2.037.d:0 "It is important to raise our children to serve Fatherland, for the betterment of whole nation, and there is no better way to do that than to implement military elements into curriculum. Young Poles will undergo mandatory military training; it will surely strengthen their 'Character'!"
plxv2.037.a:0 "Their youthful energy will be utilised for 'greater good'!"

plxv2.038.t:0 "Jan Dobraczyński speaks against Anti-Semitism"
plxv2.038.d:0 "It is no secret that the National-Revolutionary movement relies heavily on xenophobia, especially on anti-semitism. However Jan Dobraczyński's views has been evolving over time, eventually leading denouncement of his hatred towards Jews. Now he wants to shape the whole National-Revolutionary movement to shift its aim towards enemies abroad, especially Germans, and instead promote assimilation of Jewish people into Greater Polish nation. Such fundamental change, of course, might harm our political capital, and won't convince everyone among the Red Radicals; but Dobraczyński insists on setting our course away from hatred, if only a little bit."
plxv2.038.a:0 "No, People need their 'bogeyman'!"
plxv2.038.b:0 "They've been living here for centuries, and now they are indeed ready to become Polish!"

plxv2.039.t:0 "An End of Democracy"
plxv2.039.d:0 "National-Radicals' movement never hid their disdain for democracy, and this sentiment carried towards National-Revolutionaries. Even if democracy was only nominal through the last twenty years, now Bolesław Piasecki has announced its definitive end. The state will be organized in line with the National-Revolutionary party, forming a new elite, under the guidance of 'Chieftain', as Piasecki started styling himself. \nOne could expect for such move to be extremely unpopular, but the Polish people has become numb to it through the constant pain of crisis and unfulfilled promises..."
plxv2.039.a:0 "So this is how democracy dies, with thunderous applause..."

plxv2.040.t:0 "'Drugi Chrzest Polski'"
plxv2.040.d:0 "Just as the first 'Baptism of Poland' has been a fresh start for what would become Polish Nation, the 'Second Baptism' declared by the National-Revolutionary leadership will provide the Nation with moral renewal. What it means in reality, is beginning of persecution of the clergy not supporting the regime. Red Radicals aim at creation of new 'Polish National-People's Church' subservient to the state."
plxv2.040.a:0 "The things divine touch reality..."

plxv2.041.t:0 "National Arment and Development Programme"
plxv2.041.d:0 "Although we've dealt with the initial wave of economic crisis, there still is much work to be done to get us on the right track. Further more we are surrounded by not-so-friendly neighbours and our arms production have to be increased. That's why we have to develop appropriate programme to further our economic and military goals."
plxv2.041.a:0 "And perhaps, a bit, to extort our claims..."

plxv2.042.t:0 "A New Flag for New Poland"
plxv2.042.d:0 "Up until now our state has been interchangeably using traditional Polish white and red flag, and flag of the Party itself; some has advocated however to fully switch the official flag to the proper Party Flag. While traditional flag of Poland will still be in use, the official primary one will be that of the National-Revolutionary Party."
plxv2.042.a:0 "Let's not be too hast, Polish flag carries too much meaning to our Nation"
plxv2.042.b:0 "The Party IS Poland, thus the flag should reflect that."

plxv2.043.t:0 "King-Makers"
plxv2.043.d:0 "When Karol II Olbracht has turned his back on the Royal Council in the times of need, many started seeing him as a threat to the stability of our country. The King insists that his actions were dictated by his commitment to maintaining peace. It doesn't change the fact that many in the Council remain dissatisfied and demand appointment of a new King."
plxv2.043.a:0 "Karol II Olbracht will remain on the Throne"
plxv2.043.b:0 "Fryderyk II Krystian of Saxony will become our King"
plxv2.043.c:0 "Augustyn I Czartoryski will be a truly Polish King!"
plxv2.043.e:0 "Louis Leopold Stanisław August Maria André Poniatowski will reign under the regnal name of Stanisław III"
plxv2.043.f:0 "Prince Vsevolod Ivanovich of Russia, as Aleksander V"
plxv2.043.g:0 "Sergei Evgenievich Trubetskoi, descendant of Gediminids, as Zygmunt IV"
plxv2.043.h:0 "Alfonso, Prince of Asturias - an heir to Stanisław Leszczyński - as Ludwik I"

plxv2.044.t:0 "Home on the Other Side of the Front"
plxv2.044.d:0 "With the war between Poland and Germany, the family of our 'Saxon' King happened to be in indirectly hostile relation, Kingdom of Saxony being a federal part of the German Empire. This rises the question of our response to this fact, some have called for our King to lay claim to his home Saxony binding it with Poland in the future, others simply vow to break with the German heritage in similar manner British Royalty renamed its house to 'Windsor', pointing to Wawel Castle as potential inspiration for the name of the new dynasty."
plxv2.044.a:0 "Saxony and Poland will be bound forever!"
plxv2.044.b:0 "House Wawel shall arise!"

plxv2.045.t:0 "Direction of Our 'Democracy'"
plxv2.045.d:0 "Declaration of limited democratisation has opened an opportunity for monarchist movements not associated with the old landowning class or the church, to gain traction. We could encourage young and more unorthodox to take place at the table, or we could opt for more moderate political circles."
plxv2.045.a:0 "Guided Christian-Democracy is sufficient"
plxv2.045.b:0 "Invite the Young Monarchists!"

plxv2.046.t:0 "Royal Council, a Divine Council"
plxv2.046.d:0 "With Royal Council Cementing its power an old question has to finally be answered, the level of involvement of the Church in the temporal matters. The Church has for long time been supportive of the Council, so now many would naturally for it to have the leading role in the government. Archbishop Kakowski, and now his successor Nowowiejski, want, Strong, Catholic and Traditional Poland, one could say reactionary even, but in opposition to them stands Janusz Radziwił, and his circle."
plxv2.046.a:0 "Church's influence has to carved up"
plxv2.046.b:0 "Catholic Church for the Catholic Poland!"

plxv2.047.t:0 "Aristocracy at the Helm"
plxv2.047.d:0 "Now that aristocratic domination over the political life has been affirmed, many in our government support focus on agrarian policies, some however propose drawing inspirations from the Action Francaise to create more codified modus operandi of our government."
plxv2.047.a:0 "Simple agrarian policies will suffice"
plxv2.047.b:0 "'Maurrassism' suits our needs"

plxv2.048.t:0 "Royal Splendour"
plxv2.048.d:0 "Never in history of Poland had Monarch been as powerful as now. Golden Liberty is dead, and We killed it. Now the King will assume his duties and dictate the shape of government, without any scheming aristocrats, or vile socialists."
plxv2.048.a:0 "May God Bless the King!"

plxv2.049.t:0 "New Form of the Old"
plxv2.049.d:0 "Ever since we decided to cede power to younger monarchist movements their new ideas has been gaining traction, and with our economic focus shifting away from free-market economy. It is only natural that the new forms of organisation of society have to be implemented and encouraged. Some entertain the idea of right syndicalism, others go step further and advocate for technocracy, all under the Monarch's guidenca, of course..."
plxv2.049.a:0 "Our course stays the same"
plxv2.049.b:0 "Ideas of Right Syndicalism will keep business in line"
plxv2.049.c:0 "Technocracy under the King, will bring order and prosperity"

plxv2.051.t:0 "Centralised Monarchy"
plxv2.051.d:0 "With centralisation of our economy, there comes a necessity of affirming our political stance, many have been proposing taking inspiration from France and Charles de Gaulle, who proposed to reconcile economic planning and ideals of monarchy."
plxv2.051.a:0 "We need not to alter our policies"
plxv2.051.b:0 "De Gaulle's ideas are stellar, and we will implement them"

plxv2.052.t:0 "Divisions Within the Left Wing of PPS"
plxv2.052.d:0 "With the ascension of the Radical wing of PPS, the cracks within the movement begun to show themselves. The movement remains divided between more moderate Barlicki, and radical Gomułka, with Dubois standing in the middle; and so the question stands, who will come on top?"
plxv2.052.a:0 "Leftist in-fighting? Again!?"

plxv2.053.t:0 "Gomułka Assumes Control over the Party"
plxv2.053.d:0 "Our recent policies reaffirmed Gomułkas camp, leading ultimately to the radical wing of the PPS forcing Barlicki to cede his power. Now our new party leader is more than eager to putting his ideas of 'semi-soviet' system into work."
plxv2.053.a:0 "Soviet yet Polish..."

plxv2.054.t:0 "PPS Splinters"
plxv2.054.d:0 "With Gomułka's ascent to power, it become clear that the right wing of PPS, can not reconcile their positions with current PPS leadership, thus they have decided to splinter into 'PPSD' and advocate for more moderate policies..."
plxv2.054.a:0 "Let them leave! They don't get our vision!"

plxv2.055.t:0 "Drafting New Constitution"
plxv2.055.d:0 "Constitution in the current form is unacceptable, and so it has to be entirely redrawn. There are many questions within our government, within our party, what shape should the new state take; some, like Gomułka advocate for introducing soviet elements, others want more centralised state with trade unions competencies of varying degree; for now the elections will become suspended until the constitution achieves its final form."
plxv2.055.a:0 "Those are quite the questions"

plxv2.056.t:0 "Commitment to Liberal-Democratic Process"
plxv2.056.d:0 "Despite some in our part desiring to limit the democratic process in our country only to Socialist parties, the more 'moderate' wing of the 'radicals' has swayed the weights, marking our redrawing of the constitution with restoration of fully democratic elections."
plxv2.056.a:0 "It might be a flawed system, but also the best we can get..."

plxv2.057.t:0 "Barlicki Holds On"
plxv2.057.d:0 "The struggle within the PPS seems to be calming down, and Barlicki position remains unchallenged. 'Moderate-Radical' Socialism, will now firmly be our guiding principle."
plxv2.057.a:0 "United Forever After!"

plxv2.058.t:0 "Codify the 'Socialist Action'"
plxv2.058.d:0 "'Akcja Socjalistyczna' has been a paramilitary arm of the Polish Socialist party, consisting mainly of younger, more radical members. Now an opportunity arises to codify their structures, for both better control, and to utilise them in our newly built socialist state."
plxv2.058.a:0 "Together in Economic, Patriotic and Political Struggle"

plxv2.059.t:0 "A Large - Socialist - Family"
plxv2.059.d:0 "With Recent Socialist ascension to power and its more radical wing at the helm, the PPS has begun process of pardoning former members removed for 'radicalism', aiming at creation of the United Front to withstand the whirlwinds of reaction. \nAt the moment the nominal leadership of the party is at the hands of Norbert Barlicki, a respected and renowned Socialist, although some younger members would prefer his younger colleague - Stanisław Dubois - in the position of prime-minister; another potential candidate is recently admitted member, Julian Tuwim - a famous poet, other than him there is also Zygmunt Żuławski closer in age to Barlicki, and although marginally more 'moderate' than him, his conciliatory still positions him as a great candidate. \nThere is however a potential wild card - Władysław Gomułka, returning pardoned to the party, presents much more radical position, so choosing him would signal our good intentions in creating a united front for years to come. But the candidates remains to be chosen..."
plxv2.059.a:0 "Dubois for Party Unity!"
plxv2.059.b:0 "Tuwim ascends to power - a truly poetic outcome!"
plxv2.059.c:0 "Żuławski will lead the PPS!"
plxv2.059.e:0 "Gomułka will bring us real change!"
plxv2.059.f:0 "Barlicki's experience remains invaluable!"

plxv2.060.t:0 "Divide in the Legionist Movement"
plxv2.060.d:0 "Up unitl this point, Legionists of Piłsudski has remained united in their struggle, however when finally in full control it is time to decide the shape of our movement. Not every decision we take will be ultimately necessarily fullfilled, but it will indicate which faction will come on top."
plxv2.060.a:0 "May the strife not bling us"

plxv2.061.t:0 "On Trade Unions"
plxv2.061.d:0 "Trade Unions has proven to be a great asset in our coming to power; it is thanks to them and railway workers that our troops had been transported to Warsaw on time. And so some are advocating aligning with them closer, creating a central trade union to manage to be the bridge between us, and the workers. The more right wing of our camp however is against it, seeing it as an obstacle towards militarisation of our country."
plxv2.061.a:0 "Trade Unions will be our allies!"
plxv2.061.b:0 "We shouldn't work with them more than necessary"

plxv2.062.t:0 "Fate of the Old Elites"
plxv2.062.d:0 "The old elites cooperated with Germany, that is without the doubt, despite that it isn't unfair to say that they did not not have much choice, and so the right wing of our movement advocates cooperation with them; the left wing however, has radicaly different idea, seeing them as nothing more than parasites praying on majority of Polish Nation. So the question stands, will we ally them, or introduce new elites centered around the veterans of Piłsudski's Legions?"
plxv2.062.a:0 "We will establish new elites, loyal to our country!"
plxv2.062.b:0 "We have to cooperate with old elites for better future"

plxv2.063.t:0 "Autocracy and the Voice of The Young"
plxv2.063.d:0 "While Legions now hold the ultimate power over our country, our camp is far from united. There are many angles at which the discord within the movement can be characterised, 'The Center', 'The Left', 'The Right' - the most important now however is 'The Old', and 'The Young'; the closest associates of Piłsudski had been the most influential, but times are changing and the younger officers want to have their role in the government too, and so a decision needs to be made, will we commit to the Autocracy inherited from Piłsudski, or will such 'exceptionalism' end with his death."
plxv2.063.a:0 "The vision of Piłsudski will be carried on by his closest circle!"
plxv2.063.b:0 "All the soldiers are Piłsudski's children, and they deserve voice!"

plxv2.064.t:0 "Direction of Economy"
plxv2.064.d:0 "The most hotly contended matter of the II Republic of Poland has been its economic model. Eugeniusz Kwiatkowski has put forward a proposal of introducing wide elements of economic planning into our economy, others however would prefer organising our economy along the lines of econmic associations, the left wing pointing at syndicates, and the right wing at organisations of both workers and capitalists."
plxv2.064.a:0 "We should consider implementation of central planning..."
plxv2.064.b:0 "Central planning would be too difficult to enact..."

plxv2.065.t:0 "Membership on State Council"
plxv2.065.d:0 "Our leadership has put forward a proposal - creation the State Council. 'Rada Stanu' that will take role of day-to-day governing of our country; the problem is the lack of agreement among the Legionists on its shape. Some argue the state council should be limited to military personnel, others (including Eugeniusz Kwiatkowski) argue that it would be unwise, and it is necessary to employ various specialists of wide variety, bringing technocratic principles into our state."
plxv2.065.a:0 "Introducing civilian specialists seems reasonable"
plxv2.065.b:0 "Military should retain its guiding role"

plxv2.066.t:0 "Piłsudski the Socialist"
plxv2.066.d:0 "Piłsudski certainly was a devote Socialist, for only socialism may guarantee prosperity for nation as a whole; without the parasitical owning class that makes minority yet drains blood of majority. Or at least that is the stance of the left wing of Legionist movement. The power struggle seems to be over, and so the Legionists, outside of the Piłsudski's closest circle have come on top. Some may say that the 'old' Legionists were closer to Piłsudski's vision, however they clearly became bitter, and devoid of the youthful vigour of the original Legions! \nMichał Żymierski will assume leadership of the Legionist Movement, and guide us towards just society for all Polish People."
plxv2.066.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.067.t:0 "Piłsudski the Socialist"
plxv2.067.d:0 "Piłsudski certainly was a devote Socialist, for only socialism may guarantee prosperity for nation as a whole; without the parasitical owning class that makes minority yet drains blood of majority. Or at least that is the stance of the left wing of Legionist movement. The power struggle seems to be over, and so the Legionists committed to socialist cause have come on top. \nNow Eugniusz Kwiatkowski will assume leadership of our movement, his technocratic ideas will bring us closer to just and prosperous future, with the means of production at the hands of the whole nation, under the trust of certified experts, of course."
plxv2.067.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.068.t:0 "Piłsudski the Patriot"
plxv2.068.d:0 "Piłsudski certainly was a devote patriot. Only Walery Sławek and the Center can fully grasp his vision, mixing reasonable amount of socialism and patriotic struggle we will achieve greater hights and liberation of all Polish People."
plxv2.068.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.069.t:0 "Piłsudski the Patriot"
plxv2.069.d:0 "Piłsudski certainly was a devote patriot. And in tandem, Zagórska and Sławek are the only ones that can fully grasp his vision, mixing socialism and patriotism to achieve greater heights and liberation of all Polish People. Although Walery Sławek largely retained his position, he still had to make some concessions towards the left wing of the movement. The biggest 'winner' of this situation has been the Female Legion, with Aleksandra Zagórska as their leader, serving as bridge between the left and center."
plxv2.069.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.070.t:0 "Piłsudski the Statesman"
plxv2.070.d:0 "Piłsudski was a great statesman, he came from socialist movement, but were not blinded by it, he seek cooperation with all members of Polish Nation, regardless their standing. The 'right wing' is in the right here!"
plxv2.070.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.071.t:0 "Piłsudski the Statesman"
plxv2.071.d:0 "Piłsudski was a great statesman, he came from socialist movement, but were not blinded by it, he seek cooperation with all members of Polish Nation, regardless their standing. And Rydz-Śmigły is the only one that fully understands this!"
plxv2.071.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.072.t:0 "Voluntary Legion of Women"
plxv2.072.d:0 "'Ochotniczy Legion Kobiet', the female section of the Legionist camp, has been growing in numbers in recent months. The Organisation is led by Aleksandra Zagórska, who served in the Legions since their conception during the Great War. Although more to the left, the Female Legion is associated with the Legionist Center and Walery Sławek. Thanks to their efforts, we can gather support from our female citizens, who up to this point have been neglected by our predominantly male leadership. Perhaps such support might materialise in even greater support for Zagórska..."
plxv2.072.a:0 "No matter the gender, we salute everyone in their patriotic struggle!"

plxv2.073.t:0 "To the Barricades!"
plxv2.073.d:0 "With the war of Independence in full swing, our citizens began to organise into defence units on local level, fortifying and preparing for defence from the German invader. Many among them has been doing so with the 'Rota' (essentially an anti-German anthem) on their lips. Thanks to the effort of countless volunteers we will win this war!"
plxv2.073.a:0 "To victory!"

plxv2.074.t:0 "Abolition of Constitution"
plxv2.074.d:0 "Victory of Syndicalists came as a surprise to many, especially considering that creation of their party came out of necessity, and not conviction. Now they made steps towards realising the alternative form of societal organisation, standing in opposition towards most widely recognized ideas of separation of powers, and achievements of enlightenment. \nAccording to them, the traditional constitution is an unnecessary institution, only repressing the will of the people, instead the relations on the macro-scale are supposed to be regulated by free form organisation - communes, cooperatives and syndicates - culminating in sophisticated system, with its own natural 'checks and balances'. \nOf course such course of action have not gone without the outrage from across the political spectrum, nevertheless syndicalists believe it is the right thing to do."
plxv2.074.a:0 "For Free and Just Society"

plxv2.075.t:0 "Consequences of Idealism"
plxv2.075.d:0 "Our actions have caused great commotion among the Legionists. Marian Januszajtis-Żegota has decided to take action, and once again conduct a coup d'etat; many simple soldiers however, refused to take action, seeing no other reason for the revolt than political greed of their superiors, also taking into consideration that younger Hempel had enlisted as part of the Legions himself, during the Great War. Januszajtis-Żegota has been comprehended by soldiers sympathetic to the government and executed by them, putting the rest of the officer corps in line."
plxv2.075.a:0 "Officers shall fear the common soldier's might"

plxv2.076.t:0 "Abolition of the Party System"
plxv2.076.d:0 "Continuing its reform of society, Syndicalist government has declared disbandment of all political parties, including their own organisation, that operated as a party out of necessity. Liberal-Democratic Parties are unnecessary tools through which bourgeois elite enforces their power, and vanguard parties draw their leadership away from workers; only through free forms of participation may the people attain liberation!"
plxv2.076.a:0 "United forever in Freedom and Labour!"

plxv2.077.t:0 "Question of Leadership"
plxv2.077.d:0 "Despite Jan Hempel being undoubtedly father of our movement, it is still a fact that he is more of a theorist than anything. That is why many have started proposing for him to take a back seat, and for more pragmatic Bolesław Bierut to take charge. While still adhering to the general ideals of Hempel, Bierut somewhat combines them with national-syndicalist and communist influences, seeking society not ready for whole transition towards the utopian society, and still needing a guiding hand..."
plxv2.077.a:0 "Hempel's idealism shall live!"
plxv2.077.b:0 "Bierut will guide our movement!"

plxv2.078.t:0 "Rise of Esoteric Clubs"
plxv2.078.d:0 "Promotion of Hempelian Thought among our citizens has proven to be quite fruitful and lead to rise of various esoteric societies attempting to revive what they believe to be the original beliefs of our ancestors, often mixing them with other forms of spirituality, especially the eastern ones. Although it would be too arrogant to say that Hempel has lead to such revival single-handedly, since many such societies had existed for quite some time. \nIt doesn't change the fact that we welcome those efforts, bringing us, and others a step closer to connecting with our ancestors, and attaining 'Nirvana'."
plxv2.078.a:0 "Praise the Sun!"

plxv2.079.t:0 "Legionist Matters"
plxv2.079.d:0 "Another Legionist coup is behind us, however this doesn't change the fact that there certainly still are hostile elements within the military. Thankfully the common soldiers proved to be on our side, opening one way to deal with the problem; perhaps we should conduct a military reform bringing democracy to our army. If officer's position will depand on soldiers' vote, this will keep them in line. \nAnother option is to simply remove the most 'disagreeable' of the officers, keeping the military under the government's control."
plxv2.079.a:0 "We will democratise the Military!"
plxv2.079.b:0 "We will purge some officers and keep the army under tight control"

plxv2.080.t:0 "Birth of the Slavic Federation"
plxv2.080.d:0 "We and Our Slavic Brothers have come through many trials, but today is the day to celebrate, for we are united and free!"
plxv2.080.a:0 "And may this freedom be brought to all Nations of Earth!"

plxv2.081.t:0 "Communist Party of Poland"
plxv2.081.d:0 "Polish Communist Party has been heavily suppressed by the government of Royal Council, however with the recent turmoil in our country their ranks have started to swell. \nThe party is divided into the domestic and international section, both of which are commited to the socialist revolution, advocating for radical economic and social change. \nTheir chances at achieving any substantial political gains are very low, but who knows what future might bring..."
plxv2.081.a:0 "'Red Menace' never sleeps..."

plxv2.082.t:0 "Question of Radical Parties"
plxv2.082.d:0 "Syndicalists and Communist have been very much brought into the shadows by the Royal Council, but now some are proposing to lift the ban and allow participating them in the elections. Of course Walery Sławek and Legionist camp in general, has no warm feelings towards those movements, but many of them see here a political opportunity to capitalise on lifting their ban, while their chances of any political prominence are minimal."
plxv2.082.a:0 "Let's not take a gamble here"
plxv2.082.b:0 "Allow them to run, they have no chance of winning anyway!"

plxv2.083.t:0 "Question of Royal Prerogatives"
plxv2.083.d:0 "Recent events has proven that Royal Councils standing is not so firm as its supporters wanted to believe, now many are proposing for the council to approve transferring of more powers to the monarch, certainly a more venerable institution than the Council, which many consider to be 'a bunch of backstabbing grey eminences'. However such transfer of powers would mean that the beneficiaries of the system - mainly the aristocracy - would need to surrender some of their privileges; but perhaps this is a worthy sacrifice, since even in case of the Royal Council holding on, certain reforms might be necessary..."
plxv2.083.a:0 "We will strengthen the Monarch's powers"
plxv2.083.b:0 "The Royal Council the real government!"

plxv2.084.t:0 "The Synarchy"
plxv2.084.d:0 "With newly found powers, our Monarch has decided to turn towards the Synarchist movement, in order to provide ideological basis for his government. There still are some questions about the shape of government needing to be answered, but despite their defeat many opponents of the Royal Council, are looking with hope at the new government."
plxv2.084.a:0 "May all of us work in unison"

plxv2.085.t:0 "State of Aristocrats and Industrialists"
plxv2.085.d:0 "Cooperation of the upper classes is the only reasonable solution to the instability of our country, lower classes simply are not qualified enough. Now the aristocrats and industrialists will guide our nation to prosperity."
plxv2.085.a:0 "And of course protect their privileges..."

plxv2.086.t:0 "Under Divine Guidance"
plxv2.086.d:0 "The Church has been able to exert its influence on the Royal Council, now the state will be guided in accordance with the doctrines of Catholic church. Of course aristocracy and other among the upper classes will remain in the government, however the Church will retain its primacy."
plxv2.086.a:0 "May the God protect it's Shepards from corruption..."

plxv2.087.t:0 "A Harmonious Movement"
plxv2.087.d:0 "So called 'Synarchists' - deriving its name from the antithesis of 'anarchy' - have been gaining traction in recent months. Their staunch support for Monarchy and mix of progressive and technocratic policies, has garnered them popularity both among the upper and lower classes. \nSynarchists aim at creating a new kind of system, where the 'Synarch', in person of the Monarch, exerts autocratic powers, sharing them with appointed 'Synarchist Council', and Senate, as well as the 'Sejm', lower chamber of the parliament elected by the people. Despite this authoritarian at first glance views, Synarchists support quite socially paternal policies, including progressive taxation, and workers protection. Perhaps if the Royal Council prevails, it could take some inspirations from this movement..."
plxv2.087.a:0 "Those ideas are certainly... interesting..."

plxv2.088.t:0 "A Synarch for Life"
plxv2.088.d:0 "The most important question to be answered by the Synarchists is the nature of Synarch. The movement remains divided, the original idea created at the beginning of Synarchism were that the Synarch would be chosen by the 'National Assembly' consisting of the joint chambers of Parliament; however with Synarchists gravitating more and more towards the Monarchy it has became not so clear whether the position of Synarch should fall into the King's hands. For there still remains the position of prime minister, answering only to the monarch, technically not ruling but being the one to whom various governmental tasks will be delegated. Perhaps we could somewhat divide the prerogatives between the Monarch and the Prime Minister. The latter would gain executive power and (as mentioned before) be elected by the National Assembly, while the former would retain powers to appoint members of the Senate, and the Royal Council. \nThe Choice remains..."
plxv2.088.a:0 "Strong Monarch will Guarantee stability"
plxv2.088.b:0 "Executive Powers will be transferred to the Prime Minister"
#plxv2.088.b:0 "Elective Monarchy has precedence in our history, and we will support it"

plxv2.089.t:0 "Polish-Russian Commonwealth?"
plxv2.089.d:0 "It came to our attention that both Poland and Us - Russia, share the same Monarch, and so the Polish side has decided to put up a proposal to unite our countries."
plxv2.089.a:0 "Splendid Idea!"
plxv2.089.b:0 "Splendid Idea!"
plxv2.089.c:0 "No, Russia won't share its powers with Polish people!"

plxv2.090.t:0 "Russia Agrees!"
plxv2.090.d:0 "Russia has agreed to unify Our countries, a new era of Polish-Russian unity is upon us!"
plxv2.090.a:0 "We are Slavic brothers after all!"

plxv2.091.t:0 "Russia Refuses..."
plxv2.091.d:0 "Russia has decided to ignore Polish pleads for unification. Since our Monarch prefers to reside in Russia, for now his duties will be transferred to a Regent in person of Prime Minister."
plxv2.091.a:0 "Well, there are other... forceful measures..."

plxv2.092.t:0 "Unification of Eastern Europe"
plxv2.092.d:0 "Polish King once resided in Moscow, now the history repeats itself, Poland and Russia will be united in real union under one Monarch!"
plxv2.092.a:0 "Just like Zygmunt III Waza!"

plxv2.093.t:0 "Legacy of the Commonwealth"
plxv2.093.d:0 "Many have proposed for our new country to remain more inclusive, adopting the name 'Intermarium', however there are some wanting to allude to the legacy of the First Commonwealth, aiming to either name our new federation a 'Polish-Lithuanian Commonwealth' or even 'Polish-Lithuanian-Ruthenian! We can opt for them, but it might prove not to be so popular..."
plxv2.093.a:0 "Let's just retain 'Intermarium' as the name"
plxv2.093.b:0 "Poland-Lithuania it is!"
plxv2.093.c:0 "'Commonwealth of the Three Nations' that is a perfect name!"
plxv2.093.e:0 "Intermarium is a great name, but we should make it a formal Imperial title!"
plxv2.093.f:0 "Instead title of 'Najjaśniejsza Rzeczpospolita' will honour the names of 1st Commonwealths Reformers!"

plxv2.094.t:0 "The Patriot"
plxv2.094.d:0 "To reject the king at this point is an invitation to radicalism and destabilization. Besides, who could be a better king than a Polish Habsburg? Much can be said about Karol II, a patriotic soldier who spoke Polish and genuinely loved Poland. Under his rule, one thing is certain: the country's interests will be paramount in the king's heart, despite his affiliation with the great House of Habsburg. The rule of the Habsburgs, unacceptable many years ago, will now once again become the second Polish golden age."
plxv2.094.a:0 "Habsburg by birth, Pole by choice"

plxv2.095.t:0 "The German"
plxv2.095.d:0 "The Royal Council once again elected a king, and to no surprise, Fryderyk II Krystian, heir to the Wettin dynasty and king of Saxony, was elected. As the successor to the legacy of two monarchs of the Polish-Lithuanian Commonwealth and the Duchy of Warsaw. He became the person with the greatest claim to the Polish throne of all the candidates. However, under pressure from Emperor Wilhelm II, he was forced to relinquish the Saxon throne to his brother Ernest before accepting the offer of the Polish crown. A descendant of Augustus III the Strong faces the extremely difficult challenge of assuring his subjects that he looks after their interests and is not merely the Kaiser's governor. He lacks the patriotism of Karoll II, but time will tell if the worries of his subjects were exaggerated."
plxv2.095.a:0 "Second Saxon period is about to begin!"

plxv2.096.t:0 "The Jagiellonian"
plxv2.096.d:0 "The Royal Council once again elected a king. The winning candidate was non other Augustyn Józef Czartoryski, whose family is descended from Gediminids, though not a descendant of any historical Polish monarch, gives hope to the Polish populace that maybe the “great old days” can be returned and a new age of glory and stability will occur. Only time will tell whether the Jagiellonian candidate will bring about the golden age of Sigismund or the defeat of John Albert..."
plxv2.096.a:0 "Does the Jagiellonian legacy have a chance of returning?"

plxv2.097.t:0 "The Poniatowski"
plxv2.097.d:0 "The Royal Council once again elected a king. Shockingly, the choice fell on Prince Louis Léopold Charles Marie André Poniatowski, last descendant of the Poniatowski family; although descended from the brother of the last king of Poland, Stanisław August, he was not connected to Poland in any way. However, his interesting life and the experience he gained by investing in America and establishing the Standard Electric Company with his brother-in-law in 1897 convinced the council to accept his candidacy. One thing is certain: the rule of Stanisław III, by his upbringing in France and service in the French army, brings Polish and French relations closer together again."
plxv2.097.a:0 "From industrialist to king in just a few years!"

plxv2.098.t:0 "The Romanov"
plxv2.098.d:0 "The Royal Council once again elected a king. The choice, however, shocked all observers and journalists who initially considered it a grim joke. However, the information turned out to be true, and the prince of the imperial blood, Vsevolod Ivanovich Romanov became king, choosing the royal name Alexander V. Born in 1914, the young prince has no memory of the tsarist despotism of his ancestors, but many fear that the Romanov blood in his veins will take over, and Poland will once again face russian-style autocracy. These fears are fuelled by the pro-German opposition, but the fate of his reign rests on the decisions of the council and the young prince. Will he become the creator of the Polish Romanovs, as Karl Stefan Habsburg did with the Habsburgs, or will Russia once again assume the lead in the relationship, as the legacy of Tsarist Autocracy might suggest? \nNo matter however, this choice will certainly impact Polish-Russian relations, as the Royal Council most likely intended..."
plxv2.098.a:0 "God save the King..."

plxv2.099.t:0 "The Russian"
plxv2.099.d:0 "The Royal Council once again elected a king, however, the choice was one that no one observing the events expected, even in their wildest dreams. The lesser-known Prince Sergei Evgenyevich Trubetskoy was elected king. His ties to Poland are bizarre to say the least; he worked in Poland during the tsarist era as an official of the Liquidation Commission for the Kingdom of Poland, but his position was too low to be remembered in the former Congress Poland. He was later associated with ROVS and Russian conservative circles among the military. His main source of legitimacy as a candidate was his extraordinary ancestry, being a scion of both the House of Gediminas and Rurikid dynasty. A new king with a chosen regal name, Zygmunt IV, will be a staunch ally of Poland in the Russian sphere of influence, but only time, will tell whether he will be there as an equal or a servant of the bear."
plxv2.099.a:0 "Once again, a Russian sits on the Polish throne..."

plxv2.100.t:0 "Imperial Ambitions"
plxv2.100.d:0 "A rather cosmetic, at first glance, issue has arrived on our table. There has been a vocal minority proposing adoption of a proper Imperial Title for our Monarch, while advocating for the potential Emperor to retain his regnal number, retroactively applying the title to former Polish Kings. However this idea has not come without its share of opponents, pointing out the - quite literally - 'imperial tendencies', adoption of such title would entail, preferring for the Intermarium to remain a Commonwealth, a federation of nations with our Monarch owning the collective title of King, of all the lands of the Commonwealth. This squabble might seem ridiculous but it indeed carries a very symbolic message..."
plxv2.100.a:0 "The title of Commonwealth will highlight our benevolence"
plxv2.100.b:0 "A great state demands equally great title! 'Empire' it is!"

plxv2.101.t:0 "Piłsudski the Socialist"
plxv2.101.d:0 "Piłsudski certainly was a devote Socialist, for only socialism may guarantee prosperity for nation as a whole; without the parasitical owning class that makes minority yet drains blood of majority. Or at least that is the stance of the left wing of Legionist movement. The power struggle seems to be over, and so the Legionists committed to socialist cause have come on top. \nNow Kazimierz Zakrzewski will assume leadership of our movement, and his vision of syndicalist state will bring us forward!"
plxv2.101.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.102.t:0 "Economic Plans in Motion"
plxv2.102.d:0 "With our economic plan fully in motion, its economic overseer - Michał Kalecki - has garnered quite a bit of influence. Called by many 'Socialist Keynes' (although his economic theories actually predate Keynes), Kalecki is a renowned economist, so perhaps transferring to him more powers would beneficial to the wellbeing of our country country."
plxv2.102.a:0 "His role as an economic advisor is sufficient"
plxv2.102.b:0 "His deeper insight will be invaluable"

plxv2.103.t:0 "Economic Plans in Motion"
plxv2.103.d:0 "With our economic plan fully in motion, its economic overseer - Oskar Lange - has garnered quite a bit of influence. While in rivalry with Mises, Lange has been proving that planned economic model involving pricing mechanisms can trump capitalism, and so considering his high renown we could perhaps consider transferring him more powers."
plxv2.103.a:0 "His role as an economic advisor is sufficient"
plxv2.103.b:0 "His deeper insight will be invaluable"

plxv2.104.t:0 "Legionist Discontent"
plxv2.104.d:0 "What some could consider 'undemocratic' actions of our government and on top of that (perhaps more importantly...) our ideological compatibility with Walery Sławek and his Legionists, the cooperation had proven to be rather difficult, so difficult in fact, that it was discovered Sławek had been planning yet another coup, this time targeted at us. With this revelation he will be put on trial to keep rest of the military in line."
plxv2.104.a:0 "Another day, another coup attempt..."

plxv2.105.t:0 "Shift in the Party"
plxv2.105.d:0 "Our policies are starting to position us more and more on the left end of political spectrum. While still remaining committed to the ideals of Christian-Democracy, many had started referring to our faction within the part and our policies as 'Conservative Socialism', and perhaps they are right in us representing the form of non-marxist socialism. No matter the labels however, the change is very real and strengthening of our camp may lead to far reaching consequences..."
plxv2.105.a:0 "If Bismarck was 'State Socialist' than definitely we are even more!"

plxv2.106.t:0 "Not-So-Christian-Democracy"
plxv2.106.d:0 "With the party shifting more and more to the left, Antoni Ciszak has assumed control over the government. \nCiszak has been a peculiar political figure, coming from Greater Poland, being a former member of German Social-Democratic Party, he nevertheless aligned himself with Christian-Democrats after migrating to newly formed Polish State; and stated peculiarity starts while examining his views, his anti-clericalism in particular, which put him at odds with the very fundamentals of Christian-Democratic movement. Despite that his form of Non-Marxist socialism found its niche in the party, serving as a bridge between other movements, a very useful asset. And now with him fully in power, one might expect him to implement more socially radical policies, foreshadowing the formation of National Labour Movement. But time will tell..."
plxv2.106.a:0 "Christian Morality is not necessarily at odds with anti-clericalism..."

plxv2.107.t:0 "Formation of the 'PZPR'"
plxv2.107.d:0 "Our Party's broad appeal led to this moment of victory and unity. The coalition forces of NPP, PPS, and other minor allied parties, had decided to form a united party 'PZPR' that is 'Polska Zjednoczona Partia Robotnicza', or 'Polish United Workers' Party'. Such united Labour movement will guarantee stability and prosperity for the working class of Poland!"
plxv2.107.a:0 "Such interesting name..."

plxv2.108.t:0 "Face of the Party"
plxv2.108.d:0 "Recently Our Coalition has passed a new constitution, according to which Poland is a parliamentary republic with the Premier serving as the head of the government, and President also chosen by the Parliament, performing largely representative role being bound to become the image of the party itself. The question however remains of who would serve this role the best... it is also important to remember that nothing in the constitution prevents President and Premier from being one and the same in case the Parliament wishes so..."
plxv2.108.a:0 "Antoni Ciszak leads us well, he can hold both posts..."
plxv2.108.b:0 "Jan Brzechwa, a poet, is both competent and popular!"
plxv2.108.c:0 "Mieczysław Fogg, a famous singer, will handle 'spectators' well!"

plxv2.109.t:0 "Socialist Allies?"
plxv2.109.d:0 "While of course positioned more to the left, especially socially, PPS is still a potential ally in the parliament, to counter the influence of National-Democracy, their views being Labour oriented as well. Perhaps we should consider entering into an official partnership, forming 'Red-Blue' coalition."
plxv2.109.a:0 "Alliance with PPS is a great idea"
plxv2.109.b:0 "We will manage on our own..."

plxv2.110.t:0 "A Moderate Aristocrat"
plxv2.110.d:0 "Janusz Franciszek Radziwiłł had been an influential political figure throughout the last twenty years; while being an aristocrat and supporter of monarchy, he stood in the opposition of the Royal Council, criticising its authoritarianism, and advocating for more progressive form of conservatism. Now many had been proposing for him to join the Christian-Democratic movement as its leader, so that he could realise his vision of orderly and fair society."
plxv2.110.a:0 "We won't replace the current leadership"
plxv2.110.b:0 "Radziwiłł's guidance will be invaluable"

plxv2.111.t:0 "PSL Radicals Approach PZPR"
plxv2.111.d:0 "Disillusioned with their party's too 'lenient' policies, radical faction within the PSL had decided to break off and proposed joining our party. While it will undeniably strengthen us, governing such broad coalition will put a bit of a strain on our political capital, nevertheless it is still a proposal worth considering."
plxv2.111.a:0 "Let them join, together we are stronger!"
plxv2.111.b:0 "It isn't politically necessary at the moment"

plxv2.112.t:0 "Formalising the Coalition"
plxv2.112.d:0 "We have formed a broad coalition of Social-Patriotic Forces, and now many have been proposing formation of the unified party. There are some voices against it, stating that such party would be 'unwieldy', but should we listen to them?"
plxv2.112.a:0 "The Coalition in its current form is sufficient"
plxv2.112.b:0 "We will form one Party to bind them all!"

plxv2.113.t:0 "The Heir of Leszczyński"
plxv2.113.d:0 "The Regency Council once again elected a king, and the candidate chosen was Alfonso - Prince of Asturias, first son of the King of Spain and Legitimist pretendent to the French Throne, but most importantly relative of King Stanisław Leszczyński, through his daughter and her marriage with Louis Ferdinand of France; and even though their line went extinct, the legitimists remain Leszczyński's legal heirs. \nDespite Alfonso - or 'Ludwik I', as he has been styled - being disinherited due to his marriage with Cuban 'commoner', no laws preventing that exist in Poland, and had never existed, not excluding him from the 'election'. \nThe choice might seem strange at first, however France, and by extension Bourbons, had always been supportive of Poland, and even putting that aside such 'disconnected' candidate might actually be a perfect solution, allowing us to distance ourselves from all the political squabbles of neighbouring dynasties, and bring a breath of fresh air."
plxv2.113.a:0 "May his reign be bright as the Sun"

plxv2.114.t:0 "United Front Against the Crypto-Reactionary Menace"
plxv2.114.d:0 "With situation in our country deteriorating more and more, and moderate socialists losing their grip, communists and syndicalists had started to emerge, putting a proposal of a united front against the National-Radical 'crypto reactionaries'. This might be the last chance to save the country from the 'National Revolution'..."
plxv2.114.a:0 "But the left struggles to make an agreement"
plxv2.114.b:0 "A united front forms"

plxv2.115.t:0 "Victory of the United Front"
plxv2.115.d:0 "After all the clashes, all the strife, the streets remain silent now, workers' militia has defeated the National-Radical paramilitaries, and the capital is under the control of the Socialist United Front. Army being discredited by its inaction can do nothing but accept this reality, at least for now. \nAfter such victory however the question of leadership remains. The PPS had lost some of its credibility but they still remain an important part of the united front, wanting to restore democracy after a few years of transitionary period; communists however gained great traction during all the 'commotion' giving them a chance among radicalised workers; there also still remain Syndicalists under Hempel, having great sway over the trade unions. \nSo, who will it be?"
plxv2.115.a:0 "Communists will bring the true revolution"
plxv2.115.b:0 "Syndicalists will liberate the nation"
plxv2.115.c:0 "PPS will restore the democratic process"

plxv2.116.t:0 "'ZPCh' Merges with 'KPP'"
plxv2.116.d:0 "'Zjednoczona Partia Chłopska' ('United Peasant Party') has decided to seek closer cooperation with the Communist movement. \nGrowing out of the Peasant organisations in Lublin area of former Congress Poland, United Peasant Party had represented the most radical incarnation of the People's movement. Marginalised politically by the PSL and the Royal Council (while having sizeable number of members), they had finally been pushed at the hands of the Communists, hoping to serve as a rural section of the Party once the inevitable revolution comes..."
plxv2.116.a:0 "It might not be inevitable, rather preventable!"

plxv2.117.t:0 "Attacks on Clergy"
plxv2.117.d:0 "The Revolutionary action is not confined only to attacking Bourgeoisie as a class, but also attacking the bourgeois order and morality. In recent days Communist sympathisers had begin a series of attacks directed against the clergy, vowing to eradicate this 'stronghold of reaction', our government largely agrees with the sentiment, however maybe the excessive violence should be toned down."
plxv2.117.a:0 "Reaction deserves nothing but disdain"
plxv2.117.b:0 "We must tread carefully as to not destabilise our country"

plxv2.118.t:0 "State Forests and Nature Reserves"
plxv2.118.d:0 "A new law had been put in place, nationalising all the forests in the country, and putting special protection on certain regions like Białowieża Forest. This will both provide us with sustainable supply of wood, and promote environmental policies, furthermore giving freedom of movement for our people, and right to recreation there, improving our public image in the process."
plxv2.118.a:0 "'Szła Dzieweczka do Laseczka'..."

plxv2.119.t:0 "Expansion of the Public Healthcare System"
plxv2.119.d:0 "Although on paper public healthcare had been enacted by the Royal Council under the pressure of labour movements, it remained an insufficient system of private clinics' subsidies, driving the costs up and not providing them to those in need. We will fix those wrongs by expanding the state owned hospitals and clinics. Although it will be hard to reach everyone in the rural areas, we can at least start with the cities, where the village residents are supposed to migrate anyway."
plxv2.119.a:0 "A fundamental need of society will finally be fulfilled"

plxv2.120.t:0 "Free Secondary Education"
plxv2.120.d:0 "While free primary education had been implemented for quite some time now, and great leaps had been achieved when it comes to eradicating illiteracy, the secondary education had been reserved for middle and upper classes; no more! Now everyone will have access to it providing greater social mobility."
plxv2.120.a:0 "Ah High School life..."

plxv2.121.t:0 "Housing Issues"
plxv2.121.d:0 "Continuos industrialisation is starting the be a problem, making cities overcrowded, with makeshift constructions being built on the outskirts of the cities. Perhaps we should commit to expanding state investment in the housing."
plxv2.121.a:0 "We have more important investments at the moment..."
plxv2.121.b:0 "State intervention is necessary"

plxv2.122.t:0 "Celibate Bill"
plxv2.122.d:0 "Local parliament of the Silesian Autonomy had put forward a... peculiar law. They intend to prevent married women from teaching in schools, supposedly to protect 'traditional family values', and 'prevent demoralisation of the youth'. Those ideas had been widely criticised as simply ridiculous, both by the left wing - pointing out its oppressive nature, as well as by the right wing - seeing it as potentially having the opposite effect, incentivising female teachers to never formally enter legal marriage. Unsurprisingly the government has been strongly pressured to prevent such law from passing."
plxv2.122.a:0 "VETO"
plxv2.122.b:0 "I suppose we shouldn't infringe on their autonomy..."

plxv2.123.t:0 "Tightening the Coalition"
plxv2.123.d:0 "Our coalition with more moderate wing of 'Endecja' has proven to be quite fruitful, now many proposing creation of a unified party. This move will of course be unpopular with the left wing of Christian-Democracy, however they have already been largely marginalised, opening us road for strengthening our ties with National-Democracy indeed."
plxv2.123.a:0 "Coalition of separate Parties has proven sufficient enough"
plxv2.123.b:0 "United right-wing Party will give us edge during elections!"

plxv2.124.t:0 "Legion Młodych"
plxv2.124.d:0 "'Legion of the Young', is the Youth Section of the Union of Polish Legionists. Despite the name large number of its members is over thirty years old at this point, many hoping for positions of power; nevertheless their efforts had helped us in achieving our goal of 'nation-healing', and we can hope for further support in years to come."
plxv2.124.a:0 "We can count on the support of youth!"

plxv2.125.t:0 "The Youthful Vigour"
plxv2.125.d:0 "With the Legion of the Young being put in the forefront of the Legionist Movement the question of Leadership needs to be made clear. There are two Candidates Zbigniew Zapasiewicz - being the current main leader, or Witold Dynowski - serving as guardian for the youngest section of the Legion. No matter the choice 'Legion Młodych' will surely bring a breath of fresh air to our country!"
plxv2.125.a:0 "Commendant Zbigniew Zapasiewicz will serve us well!"
plxv2.125.b:0 "Witold Dynowski and his education will be invaluable!"

plxv2.126.t:0 "Echoes from China"
plxv2.126.d:0 "Our current Commandant - Dynowski - was born in China, as a son of a vice-mayor of Harbin, overseeing the construction of East Chinese Railway. During his upbringing in China Dynowski came naturally came into contact with Sun Yat-sen thought, and 'Tridemism'; now in Poland it wouldn't be far fetched to notice some similarities between Tridemism and 'Piłsudskism'. Perhaps we should lean into experiences of our Commandant and take inspiration from our Chinese brethren?"
plxv2.126.a:0 "China is so far away, we can't just transplant their ideologies here..."
plxv2.126.b:0 "Dynowski's observations are right and we can learn from one another!"

plxv2.127.t:0 "Death of Antoni Ciszak"
plxv2.127.d:0 "Poor health of Antoni Ciszak had been widely known, especially his cardiac issues. Thus perhaps it should come at no surprise that the cause of his death was heart failure. \nThis issue of course shook the ruling coalition, not the the core though, for the political system don't rest on the shoulders of one man. Feliks Widy, the prodigy of Ciszak will take the reigns from here and continue the course set by his predecessor."
plxv2.127.a:0 "His 'rule' might have been short, but the impact of it will be lasting"

plxv2.128.t:0 "Priests Patriots"
plxv2.128.d:0 "Important component of our government are so-called 'Księżą-Patrioci', members of clergy supportive of our government, largely coming from among the military chaplains. The most prominent among them, Wacław Pyszkowski could serve as a great person to rally support from among Polish people, many still deeply Catholic. And so our leadership has been contemplating separation of the posts of 'Wódz' ('Chief') and State Secretary. \nWhile Mieczysław Moczar would remain the Secretary, Pyszkowski could serve as the symbol of our rule..."
plxv2.128.a:0 "The Head of Our State is one and indivisible!"
plxv2.128.b:0 "Moczar and Pyszkowski will work in tandem!"

plxv2.129.t:0 "The Visionaries of Economics"
plxv2.129.d:0 "Economic theory has been a divisive topic throughout its history, ranging from Marxists to proponents of free market like Mises. And so it has been divisive in Poland creating a backbone of discord between different political camps. \nWe of course are Socialists and so are two renowned theorists of Polish economic school - first there is Oskar Lange, a proponent of planned economy, yet utilising dynamic pricing system to mimic this of a free market, which according to him fixes the flaws of planned economy, creating the optimal system; second but not lesser is Michał Kalecki, who had been a pioneer of Keynesian economics with Socialist angle, or rather 'Pre-Keynesian', since he was first to develop his theories. \nThose two economists are great assets for our government and their expertise in invaluable, but one needs to take primacy, so who will it be..."
plxv2.129.a:0 "Michał Kalecki is a great advisor"
plxv2.129.b:0 "Lange's plan is more visionary!"

plxv2.130.t:0 "Ledearship of the PPS"
plxv2.130.d:0 "While the moderate wing of the PPS remains more unified than the radical one, there still have been some discussions over the chief role in the government. \nAlthough it is hard to pick singular leader of the PPS up to this point, this role could be attributed to Tomasz Arciszewski a commited Democratic Socialist, however there are more candidates, among them more 'conservative' Kazimierz Pużak, and Jędrzej Moraczewski being open for wider cooperation, and thus considered somewhat more 'liberal'. \nAnd now, who will lead the PPS?"
plxv2.130.a:0 "Tomasz Arciszewski will remain"
plxv2.130.b:0 "Pużak is the best candidate"
plxv2.130.c:0 "Moraczewski will be a great head of government"

plxv2.131.t:0 "The Armoured Trolley"
plxv2.131.d:0 "One of our commanders - Stanisław Sochaczewski - has put forward a proposal for a new kind of armoured vehicle. According to him 'Armoured Trolley' would serve as a cheap assault vehicle; armoured just enough to withstand bullets, armed with machine guns at the front, with low suspension to avoid enemy fire. \nHowever many have pointed out its design flaws, impracticality (like soldiers having lay down to avoid enemy fire), and logistical infeasibility compared to tanks. Despite that, this design has unleashed our engineers' creativity in the field of armoured vehicles for transport and support of infantry, instead of utilising such machine for direct attack."
plxv2.131.a:0 "Its good to experiment, even if the experiment seemingly fails"

plxv2.132.t:0 "Shield Against the Reaction?"
plxv2.132.d:0 "Some more radical members in our party had proposed creation of 'Biuro Politycznej Weryfikacji' ('Political Verification Bureau'), tasked with (as the name may suggest) verifying whether one party might be a threat to the public; they insist that the efforts will be taken to ensure it being a legitimate process, and not something done at a whim, a mix of government appointed officials, judges, local leaders, and trade union members would all have their say in the process. However we shouldn't take this decision lightly..."
plxv2.132.a:0 "Democracy We have may be flawed, but the public deserves its free conscience!"
plxv2.132.b:0 "We need to strike the 'Dwarves of Reaction' first!"

plxv2.133.t:0 "Piłsudski the Socialist"
plxv2.133.d:0 "Piłsudski certainly was a devote Socialist, for only socialism may guarantee prosperity for nation as a whole; without the parasitical owning class that makes minority yet drains blood of majority. Or at least that is the stance of the left wing of Legionist movement. The power struggle seems to be over, and so the Legionists committed to socialist cause have come on top. \nNow Zbigniew Zapasiewicz - leader of the young section of the legionist camp - will assume leadership of our movement, his vision of syndicalist state will bring us forward!"
plxv2.133.a:0 "Piłsudski - truly the greatest of all Poles!"

plxv2.134.t:0 "Struggle Against the Church"
plxv2.134.d:0 "Being the most socially radicalised wing of the Legionist movement, Legion of the Youth does not hide its anti-clericalism; now many members have been pushing for assuming strong stance against the Catholic church, opinion about nature of such actions is varied however. The most radical members have been pushing for unconditional fight with the church, and laicisation of society, more moderate however see the problem not in the religion itself, but rather its independent role from the state, those 'moderates' would be simply content with increasing state involvement in churches inner workings. \nThe question remains open."
plxv2.134.a:0 "We will simply force the church to 'cooperate'..."
plxv2.134.b:0 "To heal the nation, we need to combat all of its poisons!"

plxv2.135.t:0 "Matter of Female Voting Rights"
plxv2.135.d:0 "Modelled on German constitution, Poland under the Royal Council did not provide voting rights to women. But recent democratisation of our Country has brought the issue on the table once again. \nIt however isn't as hotly contested as one could imagine; both the left and the moderate right support passing of the bill, the socialists seeing it as part of realising their ideals of social justice, and the Christian-Democrats taking more practical approach, considering women to be generally more conservative than men, although some proposed extension of voting rights to working women only..."
plxv2.135.a:0 "Women deserve the right to equal representation!"
plxv2.135.b:0 "We will expand the voting rights for working women"
plxv2.135.c:0 "Let's keep the question open for the future..."

plxv2.136.t:0 "Rivalry in the Syndicalist Movement"
plxv2.136.d:0 "While Hempelian Syndicalists remain more influential in radical circles, thanks to the inspirations from the western syndicalists, there is another syndicalist formation in our Country. 'Związek Syndykalistów Polskich' (Union of Polish Syndicalists), under Kazimierz Zakrzewski, represents more elitist form of syndicalism inspired by Sorelian thought. \nZSP remains loosely associated with the Legionists, competing with the PPS over influence in left-wing, yet more moderate, unions. Some point out at them being simply 'Legionist agents', but they nevertheless inspire many work associations."
plxv2.136.a:0 "Another flavour of the left..."

plxv2.137.t:0 "Our Course After the Storm"
plxv2.137.d:0 "The situation in our country is calm now... relatively speaking... and the old Council holds on for now. Despite that many in the senate has called for the Council to resign, seeing the recent crisis as a sign of the current councils members incompetency. Those more moderately oriented members of the senate has called for temporary transfer of powers to Władysław Sikorski, who took the primary role in the military after the failed coup of Walery Sławek, and the dissolution of the Legionist movement. If Sikorski is to be appointed as prime minister, he vows to conduct limited democratisation, to safeguard our country's stability and progress."
plxv2.137.a:0 "The Old Council will prevail"
plxv2.137.b:0 "The current Council will resign under the pressure"

plxv2.138.t:0 "Birth of a New Political System"
plxv2.138.d:0 "With wide inclusion of amendments to Polish Constitution, a new political system is born. \nThe Prime Minister - currently in the Person of Władysław Sikorski - will excercise power in the monarch names, while the parliament will keep legislative powers, with only some competencies being delegated to executive orders, issued by prime minister. Further more Senat will retain its powers, yet the Sejm will gain ability to bypass its veto with the vote of two thirds of the parliament. \nThe current coalition of moderate members of Chadecja and the People's movement has negotiated with Sikorski to maintain stable political system, reinforced by strong position of the Prime Minister, who maintains the office for 10 years, being forced to resign only either through the vote of 3/4 parliamentarians, or their own will. Many have criticised this 'authoritarian tendency' however Sikorski maintains that the new constitution is designed to be amended in the future, with him serving his term in transitionary period."
plxv2.138.a:0 "Hooray for Democracy! However flawed it may be"

plxv2.139.t:0 "Sikorski Approaches Sejm"
plxv2.139.d:0 "Władysław Sikorski had decided to begin talks with moderate Sejm members. The Lower Chamber of the Parliament had been temporarily closed after the recent events, however the elected members still technically remain in office. \nAnd so the prime minister declared formation of 'Związek Jedności Królestwa Polskiego', a political body aspiring to creation of a united coalition of moderate forces, guranteeing deliberate transition to democracy."
plxv2.139.a:0 "The Democracy will return... in some form at least..."

plxv2.140.t:0 "Sin of Autocracy"
plxv2.140.d:0 "With Sikorski's term as a prime minister running past its first half, there are some voices calling him to step down of his post as a sign of good will. The candidate for his replacement being Aleksy Ćwiakowski, associtated both with Monarchist, and People's movements. Of course it is Sikorski's constitutional right to continue his term, but perhaps it is good time to move one, and deliver our promise of democracy, even if the army will still guard the process."
plxv2.140.a:0 "Sikorski will continue his term"
plxv2.140.b:0 "Ćwiakowski will assume the office"

plxv2.141.t:0 "A New Term"
plxv2.141.d:0 "With ten years passing the time has come for a new prime minister, the candidates being either Sikorski - who oversaw our country's reform - or Aleksy Ćwiakowski - a PSL member turned Monarchist."
plxv2.141.a:0 "Sikorski will assume the office"
plxv2.141.b:0 "Ćwiakowski will be our prime minister"

plxv2.142.t:0 "Question of Clergy Seats"
plxv2.142.d:0 "Ever since the establishment of the Kingdom of Poland, a certain number of seats had been designated to the Church Representatives, now many - with Lubomirski as well - had been proposing to remove those seats, and instead make them electable by the land owners. However it does not fly well with the Primate of Poland - August Hlond. For this 'travesty', Hlond had called for removal of Lubomirski from the chief position in the royal council. \nRealisticaly Speaking the secular representatives have upper hand here, however perhaps it wouldn't be wise to pick a fight with the Church, and weaken the Royal Council even more, from within..."
plxv2.142.a:0 "The pernament seats will be abolished"
plxv2.142.b:0 "Let's keep the Status Quo"
plxv2.142.c:0 "Lubomirski will resign in favour of Hlond"

plxv2.143.t:0 "The Soldiers of New Age"
plxv2.143.d:0 "Our ascension to power have been largely thanks to the support of the young soldiers putting pressure on their superiors, so it would come at no surprise that they would like to have influence on the movement, and while it shouldn't be too controversial there are some among them whose allegiances are dubious. Miczesław Moczar, one of the young soldiers' leaders is among them; former member of the communist party, he nevertheless gained traction among supporters of our movement in the military. \nNow, offering him position in our government might be a good idea, but his views are more orthodoxly left-wing, and so he might pose a threat to our government..."
plxv2.143.a:0 "We will pay the Soldiers only a lip service"
plxv2.143.b:0 "We will honor their loyalty, while excluding problematic individuals..."
plxv2.143.c:0 "We will invite Moczar to Our government"

plxv2.144.t:0 "Coup After Coup"
plxv2.144.d:0 "Appointing Mieczysław Moczar as the head of state security might not have been the best of ideas. Moczar issued an order of arrest for the majority of National-Revolutionary leadership, on the grounds of their alleged contacts with foreign espionage networks. Moczar has declared that he will assume the post of the leader of the Reformed National-Revolutionary movement, vowing his dedication to the Fatherland and Communism - Communism that will transform our society to realise the highest ideals of patriotism, Justice and Prosperity for the whole Nation!"
plxv2.144.a:0 "For Nation is for the People..."

#
plxv2.145.t:0 "The Nationalists and the Revolutionaries"
plxv2.145.d:0 "While the National-Revolutionary course for our Nation is secured, there still is a great deal of uncertainty. There are various factions competing for Leadership - Mainline National Radicals of Bolesław Piasecki supported by female section lead by Helena Jamontt. \n\nMore moderate members gathered around Jan Dobraczyński focus less on xenophobic tendencies, and more on Christian values to keep our nation firm. \n\nSimilar Position is supported by Wacław Pyszkowski, member of the Catholic clergy, who however have more revolutionary outlook. \nClosely Associated with him is Mieczysław Moczar, keeping those two leaders bound together by strong adherence to communism. \n\nAnd Last but not least - Stanisław Borodzicz leads the National-Syndicalist Faction hoping to keep close ties with western Totalists. \n\nAnd now the time has come for all of them to sit at the table and draft how the National-Revolution should be carried."
plxv2.145.a:0 "No matter the differences, we are one as Poles!"

plxv2.146.t:0 "Nation and Class Struggle"
plxv2.146.d:0 "Important step in formalising the National-Revolution is deciding our attitude towards class struggle; the more left wing members of our movement adhere more towards Marxist definitions, however others point out that while important, focusing on it will detract from the National cause, and stir confusion in the working class."
plxv2.146.a:0 "Nation takes place first and foremost!"
plxv2.146.b:0 "Class Struggle, for the internationalist bourgeoisie is not the true part of Nations!"

plxv2.147.t:0 "Bound in Nation... or in Christ?"
plxv2.147.d:0 "Aspect of our National-Revolution that can not be omitted is our adherence to Christianity, even if the Catholic Church is sceptical to work with us, thus we should seriously consider the level of our commitment towards christian values, are they only instrumental in forming National Identity, or is there more to it?"
plxv2.147.a:0 "Religion is a uniting tool..."
plxv2.147.b:0 "Christian Morality is the fundament of Polish Identity!"

plxv2.148.t:0 "Revolution - Social or Conservative?"
plxv2.148.d:0 "Although our revolution will surely lead to renewal of Polish Nation, however up to this point it had not been clear what 'revolution' entails... Christianity is important Nation is important (of course), but what form does it take is in our hands, we can lean onto the past, but perhaps we should not support the petty bourgeoisie morality, which pressed the working class of our Nation?"
plxv2.148.a:0 "We need to stay close to our Traditions"
plxv2.148.b:0 "Traditions are for nothing if they don't serve anything!"

plxv2.149.t:0 "'Wódz'"
plxv2.149.d:0 "With the first batch of ideologically divisive decisions taken, the time has come for us to announce who will be our new 'Wódz' (or 'Chief'). \nWhile Bolesław Piasecki will retain the post of the State Secretary, the de facto leadership will lie in the hands of our Chief. \nBut who will it be?"
plxv2.149.a:0 "The Post of State Secretary and Wódz will be combined under Piasecki"
plxv2.149.b:0 "Jan Dobraczyński!"
plxv2.149.c:0 "Mieczysław Moczar!"
plxv2.149.e:0 "Wacław Pyszkowski!"
plxv2.149.f:0 "Stanisław Borodzicz!"
plxv2.149.g:0 "Helena Jamontt!"

plxv2.150.t:0 "Organicism and Integralism"
plxv2.150.d:0 "With our Society being shaped along the organic lines, we had been delving more and more into 'Integralism', perhaps we should embrace those leanings and distance ourselves from the orthodox National-Democracy."
plxv2.150.a:0 "We are members of Endecja First and foremost"
plxv2.150.b:0 "Integralism will better reflect our ambitions"

plxv2.151.t:0 "Ideals from Abroad"
plxv2.151.d:0 "Our Ideological leanings had been straying more and more from orthodox National-Democratic thoughts; perhaps we should look for inspirations abroad? Our leader had seen the Russian Revolution through his own eyes, and since took great admiration for Savinkov and his movement. \nHowever there is one more potential route - contrary to most of the Endecja, Antoni Szacki had been closely studying the German political scene, seeking inspiration from 'Germanic' Ultranationalist and 'racial' theories. \n\nThe question lies, should we remain true to National Radicalism, or embrace one of those seemingly foreign ideologies."
plxv2.151.a:0 "National Radicalism carried us to where we are..."
plxv2.151.b:0 "Savinkovism, and its revolutionary ideas will empower us!"
plxv2.151.c:0 "Volkism will reinvigorate our movement!"

plxv2.152.t:0 "'Enemy' Shops Under Attack"
plxv2.152.d:0 "Shops belonging to minorities - mostly Jewish one - had come under attack. \nThe perpetrators of those attacks had been inspired (or even directed) by the government to 'clean the country of economic parasites', that 'leech of Polish People', and 'serve anti-polish interests'. \n\nThose involved had been pardoned by the Courts due to 'acting in the name of greater good'."
plxv2.152.a:0 "The hate is 'purely economic'..."

plxv2.153.t:0 "To Re-Harden Our Spirit"
plxv2.153.d:0 "Dissatisfied, with Dobraczyński becoming what many in the movement describe as 'soft', it has been agreed among the leadership to remove him from position of power. \nHis place will be taken by Andrzej Świetlicki, head of the secret police, who will oversee the purge of 'corrupted elements'."
plxv2.153.a:0 "There is no place for petty compassion!"

##Foreign Events
plxf.1.t:0 "Poland Seeks Alliance"
plxf.1.d:0 "Poland has put forward an interesting offer, they are willing to ally us which would give us a valuable ally in conflict with Germany."
plxf.1.a:0 "Our alliance is set!"
plxf.1.b:0 "They would only be a hindrance with their territorial claims..."

plxf.2.t:0 "Poland Seeks Alliance"
plxf.2.d:0 "Poland has put forward an interesting offer, they are willing to ally us which would give us a valuable ally in conflict with Germany."
plxf.2.a:0 "Our alliance is set!"
plxf.2.b:0 "They are too far away to be a worthy ally..."

plxf.3.t:0 "Poland Seeks Alliance"
plxf.3.d:0 "Poland put forward an offer for the alliance, they are willing to join us if we open negotiations regarding status of Galicia. We could loose even the whole Galicia in the process, but preventing Poland from joining other alliances and thus avoiding threat in our backyard, may prove to be a good idea."
plxf.3.a:0 "They will get Galicia and the alliance is set!"
plxf.3.b:0 "We can only offer them Western Galicia"
plxf.3.c:0 "Kraków is all they can get"
plxf.3.e:0 "We won't offer them land but they are free to join us"
plxf.3.f:0 "We are not interested in allying them"

plxf.4.t:0 "Successful Negotiations"
plxf.4.d:0 "Negotiations proved to be successful. Now we can feel more secure with proper allies."
plxf.4.a:0 "Great."

plxf.5.t:0 "Austria Puts Ahead a Proposal"
plxf.5.d:0 "Austrians put ahead a proposal where Galicia would be divided between wester and eastern parts, the western one would join Poland, while the eastern Galicia would remain in union with Austria."
plxf.5.a:0 "Reasonable proposal, we've got a deal!"
plxf.5.b:0 "No, we seek to reunite all Polish Lands!"

plxf.6.t:0 "Austria Can Offer Kraków Only."
plxf.6.d:0 "The Austrian offer have been largely disappointing, in exchange for alliance they only offered us the city of Kraków and surrounding areas."
plxf.6.a:0 "We will take what we can get..."
plxf.6.b:0 "No, we seek to reunite all Polish Lands!"

plxf.7.t:0 "Austria Refuses Negotiations Over Our Territorial Claims"
plxf.7.d:0 "Austrian government made it clear that they are not interested in giving up any territory, however they still remarked that they are always open for an alliance."
plxf.7.a:0 "Disappointing but we still need an alliance"
plxf.7.b:0 "It is outragous, it is unfair, we won't take a deal like that!"

plxf.8.t:0 "Negotiations Prove Unsuccessful"
plxf.8.d:0 "Our diplomatic advances have been simply shrug off by the foreign power. We should probably seek alliances somewhere else..."
plxf.8.a:0 "They don't know what they are loosing!"

plxf.9.t:0 "Austria Approves to Alliance"
plxf.9.d:0 "Although quite surprising, Austria agreed to transfer all of their Galician territory to Poland in exchange for alliance!"
plxf.9.a:0 "This is a glorious day for Polish Diplomacy!"

plxf.10.t:0 "Poland Seeks Alliance"
plxf.10.d:0 "Despite occupying Galicia Poland has put forward an offer, they are willing to join out alliance. By accepting their request we could limit their further expansionist tendencies, which is worth considering."
plxf.10.a:0 "Let's not hold any grudges, our alliance is set!"
plxf.10.b:0 "Of course no! Such impertinence!"

plxf.11.t:0 "Military Operation Against Poland"
plxf.11.d:0 "The intervention force is ready, they will surrender in no time."
plxf.11.a:0 "Our Military is clearly superior, this will be no-problem!"

plxf.12.t:0 "Polish War of Independence"
plxf.12.d:0 "Germany has declared war on us, but it is no time to panic, it is the War of Independence! We will defend our fatherland to the last drop of blood! \nWe only have to survive until German domestic situation forces them to conceal defeat."
plxf.12.a:0 "Poland is Not Yet Lost!"

plxf.13.t:0 "Defeat in Poland"
plxf.13.d:0 "Polish army was able to hold for long enough that public opinion, and economic issues, forced us to call-off our intervention. It is a truly humiliating defeat."
plxf.13.a:0 "We'll get them next time!"

plxf.14.t:0 "Victory in the War of Polish Independence!"
plxf.14.d:0 "It is a glorious day for Poland, we were able to hold off against German behemoth and force them to recognize our independence. Another future conflict is all but imminent, but for now we've got some room to breath and prepare."
plxf.14.a:0 "For now let's celebrate!"
plxf.14.b:0 "No time for peace, let's escalate the conflict further!"

plxf.15.t:0 "Germany Intervention Averted"
plxf.15.d:0 "Thankfully despite our recent actions that hurt German Interests, they decided to not intervene, and only issued an official condemnation of our actions; so thankfully we still have some time to prepare for potential future conflict."
plxf.15.a:0 "Border remains calm, for now..."

plxf.16.t:0 "Intervening in Poland?"
plxf.16.d:0 "Poland has decided to cut-off relations with us, we should consider a punitive intervention, or otherwise we may end up with enemy in our backyard."
plxf.16.a:0 "Let's prepare for a quick military action"
plxf.16.b:0 "We aren't currently in position to intervene"

plxf.17.t:0 "Poland Refuses Peace Deal!?"
plxf.17.d:0 "Polish government refused our peace offer and expressed desire to continue their offensive!"
plxf.17.a:0 "They will regret that!"

plxf.18.t:0 "Strange Movements on Polish-German Border"
plxf.18.d:0 "Our garrison units noticed strange military movements on the border with Germany. It is almost certain that they are preparing for military action."
plxf.18.a:0 "We are ready to defend ourselves!"

plxf.23.t:0 "Poland Seeks Alliance"
plxf.23.d:0 "Poland has put forward an interesting offer, they are willing to ally us which would give us a valuable ally, but may also put us at odds with Germany..."
plxf.23.a:0 "Our alliance is set!"
plxf.23.b:0 "We don't want to antagonise Germany..."

plxf.24.t:0 "Austria Prepares for an Attack"
plxf.24.d:0 "Our intelligence services has informed us that Austria is preparing for a military operation to retake Galicia."
plxf.24.a:0 "Guard the Border!"

plxf.25.t:0 "The Galician Opportunity"
plxf.25.d:0 "With Poland ending on Germany's bad side it gives us opportunity to end the 'Galician Issue' once and for all!"
plxf.25.a:0 "Galicia will be Ours!"
plxf.25.b:0 "It isn't the right time..."

plxf.26.t:0 "Ukraine Demands Polish Galicia"
plxf.26.d:0 "If German intervention wasn't enough, now Ukraine put forward demands to Galicia..."
plxf.26.a:0 "Over Our dead Bodies!"
plxf.26.b:0 "Giving up those territories will gain us some time..."

plxf.27.t:0 "Poland Rejects our Demands"
plxf.27.d:0 "Unsurprisingly Poland rejected our demands, leaving the issue to be solved by war."
plxf.27.a:0 "And war it will be..."

plxf.28.t:0 "Poland Submits"
plxf.28.d:0 "Surprising Poland has decided to give up Galicia!"
plxf.28.a:0 "Great Development!"

plxf.29.t:0 "Germany Cancels Polish Intervention"
plxf.29.d:0 "Due to internal situation Germany has decided to end its war with Poland, leaving us alone in this conflict, perhaps we should recall our attack as well."
plxf.29.a:0 "Let's end this conflict, for now..."
plxf.29.b:0 "No, Galicia is OURS!"

plxf.30.t:0 "Ukraine Decides to continue the War"
plxf.30.d:0 "Despite German surrender Ukraine has decided to continue its aggression."
plxf.30.a:0 "We will end conflict over Galicia once and for all!"

plxf.31.t:0 "Extorting Power over Galicia"
plxf.31.d:0 "Ever Since the Galician Crisis, while nominally still under Austrian sovereignty, actual control over 'Galicia-Lodomeria' has been at the hands of Polish military. Now with Germany in turmoil, and their power over us withering away, we can assert full control and prepare Galicia for future annexation."
plxf.31.a:0 "Soon Galicia will return to her Fatherland"

plxf.32.t:0 "Poland Seizes Galicia!"
plxf.32.d:0 "Ever Since the Galician Crisis, our control over Galicia-Lodomeria has been only nominal, it doesn't however change the fact that such open renouncement of our sovereignty over this territory is outrageous. Although it might not be the best course of action, perhapse we should consider military action..."
plxf.32.a:0 "It's not worth the commotion..."
plxf.32.b:0 "We will restore order in Galicia!"

plxf.33.t:0 "Annexation of Galicia"
plxf.33.d:0 "After twenty years, it is finally time for full annexation of Galicia; we have to keep in mind however, that Austria and especially Ukraine, might be provoked by such bold actions..."
plxf.33.a:0 "Welcom back Kraków and Lwów!"

plxf.34.t:0 "Poland Annexes Galicia!"
plxf.34.d:0 "Poland went a step further and declared full annexation of Galicia. Military intervention to restore order is still on table..."
plxf.34.a:0 "We don't need this backwater!"
plxf.34.b:0 "Let's proceed with military operation"

plxf.35.t:0 "Poland Annexes Galicia!"
plxf.35.d:0 "Poland crossed all the diplomatic lines and declared full annexation of Galicia. Such actions are outrageous. We should consider military action to protect Ukrainian population of Galicia-Lodomeria."
plxf.35.a:0 "We will annex the Eastern part of Galicia"
plxf.35.b:0 "We are not ready for such conflict..."

plxf.36.t:0 "Austria intervenes in Galicia"
plxf.36.d:0 "Austria has decided to retaliate on our annexation of Galicia. We have to ready our arms!"
plxf.36.a:0 "We will defend what's ours!"

plxf.37.t:0 "Ukraine Seizes Eastern Galicia"
plxf.37.d:0 "As reaction to our annexation of Galicia, Ukraine has decided to make it's move and annex the Eastern part of it, under the pretext of protecting Ukrainian population of this region. We could escalate the conflict, but perhaps it would be wiser to let it slide, for now..."
plxf.37.a:0 "No hast decisions, we will eventually recover this territory"
plxf.37.b:0 "We have to defend our rightful land!"

plxf.38.t:0 "Bolshevik Brethren"
plxf.38.d:0 "Polish Communist movement for had for a long time strong connections to the Russian Bolsheviks, and now that we rule both our countries we can finally cooperate for better tomorrow!"
plxf.38.a:0 "We will join the Bolshevik Blossom"
plxf.38.b:0 "We should strive for more equal relationship"

plxf.39.t:0 "Polish Communists want to Unite"
plxf.39.d:0 "Polish Communists have put ahead a proposal for closer cooperation, seeing as many members of the Bolsheviks are also active in Poland, formalising such cooperation would be a no-brainer."
plxf.39.a:0 "Welcome them as our Brothers!"
plxf.39.b:0 "For now we should not get involved"

plxf.40.t:0 "Unification of the Polish-Russian Communists"
plxf.40.d:0 "Unsurprisingly the Russian Bolsheviks agreed to cooperate, now we will shall devour the capitalism, together!"
plxf.40.a:0 "Splendid!"

#Communist
plxf.19.t:0 "Birth of the Communist Internationale"
plxf.19.d:0 "It has been decided to finally break off with all revisionist elements, so we can become the champions of revolution! We will immediately cut-off our ties with the contenders for the primacy in the Socialist Movement, and seek closer integration of our junior partners."
plxf.19.a:0 "United Forever!"

plxf.20.t:0 "Federation of Councils Demands Submission"
plxf.20.d:0 "Our overlords are upon us, yet they state it is in their intent to create better world, our submission means our end, however maybe the end is a new beginning?"
plxf.20.a:0 "We will fight for Independence!"
plxf.20.b:0 "Submit We Must..."

plxf.21.t:0 "[FROM.GetName] Agrees to Unify with us"
plxf.21.d:0 "It is a wise decision..."
plxf.21.a:0 "United Forever, in Friendship and Labour!"

plxf.22.t:0 "[FROM.GetName] Rejects Integration"
plxf.22.d:0 "The leaders of [FROM.GetName] have decided to foolishly oppose us, but nothing will stand in the way of the unity of the workers of the world!"
plxf.22.a:0 "It's treason then."

