###Superstate(s) Tree
KX_PLX_NEXT_STAGE:0 "Rising of a Superstate"
KX_PLX_NEXT_STAGE_desc:0 "Our ambitions lie beyond the shackles of one nation. The world shall witness a rise of the new SUPERPOWER!!!"

KX_PLX_COMMUNIST_SUPERSTATE:0 "World Revolution is Nigh"
KX_PLX_COMMUNIST_SUPERSTATE_desc:0 "The spectre of Communism is truly looming over Europe. Now it is time for it to strike!"

KX_PLX_INTERMARIUM_SUPERSTATE:0 "Stronger Together!"
KX_PLX_INTERMARIUM_SUPERSTATE_desc:0 "Nations of Central Europe are weak together, however united they may actualy surpass all other powers of Europe... of the World!"

KX_PLX_SLAVIC_SUPERSTATE:0 "Slavism Across Eurasia"
KX_PLX_SLAVIC_SUPERSTATE_desc:0 "Slavs shall stand united, to either save the world beyond or, at least, bring prosperity home."

KX_PLX_EXPAND_THE_COMMUNES:0 "Expand the Role of Communes"
KX_PLX_EXPAND_THE_COMMUNES_desc:0 "Slavic Communes will be an important part of our state apparatus, serving as a basis for political and economic administration."

KX_PLX_CONSUMER_SYNDICATES:0 "Free Production"
KX_PLX_CONSUMER_SYNDICATES_desc:0 "With role of the communes increasing it is only natural to also increase their economic role."

KX_PLX_BROAD_PANSLAVISM:0 "Broad Panslavism"
KX_PLX_BROAD_PANSLAVISM_desc:0 "Panslavism has been a popular idea among wide range on political spectrum, although usualy associated with right, left-panslavists proved to be as fervent in their commitment, if not more! Nevertheless broadening our support base might prove beneficial, however we should consider wisely who we make friends with..."

KX_PLX_SLAVIC_VANGUARD:0 "Slavic Vanguard"
KX_PLX_SLAVIC_VANGUARD_desc:0 "The Slavic People might need unity, however they are not the end, after our own liberation, we shall liberate workers of all nationalities, across the whole world; and so in the future our children can say proudly that we were the vanguard, the vanguard of liberty, justice, and progress."

KX_PLX_FOR_SLAVS_ONLY:0 "Looking Within"
KX_PLX_FOR_SLAVS_ONLY_desc:0 "Dreams of the liberation of others might be noble, but we should primary look for ourselves at those times of turmoil."

KX_PLX_MULTINATIONAL_STATE:0 "Multinational State"
KX_PLX_MULTINATIONAL_STATE_desc:0 "With the expansion of our borders, and finally the declaration of Intermarium, now our state consists of many nationalities and ethnicities, we have to guarantee equality for them, and eventualy strive for the creation of common identity!"

KX_PLX_CURRENCY_AND_CUSTOMS:0 "Economic Integration"
KX_PLX_CURRENCY_AND_CUSTOMS_desc:0 "Currently our country is a patchwork of different measurement systems, different currency systems, railroads, administration... and so on... It can't stand like that, a united nation needs a unified governance, and we will provide that!"

KX_PLX_EXPAND_DOCKS:0 "Shipyards in Need"
KX_PLX_EXPAND_DOCKS_desc:0 "'Intermarium' means literally 'Across the Seas', despite that our navy, both military and civilian one, is unacceptably small, we should change that by sponsoring creation of new docks in strategic regions across the country."

KX_PLX_INTENSIFY_QUOTAS:0 "Intensify the Production Quotas"
KX_PLX_INTENSIFY_QUOTAS_desc:0 "Despite Polish core being reasonably developed due to our policies, we can't say the same about big share of newly acquired land; those lands need still, need cement, a lot of construction materials to build factories and homes for people flooding to the cities, thus we have to intensify the construction industry production output, at all cost!"

KX_PLX_FINANCIAL_STIMULUS:0 "Financial Stimulus"
KX_PLX_FINANCIAL_STIMULUS_desc:0 "Grand, state controlled projects are bound to some inefficiencies, instead it will be wiser to stimulate economic growth through support for private investors."

KX_PLX_WORLD_BREADBASKET:0 "Breadbasket of the World"
KX_PLX_WORLD_BREADBASKET_desc:0 "Right now we are in possession of some of the most fertile lands in the world, we have to utilise that for both domestic as well as international gains."

KX_PLX_POLISH_PRIMACY:0 "Maintain Polish Primacy"
KX_PLX_POLISH_PRIMACY_desc:0 "Our country might now be made of many nationalities, but that is precisely why Polish primacy has to be maintained, we have to guide and maintain order!"

KX_PLX_MORE_THAN_POLISH:0 "Beyond Vistula"
KX_PLX_MORE_THAN_POLISH_desc:0 "We launched our Revolution in Poland, but we are marching forward, the European proletariat shall stand united, and soon revolutionary fervour will flood the world!"

KX_PLX_FOR_EUROPEAN_LIBERATION:0 "Expanding Our Ambitions"
KX_PLX_FOR_EUROPEAN_LIBERATION_desc:0 "For now we strived to liberate only the part of Europe, but we can not stop at that, workers of the world are awaiting us!"

KX_PLX_THE_FINAL_STRUGGLE:0 "The Final Struggle"
KX_PLX_THE_FINAL_STRUGGLE_desc:0 "This will be our final struggle, not only that, the final struggle of humanity, for then the road to utopia, to communism, is straight!"

KX_PLX_CLEANSE_REACTION:0 "Sweeping the Reaction"
KX_PLX_CLEANSE_REACTION_desc:0 "We should secure the already liberated regions, seek cooperation with like-minded movements, and most importantly, destroy the enemies of the proletariat!"

KX_PLX_SOCDEM_COOPERATION:0 "Cooperate with Social Democrats"
KX_PLX_SOCDEM_COOPERATION_desc:0 "While social-democrats, are clearly revisionist, perhaps it still wouldn't hurt cooperating with them to establish ourselves in the newly liberated terriotries."

KX_PLX_FOUNDING_COMMUNISM:0 "Fight Revisionism"
KX_PLX_FOUNDING_COMMUNISM_desc:0 "We need to conduct purges to ensure our position in newly conquered territories, and safeguard the revolution!"

KX_PLX_INTEGRATE_TRADE_UNIONS:0 "Integrate the Trade Unions"
KX_PLX_INTEGRATE_TRADE_UNIONS_desc:0 "No matter what we might think about Social-Democrats, it is undeniable that trade unions are 'purer' than them, we should consider integrating them into our revolutionary machine."

KX_PLX_DEFENCE_FROM_SABOTAGE:0 "Vanguard Stays Strong"
KX_PLX_DEFENCE_FROM_SABOTAGE_desc:0 "It is not the time yet to entirely divert all powers to the workers, for those are the times of need, and the Vanguard of the proletariat has to stay strong, focused and alert!"

KX_PLX_AUFERSTANDEN_AUS_RUINEN:0 "Auferstanden Aus Ruinen"
KX_PLX_AUFERSTANDEN_AUS_RUINEN_desc:0 "Perhaps our declarations of 'the Final Struggle' has been premature, for the fight is not yet finished, and now in the times of peace we have to face the ultimate enemy - Ourselves, and our will to stay uncorrupted, not tainted, with time, with revisionism."

##v2
KX_PL_PZPR_WINS_ELECTIONS:0 "Broad Coalition of Social-Patriotic Forces"
KX_PL_PZPR_WINS_ELECTIONS_desc:0 "Despite the turmoil a new government has formed, despite its many participants being seemingly exclusionary, everyone has committed to work on fixing the problems that plague our Nation."

KX_PL_PZPR_Organize_Prefectures:0 "Dominate Self-Governance"
KX_PL_PZPR_Organize_Prefectures_desc:0 "Although we hold majority in the parliament, the local leadership is still fragmented, we will start by creating party organs which will guarantee citizens direct contact with the government through local party members, increasing their popularity, and local populace dependance on them."

KX_PL_PZPR_Hyper_Centralisation:0 "Form Dual Administration"
KX_PL_PZPR_Hyper_Centralisation_desc:0 "The administration will be organised on two levels more permanent and locally governed 'Województwa' (with their layout drafted by the act of parliament), concerned with day to day rule, and 'Prefectures' assigned by the government, which role is to carry state-wide projects."

KX_PL_PZPR_Inclusive_Nationalism:0 "Inclusive Nationalism"
KX_PL_PZPR_Inclusive_Nationalism_desc:0 "We are patriotically devoted, however love for ones nation does not have to be exclusionary, we should include as many into the definition of 'Polishness', not limiting it into rigid ethnic lines, so we all can contribute to the better Poland of tomorrow."

KX_PLX_PPS_Reunited:0 "PPS Reunited at Last"
KX_PLX_PPS_Reunited_desc:0 "The Legionist forces has decided to reunite with the PPS, with the intent of forging better Poland and maintaining its independence."

KX_PLX_PPS_Compromising_Our_Position:0 "Socialism of Compromise"
KX_PLX_PPS_Compromising_Our_Position_desc:0 "Our Socialist ideas might be grand, but it is also necessary to remain level-headed, we will cooperate with other parties, while maintaining the intent of eventual transition towards socialism."

KX_PLX_PPS_Cooperate_with_PSL:0 "Conduct Land Socialisation"
KX_PLX_PPS_Cooperate_with_PSL_desc:0 "Our government intend to implement a new land reform, to fix the wrongs of the Royal Council. Agriculture is to be 'socialised'. Large landholdings will get partially partitioned between the landless peasants, the rest will become 'common land' governed by the mix of peasant cooperatives, and locally appointed officials; furthermore the government will encourage movement to city by offering to buy the peasant land on preferential terms; bought out land will than be attached to the rural cooperatives."

KX_PLX_PPS_Seek_Minorities_Support:0 "Mutual Support Between Nationalities"
KX_PLX_PPS_Seek_Minorities_Support_desc:0 "Despite Kingdom of Poland being relatively ethnically uniform, there still are minorities within our borders; Germans, Ukrainians and Jews, despite their different ethnicities, they still are our citizens, and deserve every right to dignity."

KX_PLX_PPS_Local_Structures:0 "Consolidate Local Structures"
KX_PLX_PPS_Local_Structures_desc:0 "Despite long traditions PPS local organisations remain rather disorganised, largely due to Royal Council's meddling. We should resolve this issue and enforce appropriate discipline on the local level."

KX_PLX_PPS_Trade_Union_Favouritism:0 "Favour Socialist Trade Unions"
KX_PLX_PPS_Trade_Union_Favouritism_desc:0 " Trade Unions in Poland are largely divided between socialist and christian-democratic ones, the latter might unfortunately obstruct the activity of the former, and even cause issues for our government. We should promote socialist trade unions, to ensure better cooperation."

KX_PLX_PPS_Sponsor_Cooperatives:0 "Sponsor Cooperative Ownership"
KX_PLX_PPS_Sponsor_Cooperatives_desc:0 "While making all economy outright cooperative would be rather outlandish, it still is our end-goal. We should sponsor workers cooperatives, by providing them with tax breaks and grants, so that they may eventually overtake the whole economy."

KX_PLX_PPS_State_Wide_Bargaining:0 "State-Wide Bargaining"
KX_PLX_PPS_State_Wide_Bargaining_desc:0 "By organising the process of 'state-wide bargaining', we will ensure better pay, and more secure environment, for the workers. Every profession will conduct negotiations with the whole industry, making the whole economy easier to regulate."

KX_PLX_PPS_Maintain_Flexibility:0 "Maintain Economic Flexibility"
KX_PLX_PPS_Maintain_Flexibility_desc:0 "Trade Unions know better than the government how to manage their own workplaces. That's why we will limit the regulations on macro level, delegating this role to the trade unions, and in special cases, by either passing legislation on the case to case basis, or getting involved with the unions themselves."

KX_PLX_PPS_Key_Industries:0 "Nationalising Key Industries"
KX_PLX_PPS_Key_Industries_desc:0 "We are of the position, that private ownership is to be eventualy eliminated through the 'withering-away'. It doesn't change the fact that we have to provide welfare to our people, and good functioning for our state aparatus, thus nationalisation of key industries and services is necessary. Things like water infrastructure, military industry, and parts of heavy industry, will be put under direct governmental control."

KX_PLX_PPS_Adjust_the_Constitution:0 "Adjusting the Constitution"
KX_PLX_PPS_Adjust_the_Constitution_desc:0 "Recently Adapted Constitution, has proven to be a big step for Poland. Despite that, it still isn't perfect, 'checks and balances' are necessary, but their excess will ultimately detract from the parliament ability to express people's will. We have to appropriately adjust the constitution to mitigate that."

KX_PLX_PPS_Limit_Senats_Power:0 "Limit Senate's Competencies"
KX_PLX_PPS_Limit_Senats_Power_desc:0 "Senate has proven to be rather redundant chamber, slowing down legislative process, however we have committed to its creation and we are not going to bail out of it; instead we will readjust it's role as a chamber representing more local interests, that is with limited, one could say advisory, competencies."

KX_PLX_PPS_Enforce_Laicism:0 "Enforce Laicism"
KX_PLX_PPS_Enforce_Laicism_desc:0 "Limiting Churches privileges has been one of the most important points in the Socialist programme, we have to fulfil our promises and begin the proces of separating the state from the church, which might take some time, taking into account previous policies of the Royal Council."

KX_PLX_PPS_Guided_Democracy:0 "Guiding the Democracy"
KX_PLX_PPS_Guided_Democracy_desc:0 "Our goal is eventual transition to democracy, but first we must full-fill the goals of the Legionist movement, and socialist movmentent too, by implementing our policies without oppositions contesting them."

KX_PLX_PPS_Strengthen_Prime_Minister:0 "Strengthen Presidential Prerogatives"
KX_PLX_PPS_Strengthen_Prime_Minister_desc:0 "Presidential post will become central in implementing our reforms, by concentrating power in the President's hands, our actions will be more swift and deliberate."

KX_PLX_PPS_Expand_Social_Security:0 "Expand Social Programmes"
KX_PLX_PPS_Expand_Social_Security_desc:0 "While in the fully socialist systems, welfare would be theoretically unnecessary, it will still take some time until we achieve it, in the meantime will expand social security; pensions, healthcare and education, all those aspects will get expanded, which is not only right morally, but also necessary for the state to function efficiently, in the long run."

KX_PLX_PPS_Housing_Initiative:0 "Construction Initiative"
#KX_PLX_PPS_Housing_Initiative_desc:0 "Despite recent economic downturn, our cities has been swelling with migrating peasants, we have to provide them with housing, otherwise we will face the risk of rampant social pathologies."
KX_PLX_PPS_Housing_Initiative_desc:0 "Delegating construction of infrastructure to third parties is severely inefficient, considering the amount of building that will soon be needed. We will create the 'National Construction Company' to fulfil those needs."

KX_PL_Chadecja_Stays_Pure:0 "The Firm Center"
KX_PL_Chadecja_Stays_Pure_desc:0 "'Chadecja' will finally be able to fulfill it's programme. Remaining in the middle between the middle and upper class supported National-Democracy, and Socialist workers' movement, has guaranteed us victory, and we won't change our course."

KX_PL_Commit_to_Constitution:0 "Commit to the Constitution"
KX_PL_Commit_to_Constitution_desc:0 "We will uphold the rules of the Constitution. This will guarantee us necessary stability, in those hard time."

KX_PL_Chadecja_Cement_Middle_Class_Support:0 "Affirm Middle Class Support"
KX_PL_Chadecja_Cement_Middle_Class_Support_desc:0 "While the workers are important component of support base, more politically active middle class is also important to us. We should remind them of that, by supporting local businesses, and easing the bureaucratic strain on such entities."

KX_PL_Chadecja_Non_Marxist_Unionism:0 "Non-Marxist Unionism"
KX_PL_Chadecja_Non_Marxist_Unionism_desc:0 "The first thing that comes to mind when thinking about trade unions is perhaps 'Socialis', however it doesn't change the fact that christian trade unions also exist, and exist well in our country. We should promote them to guarantee more harmonious cooperation, than socialists would give us."

KX_PL_Chadecja_Pacify_with_Welfare:0 "Pacify with Welfare"
KX_PL_Chadecja_Pacify_with_Welfare_desc:0 "Bismarck has realised long ago that to maintain social order it is necessary to help people by providing them with appropriate welfare, other conservative movements followed this idea, and so we will."

KX_PL_Chadecja_Distance_From_Labour:0 "Distance from Labour Movement"
KX_PL_Chadecja_Distance_From_Labour_desc:0 "By basing our support on Middle and Upper class, we've come into a dilemma of what place do labour movement have in our party. We won't cut off from christian workers, but we will distance ourselves from that, as to not be mistaken for socialists..."

KX_PL_Chadecja_Work_with_Big_Business:0 "Work with Big Business"
KX_PL_Chadecja_Work_with_Big_Business_desc:0 "By ensuring cooperation with Polish capital, we'll be able to put our development and economic growth on the right track."

KX_PL_Chadecja_State_Shares:0 "Buy Key Companies Shares"
KX_PL_Chadecja_State_Shares_desc:0 "We won't commit to nationalisation, but we can buy shares in important companies, making directing their goals to align with the government policies, easier."

KX_PL_Chadecja_State_Owned_Utilities:0 "State-Owned Utilities"
KX_PL_Chadecja_State_Owned_Utilities_desc:0 "To ensure stability and welfare, public utilities need to be publicly owned."

KX_PL_Chadecja_Commit_to_Interventionism:0 "Commit to Interventionism"
KX_PL_Chadecja_Commit_to_Interventionism_desc:0 "Intervention in economy is necessary, market isn't perfect and needs to be regulated."

KX_PL_Chadecja_Land_Adjustment:0 "Adjust the Division of Land"
KX_PL_Chadecja_Land_Adjustment_desc:0 "Royal Council's policies has proven to be disastrous for small rural holdings. We will ease the peasants burden by providing them with some land, detracted from large agricultural holding."

KX_PL_Chadecja_Continue_Land_Consolidtation:0 "Continue Land Consolidation"
KX_PL_Chadecja_Continue_Land_Consolidtation_desc:0 "Land consolidation might not be pretty at first glance, but by pushing peasants to the city it will eventually result in better developed country."

KX_PL_Chadecja_Reafirm_Church_Support:0 "Strengthen Ties to the Church"
KX_PL_Chadecja_Reafirm_Church_Support_desc:0 "The Catholic Church is important institution for our nation, and we need its support in implementing policies in line with its teachings."

KX_PL_Chadecja_Acknowladge_Christianity:0 "Acknowledge Christian Roots"
KX_PL_Chadecja_Acknowladge_Christianity_desc:0 "We have to acknowledge our Christian roots, which are undeniable, despite it, it doesn't change the fact that we should distance ourselves from clerical excess."

KX_PL_Chadecja_Cooperate_with_NatDem:0 "The 'Endecja' Appeals"
KX_PL_Chadecja_Cooperate_with_NatDem_desc:0 "Our parties leadership is divided between the supporters of more conservative, and middle-class based right wing, and left-wing of Christian Labour movement, this time the right were able to affirm its control over the party, seeking to cooperate with moderate National-Democrats."

KX_PLX_PSL_Left:0 "PSL Truly for the People"
KX_PLX_PSL_Left_desc:0 "The PSL is a People's party, we will conduct the land reform, and extinguish the land-owning parasites!"

KX_PLX_PSL_Center:0 "PSL Advancing in Moderation"
KX_PLX_PSL_Center_desc:0 "PSL needs to represent the matters of the village, and work for all!"

KX_PLX_PSL_Right:0 "PSL Championing Constructive Discourse"
KX_PLX_PSL_Right_desc:0 "It would be foolish to discard the traditional land-owniing class, we all have to work together."

KX_PLX_PSL_Consult_Local_Authorities:0 "Consult Local Authorities"
KX_PLX_PSL_Consult_Local_Authorities_desc:0 "While preparing the land reform, we should consult with local authorities to ensure it's desired effects."

KX_PLX_PSL_Discourse_with_Landowners:0 "Talk with the Land Owners"
KX_PLX_PSL_Discourse_with_Landowners_desc:0 "Our goal is to represent peasant's interests, but we still need to work with the upper class to fulfil them."

KX_PLX_PSL_Populist_Rhetoric:0 "Populist Rhetoric"
KX_PLX_PSL_Populist_Rhetoric_desc:0 "For too long the Land-Owning class has opressed our people, it's time for them to pay their due!"

KX_PLX_PSL_Champion_Local_Autonomy:0 "Champion Local Autonomy"
KX_PLX_PSL_Champion_Local_Autonomy_desc:0 "Local Autonomy is one of the most important postulates of our party, we will support self-governing administrative bodies, in order to fullfill this goal."

KX_PLX_PSL_Prepare_Land_Reform:0 "Prepare Land Reform"
KX_PLX_PSL_Prepare_Land_Reform_desc:0 "Royal Council is no more, and no more are their agricultural policies; it is necessary to conduct the land reform, in order to fix their wrongs."

KX_PLX_PSL_Land_Compensation:0 "Acquisition Compensation"
KX_PLX_PSL_Land_Compensation_desc:0 "We have to compensate the Land owning class for taking their land, otherwise we would risk unrest from their side."

KX_PLX_PSL_Land_Requisition:0 "Take the Land"
KX_PLX_PSL_Land_Requisition_desc:0 "To full-fill our program we need to take the land from private hands, but no compensation will be provided, for the hands that work on the land, need to own this land!"

KX_PLX_PSL_Equipment_Sharing:0 "Shared Equipment"
KX_PLX_PSL_Equipment_Sharing_desc:0 "Modernising our agriculture might prove costly, so to alleviate those costs, we will introduce the system of shared agricultural equipment."

KX_PLX_PSL_Cooperate_with_PPS:0 "Cooperate with PPS"
KX_PLX_PSL_Cooperate_with_PPS_desc:0 "While our support base in the country side is strong, we can not say that about the cities. We will delegate this role to PPS and align with them."

KX_PLX_PSL_Cooperate_with_Chadecja:0 "Work with 'Chadecja'"
KX_PLX_PSL_Cooperate_with_Chadecja_desc:0 "Christian-Democrats are a great candidate for partners in moderate coalition. We can work with them, a lot of peasants are socially conservative afterall!"

KX_PLX_PSL_Marriage_with_Endecja:0 "Marriage with 'Endecja'"
KX_PLX_PSL_Marriage_with_Endecja_desc:0 "Even if National-Democrats may seem as a strange choice for a coalition member, their more upper-class oriented power base will help us in achieving a lasting compromise in the countryside."

KX_PLX_PSL_Municipal_Industry:0 "Industrialisation Managed Locally"
KX_PLX_PSL_Municipal_Industry_desc:0 "We will transfer more power to the municipal councils, beyond just the matters of land, but also the industry, this will help us conducting government-run industrialisation, yet decentralised and respecting local interests."

KX_PLX_PSL_Economic_Zones:0 "Designate Special Economic Zones"
KX_PLX_PSL_Economic_Zones_desc:0 "To facilitate economic growth, we will designate special economic zones for both the government and the private capital to invest in. Encouraged by special privileges such zones will help our country maintain balanced development."

KX_PLX_PSL_Rural_Development_Fund:0 "Social Development Fund"
KX_PLX_PSL_Rural_Development_Fund_desc:0 "When it comes to social services, the gap between the city and the village is still especially immense. Creation of the special government fund will help in closing this gap, so that the peasant is no worse than the urban worker!"

KX_PLX_PSL_Look_to_City:0 "Look to the City"
KX_PLX_PSL_Look_to_City_desc:0 "Agriculture is most important to our party, but the cities can not be neglected."

KX_PLX_PSL_Agri_Loans:0 "Farming Loans"
KX_PLX_PSL_Agri_Loans_desc:0 "Agriculture is a hard, unreliable business, one bad season might ruin ones life. We have to ease this problem by implementing cheap loans for farmers."

KX_PLX_PSL_Tax_Excessive_Land:0 "Tax Excessive Land"
KX_PLX_PSL_Tax_Excessive_Land_desc:0 "We will implement taxation on large agricultural holdings, which will help us found governmental expenses."

KX_PLX_PSL_Municipal_Land:0 "Municipal Land"
KX_PLX_PSL_Municipal_Land_desc:0 "A portion of recently acquired land will be given to municipal councils, to be governed locally."

KX_PLX_PSL_Modernising_Our_Party:0 "Modernising Our Party"
KX_PLX_PSL_Modernising_Our_Party_desc:0 "Our Party is countryside-based, but the times are changing and more, and more people move to the city, we will have to accommodate to that and reshape our party."

KX_PL_Army_Mutiny:0 "The Great Mutiny"
KX_PL_Army_Mutiny_desc:0 "Armed forces levels of unrest has reach critical leves. Something has to be done about it."

KX_PL_Parliament_Revolt:0 "Revolt of the Parliament"
KX_PL_Parliament_Revolt_desc:0 "Parliament Plans to Overthrow the Royal Council!"

KX_PL_General_Strike:0 "General Strike"
KX_PL_General_Strike_desc:0 "Dissatisfied workers has hit the streets. They have to be dealt with."

KX_PL_Military_Purge:0 "Purge the Military"
KX_PL_Military_Purge_desc:0 "Polish Military has been unruly for far to long, we will deal with them utilising the German troops stationed in our country"

KX_PL_PZPR_Attack_Clergy:0 "Deal with the Clergy"
KX_PL_PZPR_Attack_Clergy_desc:0 "Clergy has bean a sore in the eyes of Ciszak's camp for a long time, our coalition however, doesn't exactly agree on the issue..."

##Reworked Syndicalism
KX_PL_ZSP_DEPOLITICIZE_TRADE_UNIONS:0 "Depoliticize Trade Unions"
KX_PL_ZSP_DEPOLITICIZE_TRADE_UNIONS_desc:0 "Trade Unions need to express the voice of workers, not political parties! We will begin the process of Depoliticizing them."

KX_PL_ZSP_CREATE_CONSUMER_SYNDICATES:0 "Foundations of Consumer Syndicates"
KX_PL_ZSP_CREATE_CONSUMER_SYNDICATES_desc:0 "Consumer Syndicates will become the corner stone of our economy. Through cooperation of them and, soon to be created, production syndicates, society will move past the petty restraints of profit."

KX_PL_ZSP_ABOLISH_PRIVATE_PROPERTY:0 "Abolishing Private Property"
KX_PL_ZSP_ABOLISH_PRIVATE_PROPERTY_desc:0 "Private property, needs to be abolished; the means of production will belong to those that work using them, and it will manifest in system of syndicates and cooperatives, where working class cooperates, and which cooperate with eachother."

KX_PL_ZSP_FOUND_PRODUCTION_SYNDICATES:0 "Organise Production Syndicates"
KX_PL_ZSP_FOUND_PRODUCTION_SYNDICATES_desc:0 "Once we established Consumer Syndicates, it is finally time to establish production syndicates as well. Both in the city and in the village, syndicates will create sophisticated system of mutual relations. Urban Proletariat will organise along the lines of factories represented by trade unions, and Rural Proletariat will gain all what the large land owners had in the form of communes that will closely cooperate with Urban syndicates."

KX_PL_ZSP_AUTONOMISATION:0 "Autonomisation of Society"
KX_PL_ZSP_AUTONOMISATION_desc:0 "Everyone needs autonomy to realise themselves, and so need the governmental structure. Without constitution or rigid laws, syndicates and communes will work alongside each other, creating bounding law in a free manner, not dissimilarly how the 'Common Law' originally formed in the Anglo-Sphere, but this times with no lords, no masters!"

KX_PL_ZSP_BARGAIN_ECONOMY:0 "Economy of Consensus"
KX_PL_ZSP_BARGAIN_ECONOMY_desc:0 "Now that both Consumer and Production Syndicates has been established, our economy will proceed in a natural manner, embracing the 'Economy of Consensus'; syndicates and cooperatives, be it rural or urban, will engage in omnidircetional negotiations with each other, exchanging goods; meanwhile consumer syndicates will act as overseers, preventing accumulation of capital, and helping in setting the prices for goods sold to the workers."

KX_PL_ZSP_COOPERATIVE_BANKING:0 "Credit Unions"
KX_PL_ZSP_COOPERATIVE_BANKING_desc:0 "With capital accumulation limited, credit unions will provide special kind of funds for economic units, to be used for investments, and for consumers wanting to buy more expensive goods immediately. Such Unions will operate on very low profit margins, covering only the operational costs. 'People's bank' will be established as well, to unify the individual Credit Unions operations, and provide services on national scale."

KX_PL_ZSP_A_TRULY_FREE_SYSTEM:0 "A Truly Free System"
KX_PL_ZSP_A_TRULY_FREE_SYSTEM_desc:0 "Some may call our ancestors 'primitive', but as Marx theorised, they may prove to be great examples of Communism in work; we will bring this Communism back to our era!"

KX_PL_ZSP_HEMPELS_CENTER:0 "Old Man at the Helm"
KX_PL_ZSP_HEMPELS_CENTER_desc:0 "Jan Hempel stands at the forefront of our Movement, and will guarantee our people freedom!"

KX_PL_ZSP_GODLESS_RELIGION:0 "Godless Religion"
KX_PL_ZSP_GODLESS_RELIGION_desc:0 "Developed by Jan Hempel, concept of so called 'Godless Religion' is a revolutionary spiritual ideology that strives for the ultimate liberation of men, while staying in harmony with the universe, one's community, and finally with oneself; exemplifying the virtues of workers chivalry, honesty, and communitarian compassion."

KX_PL_ZSP_REVIVAL_OF_OUR_FOREFATHERS:0 "Revival of Our Forefathers"
KX_PL_ZSP_REVIVAL_OF_OUR_FOREFATHERS_desc:0 "There is a great deal of wisdom to be gained from studying the forms of organisation our pre-christian ancestors practised. We should seek there inspiration for more just and free future."

KX_PL_ZSP_COMBAT_CHRISTIAN_MORALITY:0 "Strike Christian Morality"
KX_PL_ZSP_COMBAT_CHRISTIAN_MORALITY_desc:0 "Christian Morality has been a poison for the Polish Nation, and Nations around the globe. It killed heroism, and selfless compassion of our Forefathers, replacing it with selfish drive for 'salvation', and justification of the systems of opression... No more! We will expose the vile church institutions for what they are!"

KX_PL_ZSP_LEFT_PANSLAVISM:0 "Left Panslavism"
KX_PL_ZSP_LEFT_PANSLAVISM_desc:0 "Humanity is bound for Brotherhood, but let's not get ahead of ourselves; first step is to reunify with those close to us, our Slavic Brothers! Perhaps we should consider forming a unified federation of Slavic People, for free and prosperous future!"

KX_PL_ZSP_GMINY_FEDERALISM:0 "Broad Federation"
KX_PL_ZSP_GMINY_FEDERALISM_desc:0 "While we have made swaths of progress, there still are some unjust state institutions in place. Our society will be organised along the lines of free associations of communes, cooperatives and syndicates."

KX_PL_ZSP_ELECTIVE_BUREAUCRACY_2:0 "Elective Bureaucracy"
KX_PL_ZSP_ELECTIVE_BUREAUCRACY_2_desc:0 "All remaining forms of bureaucracy need to be made elective, achieving the ultimate form of expression for our people!"

KX_PL_ZSP_CONGRESS_OF_SYNDICATES:0 "Associate Congress"
KX_PL_ZSP_CONGRESS_OF_SYNDICATES_desc:0 "While our idealism is a great asset, there still is mundane that needs to be addressed, and the most important decisions on the macro scale need to be conducted. It's role will be relegated to a special body somewhat mimicking the parliamentary system, but instead representing the peoples interests through collection of representatives from syndicates, cooperatives, and communes."

KX_PL_ZSP_NECESSITY_OF_GOVERNANCE:0 "Necessity of Governance"
KX_PL_ZSP_NECESSITY_OF_GOVERNANCE_desc:0 "The Congress will elect a body of special individuals tasked with supervising the most important matters of our federation, that being healthcare, education, and other socially necessary functions, as well as the matters of military. Those positions are necessary, for maintaining the equality, lack of which would inevitably endanger freedom of individual!"

KX_PL_ZSP_BIERUTS_NATIONALISM:0 "Syndicalism Under Control"
KX_PL_ZSP_BIERUTS_NATIONALISM_desc:0 "Bieruts pragmatism will provide us with smooth transition to the utopian society, step by step..."

KX_PL_ZSP_CENTRAL_SYNDICATE:0 "Central Syndicate"
KX_PL_ZSP_CENTRAL_SYNDICATE_desc:0 "While Syndicate will maintain their role, it is necessary to create central governing body to ensure their cooperation. Such body will be elected by a collection of syndicates, cooperatives, and communes representatives, bypassing any legislative bodies"

KX_PL_ZSP_INTRODUCED_PLANNING_ELEMENTS:0 "Introduce Planning Elements"
KX_PL_ZSP_INTRODUCED_PLANNING_ELEMENTS_desc:0 "We will introduce elements of planned economy into our syndicalist system. While consumer syndicates will proceed to operate independently, producers of industrial goods and construction of new factories will be coordinated by the central, taking direct action if necessary."

KX_PL_ZSP_NAIL_TO_SMALL_ENTRPRENEURSHIP:0 "Put the Nail to Small Trades"
KX_PL_ZSP_NAIL_TO_SMALL_ENTRPRENEURSHIP_desc:0 "Up to this point 'Small Traders' or petty entrepreneurs, were allowed to continue operating in our country, it is necessary to eliminate their activity, to prevent any potential beourgeoisie reaction. Their shops will have to be put under supervision of specially created trade unions, whose role will be to provide our people with small scale services, otherwise not eligible for large scale operation."

KX_PL_ZSP_SAFEGUARDING_SYNDICALIST_SYSTEM:0 "Syndicalism Safeguarded"
KX_PL_ZSP_SAFEGUARDING_SYNDICALIST_SYSTEM_desc:0 "To safeguard our Syndicalist Revolution, we need to prevent the remnants of the old system from crawling back in. We will begin by incarnating the most egregious reactionaries, and alienating the petty ones through ban on participation in the wide political system. Freedom we attained will not be taken away!"

##Expanded Kalecki'n'Lange

KX_PL_AS_NOT_SO_MARKET:0 "Not-So-Market Economy"
KX_PL_AS_NOT_SO_MARKET_desc:0 "While Lange's Economic Model has been called by many a 'market socialism', this definition is rather inaccurate, since in such model economy would still be publicly owned, while utilising pricing mechanisms for efficiency of production, and only some market forces on microeconomic level, based on the pre-conditioned calculations. No matter how we call it however, Lange's vision is about to be introduced in our country, hopefully bringing wellbeing of our people to greater heights."

KX_PL_AS_PLANNING_BUREAU:0 "Bureau of Central Planning"
KX_PL_AS_PLANNING_BUREAU_desc:0 "Important component of Lange's economic plan is 'Biuro Planowania Centralnego', that will plan development of economy, reinvest the profits, and provide the workers with dividends from commonly owned means of production. Working somewhat independently of the government, it signals more managerial approach to socialist economics."

KX_PL_AS_MARKET_SIMULATION:0 "Market Simulation"
KX_PL_AS_MARKET_SIMULATION_desc:0 "The central component of 'Lange Model' is the system of dynamic price controls, planners set the prices based on trial and error, which will help individual enterprises in adjusting production."

KX_PL_AS_MIRACLE_ON_VISTULA:0 "Miracle on the Vistula"
KX_PL_AS_MIRACLE_ON_VISTULA_desc:0 "Our economy is booming and many have already called our efforts an 'Economic Miracle', it is no 'Miracle' however, it is the result of our policies!"

KX_PL_AS_SOCIALIST_KEYNESIANISM:0 "Socialist Keynesianism"
KX_PL_AS_SOCIALIST_KEYNESIANISM_desc:0 "Michał Kalecki has been called 'Socialist Keynes', or 'Marxist Keynes', but it was actually him that introduced 'Keynesian' theories first. Contrary to Keynes however, they led Kalecki to support planned forms of economy (enforcing full employment), albeit more sophisticated than so-called 'command economy', with decentralised elements and strong workers' oversight. \nAnd so, by appointing him as our economic advisor we can hope for our economy to achieve even greater heights."

##Chadecja Rework
KX_PL_Chadecja_Left:0 "The Christian Left"
KX_PL_Chadecja_Left_desc:0 "Modern Christian-Democracy can't be bound by the elites of the past, we must create truly mass movement, realising our vision of just, solidaric and orderly future."

KX_PL_Chadecja_Leftist_Christian_Democracy:0 "Social Christian-Democracy"
KX_PL_Chadecja_Leftist_Christian_Democracy_desc:0 "We still remain committed to Christian-Democracy and our Nation, yet we are radical - radical in our way of realising the ideals of Christian compassion and justice."

KX_PL_Chadecja_Indicative_Planning:0 "Begin Indicative Planning"
KX_PL_Chadecja_Indicative_Planning_desc:0 "Simple interventionism is not enough, the state apparatus needs to be fully committed to the control of economy, directing the growth of our companies, mixing public investments with private market, and protecting workers rights in the process."

KX_PL_Chadecja_Broad_Coalition:0 "Broad Appeals"
KX_PL_Chadecja_Broad_Coalition_desc:0 "Despite their Marxist roots, Socialist programme is not so dissimilar to ours; we should consider working with them, for better future."

KX_PL_Chadecja_Social_Radicalism:0 "The National Labour"
KX_PL_Chadecja_Social_Radicalism_desc:0 "We need to move past constraints of Christian-Democracy. While Marx downplayed the role of Nation as an ideal, his class analysis had many merits; and so we must fight for the working class, and align ourselves more with the PPS."

KX_PL_Chadecja_Land_Reform_With_PSL:0 "Negotiate with PSL"
KX_PL_Chadecja_Land_Reform_With_PSL_desc:0 "'Chadecja' had neglected the issues of the village workers for far too long, we will align ourselves with the People's movement to remedy that!"

KX_PL_Chadecja_Attack_the_Elite:0 "Crumbling Elite"
KX_PL_Chadecja_Attack_the_Elite_desc:0 "We must fight with unjust authorities of the past including the Church! And although we begin to draw closer and closer towards socialism, we still remain committed to the roots of Christian morality; if Jesus were alive today, he would be a Socialist!"

KX_PL_Chadecja_Continue_Nationalisation:0 "Deepen the State Economy"
KX_PL_Chadecja_Continue_Nationalisation_desc:0 "Indicative planning is not enough, while for the time being still cooperating with the private companies we will expand the role of the state in industrial development, setting up five-year plans, and bolstering workers initiative, eventually integrating corporations into the system of state, so that capitalism might wither away."

KX_PL_Chadecja_Promote_Class_Solidarity:0 "National Solidarity"
KX_PL_Chadecja_Promote_Class_Solidarity_desc:0 "It is unjust for the upper class to fatten on their profits while the workers starve. Both need to cooperate and not struggle with one another!"

KX_PL_Chadecja_Creating_Welfare_State:0 "Caring for the Children"
KX_PL_Chadecja_Creating_Welfare_State_desc:0 "To fully realise the spirit of our party, we need to expand welfare; free education, healthcare, and social security, are not only just, but also necessary for society to modernise and function properly."

KX_PL_Chadecja_Economic_Assembly:0 "Popular Constitution"
KX_PL_Chadecja_Economic_Assembly_desc:0 "We need to redraw our constitution, there are far too many so-called 'checks and balances' that strangle the will of the people!"

KX_PL_Chadecja_Protect_Constitution:0 "The immovable constitution"
KX_PL_Chadecja_Protect_Constitution_desc:0 "Our New Constitution is what we helped create, and we shall not abandon it; strong constitutionalism will guarantee stability, and stable political system breeds prosperity."

KX_PL_Chadecja_Taming_National_Democracy:0 "Taming the National-Democracy"
KX_PL_Chadecja_Taming_National_Democracy_desc:0 "We have aligned ourselves with the 'left' wing of National-Democracy, we have tamed it and integrated into a proper democratic system; National-Conservative forces rejoice, for we stand united!"

###KPP New
KX_PL_KPP_ABOLISH_PRIVATE_PROPERTY:0 "An End to Private Property"
KX_PL_KPP_ABOLISH_PRIVATE_PROPERTY_desc:0 "In accordance with the communist programme all forms of private property are to be abolished, and all the means of production be given to workers. For now it will remain at the party's hands, and the form of this public ownership will be decided later."

KX_PL_KPP_EXPAND_COUNCIL_COMPETENCIES:0 "A Truly Counciliary Republic"
KX_PL_KPP_EXPAND_COUNCIL_COMPETENCIES_desc:0 "In the Soviet theory, all matters are to be governed by the Soviets, by Councils, creating a cascade system guaranteeing representation to the working masses. We will commit to this sytem, even if it will somewhat undermine the role of the Vanguard Party."

KX_PL_KPP_IMPORTANCE_OF_VANGUARD:0 "Lenin Will Always Be with You!"
KX_PL_KPP_IMPORTANCE_OF_VANGUARD_desc:0 "We are the Vanguard of the Proletariat, and Lenin will always be with us; his memory is living in our hearts, and his theory will guide us for years to come."

KX_PL_KPP_INVOLVE_THE_COUNCILS:0 "Councils' Role in Economy"
KX_PL_KPP_INVOLVE_THE_COUNCILS_desc:0 "Councils' role have to be expanded in the spirit of decentralised planning, where local Soviets will manage the allocation of resources, and coordinate the ecnomic development plan with central government."

KX_PL_KPP_INDUSTRY_IN_STATE_HANDS:0 "Directing the Road to Socialism"
KX_PL_KPP_INDUSTRY_IN_STATE_HANDS_desc:0 "Private property will remain in the state hands, and the party will maintain its guiding role even in the economy, serving as a representant of the workers ownership of the means of production."

KX_PL_KPP_INDUSTRIALISATION_PLAN:0 "Develop the Isle of Communism"
KX_PL_KPP_INDUSTRIALISATION_PLAN_desc:0 "Poland is an isle among the reactionary powers, we need a strong central plan to guide our development and develop economy strong enough to withstand the tides of reaction."

KX_PL_KPP_ESCALATE_CLASS_WARFARE:0 "Escalate Class Warfare"
KX_PL_KPP_ESCALATE_CLASS_WARFARE_desc:0 "We have to maintain the spirit of class warfare within our people, so that they can fight with the reaction, and all the corruption, even within the party."

KX_PL_KPP_DISBAND_TRADE_UNIONS:0 "Disband Trade Unions"
KX_PL_KPP_DISBAND_TRADE_UNIONS_desc:0 "Trade unions are an unnecessary element of the capitalist system, and in the socialist one they would only cause discord within the working class; we will disband them, and transfer their competencies to the Soviets."

KX_PL_KPP_VOLOUNTARY_COLLECTIVIZATION:0 "Incentivised Collectivization"
KX_PL_KPP_VOLOUNTARY_COLLECTIVIZATION_desc:0 "Immediate collectivization of all the land would be disastrous to our state, instead we will parcel the land confiscated from large land owners to the peasantry, and incentivise workers to join local farming collectives, by direct subsidies, and new equipment provisions."

KX_PL_KPP_NEP_ELEMENTS:0 "Introduce NEP Elements"
KX_PL_KPP_NEP_ELEMENTS_desc:0 "Inspired by the 'New Economic Policy' championed by Nikolai Bukharin, for now we will maintain 'capitalism in the village' to fuel our industrial advancements, focusing on the development of socialism in the city."

KX_PL_KPP_EXPAND_STATE_AGRI:0 "Conduct Mass Collectivization"
KX_PL_KPP_EXPAND_STATE_AGRI_desc:0 "Collectivization needs to be enacted swiftly, pushing the peasants away from the village and into the city, accelerating the industrialisation in the process."

KX_PL_KPP_EXPERTISE_FROM_THE_WEST:0 "To Comrades in the West"
KX_PL_KPP_EXPERTISE_FROM_THE_WEST_desc:0 "Polish Communists have always maintained strong relations with international socialist community; we will utilise those connections to provide our state with industrial expertise."

KX_PL_KPP_FIGHT_TECHNOCRACY:0 "No Economy without Ideology!"
KX_PL_KPP_FIGHT_TECHNOCRACY_desc:0 "While development of economy is important, we can't loose ourselves in it, we have to remember why we are doing this, and maintain ideological purity, as to not fall into the trap of technocracy."

KX_PL_KPP_BRIDGE_CITY_AND_VILLAGE:0 "Worker and Peasant Shall Hold Their Hands"
KX_PL_KPP_BRIDGE_CITY_AND_VILLAGE_desc:0 "While Marxism laregely focuses on the urban proletariat, we can't forget about the rural one; only by maintaining the alliance between workers and peasants, may we achieve communism."

KX_PL_KPP_CLOSING_THE_GAP:0 "Closing the Development Gap"
KX_PL_KPP_CLOSING_THE_GAP_desc:0 "During the last twenty years the urban areas of our country have experienced excellent amount of economic growth, but the same can't be said about the stagnant countryside, we have to fix those wrongs, and support the peasants!"

###Some new focuses for moderate PPS
KX_PLX_PPS_Enforce_Work_Protection:0 "Protect the Worker Rights"
KX_PLX_PPS_Enforce_Work_Protection_desc:0 "For now capitalism can't be fully erased, but its predatory nature towards Workers can. We will push for a bill that will guarantee workers protection at the workplace, including the right to rest."

KX_PLX_PPS_Classes_Wither_Away:0 "And Classes Will Wither Away..."
KX_PLX_PPS_Classes_Wither_Away_desc:0 "In our advancement towards socialism it is still necessary to maintain some degree of coordination with the business representatives; it is a peaceful way to eliminate class distinctions and we will commit to it!"

KX_PLX_PPS_Cooperation_Through_Threat:0 "Cooperation Through Threat"
KX_PLX_PPS_Cooperation_Through_Threat_desc:0 "While we need to cooperate with enterprises left in private hands, in order to develop our economy, we will do it on our set of rules. Trade Unions will be utilised to threaten their employers with strikes, steering their way towards our goals and involving the working in the economic planning in the process."

KX_PLX_PPS_The_Long_Road:0 "The Long Road to Socialism"
KX_PLX_PPS_The_Long_Road_desc:0 "Socialism is ahead of us, but we won't take any shortcuts, it will be a long road but we will work through it!"

KX_PLX_PPS_Price_Controls:0 "Control the Prices"
KX_PLX_PPS_Price_Controls_desc:0 "While lion share of the consumer industry still remains in private hands, it doesn't mean Our hands are tied, we can influence the market through price controls, protecting consumer interests."

KX_PLX_PPS_Every_Three_Years_Closer:0 "Yet Every Three Years We are Closer!"
KX_PLX_PPS_Every_Three_Years_Closer_desc:0 "Many more radical than us has proposed the system of 'Five Year Plans' in the past utilising state owned economy, this move however is too drastic however, and prone to corruption; instead we will implement a similar yet different programme of 'Three Year Plans', coordinating our economic development with trade unions and enterprises to fulfil goals set by the state, slowly eroding the influence of private capital on the market."

